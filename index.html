  function lazyImgHTML(options = {}) {
    const {
      src,

        >

  // 懒加载观察器
  let _lazyObserver = null;

  function initLazyLoad() {
    if ('IntersectionObserver' in window) {
      if (!_lazyObserver) {
        _lazyObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              const src = img.dataset.src;
              
              if (src) {
                img.onload = function() {
                  this.classList.add('loaded');
                  const skeleton = this.parentElement?.querySelector('.img-skeleton');
                  if (skeleton) {
                    skeleton.style.opacity = '0';
                    skeleton.style.transition = 'opacity .3s ease';
                    setTimeout(() => skeleton.remove(), 300);
                  }
                };
                img.src = src;
              }
              
              observer.unobserve(img);
            }
          });
        }, {
          rootMargin: '100px 0px',
          threshold: 0.01
        });
      }
      
      // 观察所有未加载的懒加载图片
      document.querySelectorAll('img.lazy-img:not([src])').forEach(img => {
        _lazyObserver.observe(img);
      });
    } else {
      // 降级方案：直接加载所有图片
      document.querySelectorAll('img.lazy-img[data-src]').forEach(img => {
        const src = img.dataset.src;
        if (src) {
          img.onload = function() {
            this.classList.add('loaded');
            this.parentElement?.querySelector('.img-skeleton')?.remove();
          };
          img.src = src;
        }
      });
    }
  }

    if (window.DeviceMotionEvent) {

      let lastX = 0, lastY = 0, lastZ = 0;
      
      window.addEventListener('devicemotion', (e) => {
        const now = Date.now();
        if (now - lastShake < 1000) return;
        
        const acc = e.accelerationIncludingGravity;
        if (!acc) return;
        
        const x = acc.x || 0;
        const y = acc.y || 0;
        const z = acc.z || 0;
        
        const deltaX = Math.abs(x - lastX);
        const deltaY = Math.abs(y - lastY);
        const deltaZ = Math.abs(z - lastZ);
        
        if (deltaX > shakeThreshold || deltaY > shakeThreshold || deltaZ > shakeThreshold) {
          lastShake = now;
          doShake();
        }
        
        lastX = x;
        lastY = y;
        lastZ = z;
      });

    icon.style.animation = 'none';
    icon.offsetHeight;
    icon.style.animation = 'wiggle 0.5s ease-in-out 3';
    
    // 震动反馈
    vibrate([50, 50, 50]);
    
    // 随机选3道菜
    const allDishes = DB.dishes();
    if (allDishes.length === 0) {
      toast('还没有菜品哦，先添加一些吧～', 'info');
      return;
    }
    
    // 排除上一批的菜（如果有的话）
    let candidates = allDishes;
    if (_currentShakeDishes.length > 0 && allDishes.length > 3) {
      const lastIds = new Set(_currentShakeDishes.map(d => d.id));
      candidates = allDishes.filter(d => !lastIds.has(d.id));
      if (candidates.length < 3) candidates = allDishes;
    }
    
    // 随机选择
    _currentShakeDishes = DB.getRandomDishes(3, null, candidates);
    _shakeCount++;
    
    if (timesEl) timesEl.textContent = _shakeCount;
    
    // 显示结果
    if (result) result.classList.remove('hidden');
    
    if (dishesContainer) {
      dishesContainer.innerHTML = _currentShakeDishes.map((dish, i) => `
        <div class="list-item-pro bg-white/60 anim-fade stagger-${i + 1}">

  // ========== 功能6：特殊日子专属菜单 ==========
  function getSpecialDayDishes() {
    const todaySpecial = DB.getTodaySpecialDate();
    const anniInfo = DB.getAnniInfo();
    
    let specialType = null;
    let specialName = '';
    let specialIcon = '🎉';
    
    if (anniInfo && anniInfo.isAnniToday) {
      specialType = 'anniversary';
      specialName = '纪念日快乐！';
      specialIcon = '💕';
    } else if (todaySpecial) {
      specialType = todaySpecial.id;
      specialName = todaySpecial.name;
      specialIcon = todaySpecial.icon;
    }
    
    if (!specialType) return null;
    
    // 优先使用 special_date_menus 表里的推荐
    const menuRecommendations = DB.getMenusForDateType(specialType);
    let recommended = [];
    
    if (menuRecommendations.length > 0) {
      // 从推荐表获取菜品
      recommended = menuRecommendations.map(m => DB.getDish(m.dish_id)).filter(Boolean);
    }
    
    // 如果推荐表里没有或者不够，用算法推荐
    if (recommended.length < 6) {
      const dishes = DB.dishes();
      const tags = DB._getDishTags;
      
      // 推荐适合庆祝的菜品
      const scored = dishes.map(d => {
        let score = 0;
        const dishTags = tags(d);
        if (dishTags.includes('硬菜')) score += 20;
        if (dishTags.includes('宴客')) score += 15;
        if (dishTags.includes('经典')) score += 10;
        if (dishTags.includes('营养')) score += 5;
        if (d.is_favorite) score += 10;
        return { dish, score };
      });
      
      scored.sort((a, b) => b.score - a.score);
      
      // 合并推荐，去重
      const existingIds = new Set(recommended.map(d => d.id));
      const algoRecommended = scored.slice(0, 6).map(s => s.dish).filter(d => !existingIds.has(d.id));
      recommended = [...recommended, ...algoRecommended].slice(0, 6);
    }
    
    return {
      type: specialType,
      name: specialName,
      icon: specialIcon,
      recommended: recommended
    };
  }

  function startCountdown(minutes = null) {
    stopCountdown();
    
    const m = minutes ?? _currentCountdownMinutes;
    _countdownEndTime = Date.now() + m * 60 * 1000;
    
    // 保存设置
    const autoRecommendEl = $('#countdown-auto-recommend');
    const autoRecommend = autoRecommendEl ? autoRecommendEl.checked : true;
    DB.saveCountdownSetting({
      duration_minutes: m,
      auto_recommend: autoRecommend
    });
    
    // 震动和音效
    vibrate([100]);
    playNotificationSound('success');
    
    // 更新显示
    updateCountdownDisplay();
    
    // 启动定时器
    _countdownTimer = setInterval(() => {
      updateCountdownDisplay();
    }, 1000);
    
    toast(`已设置 ${m} 分钟倒计时！`, 'success');
  }

  function updateCountdownDisplay() {
    if (!_countdownEndTime) return;
    
    const now = Date.now();
    const remaining = Math.max(0, _countdownEndTime - now);
    
    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);
    
    const timeEl = $('#countdown-time');
    const bigIcon = timeEl?.closest('.big-icon-ultra');
    const innerIcon = timeEl;
    
    if (timeEl) {
      timeEl.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      
      // 最后30秒变红
      if (remaining < 30000 && remaining > 0) {
        // 更新整个大图标容器为红色
        if (bigIcon) {
          bigIcon.style.background = 'linear-gradient(135deg, #EF4444, #F87171)';
          // 更新发光层
          const glow1 = bigIcon.querySelector('.glow-layer-1');
          const glow2 = bigIcon.querySelector('.glow-layer-2');
          const rings = bigIcon.querySelectorAll('[class*="ring-"]');
          if (glow1) glow1.style.background = 'radial-gradient(circle, rgba(239,68,68,0.6), transparent 70%)';
          if (glow2) glow2.style.background = 'radial-gradient(circle, rgba(248,113,113,0.5), transparent 60%)';
          rings.forEach(r => r.style.borderColor = 'rgba(239,68,68,0.5)');
        }
        // 更新内部图标
        if (innerIcon) {
          innerIcon.style.background = 'linear-gradient(135deg, #EF4444, #F87171)';
        }
        
        // 最后10秒添加闪烁动画
        if (remaining < 10000) {
          if (bigIcon) {
            bigIcon.style.animation = 'pulseSoft 0.5s ease-in-out infinite';
          }
        }
      }
      
      // 每秒震动（最后10秒）
      if (remaining < 10000 && remaining > 0) {
        vibrate([50]);
      }
    }
    
    // 时间到
    if (remaining <= 0) {
      stopCountdown();
      onCountdownEnd();
    }
  }

  function stopCountdown() {
    if (_countdownTimer) {
      clearInterval(_countdownTimer);
      _countdownTimer = null;
    }
    _countdownEndTime = null;
  }

  function onCountdownEnd() {
    // 检查是否自动推荐
    const settings = DB.getDefaultCountdownSetting();
    if (!settings.auto_recommend) {
      closeModal();
      vibrate([200, 100, 200]);
      playNotificationSound('newOrder');
      toast('⏰ 时间到！','info');
      return;
    }
    
    // 时间到！自动推荐
    closeModal();
    
    // 震动和音效
    vibrate([200, 100, 200]);
    playNotificationSound('newOrder');
    
    // 撒花
    try { showConfetti(30); } catch(e) {}
    
    // 生成推荐套餐
    const combo = DB.generateComboForScenario('simple');
    if (combo && combo.all.length > 0) {
      combo.all.forEach(dish => {
        if (!_selDishes.has(dish.id)) {
          _selDishes.add(dish.id);
        }
      });
      refreshSelBar();
      toast('⏰ 时间到！已为你自动推荐套餐～', 'success');
    } else {
      // 随机选几道菜
      const randomDishes = DB.getRandomDishes(3);
      randomDishes.forEach(dish => {
        if (!_selDishes.has(dish.id)) {
          _selDishes.add(dish.id);
        }
      });
      refreshSelBar();
      toast('⏰ 时间到！随机帮你选了几道菜～', 'success');
    }
  }

  // 扩展 getRandomDishes 支持自定义候选池
  DB.getRandomDishes = function(count = 3, filterFn = null, candidates = null) {
    let dishes = candidates || [...this._dishes];
    if (filterFn) dishes = dishes.filter(filterFn);
    
    // Fisher-Yates 洗牌
    for (let i = dishes.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [dishes[i], dishes[j]] = [dishes[j], dishes[i]];
    }
    
    return dishes.slice(0, count);
  };

  // ========== 功能3：评分评价模态框 ==========
  function showReviewsModal() {
    const reviews = DB.reviews ? DB.reviews() : [];
    const dishes = DB.dishes();
    
    // 按菜品分组统计
    const dishStats = {};
    reviews.forEach(r => {
      if (!dishStats[r.dish_id]) {
        const dish = dishes.find(d => d.id === r.dish_id);
        dishStats[r.dish_id] = {
          dish: dish,
          reviews: [],
          totalRating: 0,
          count: 0
        };
      }
      dishStats[r.dish_id].reviews.push(r);
      if (r.rating) {
        dishStats[r.dish_id].totalRating += r.rating;
        dishStats[r.dish_id].count++;
      }
    });
    
    const statsList = Object.values(dishStats).sort((a, b) => b.count - a.count);
    
    function renderStars(rating, max = 5) {
      let html = '';
      for (let i = 1; i <= max; i++) {
        if (i <= rating) {
          html += '<i class="fa-solid fa-star text-amber-400"></i>';
        } else if (i - 0.5 <= rating) {
          html += '<i class="fa-solid fa-star-half-stroke text-amber-400"></i>';
        } else {
          html += '<i class="fa-regular fa-star text-gray-300"></i>';
        }
      }
      return html;
    }
    
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-display text-lg">⭐ 评分评价</h3>
          <button data-action="close-modal" class="text-gray-400 p-1">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        
        <div class="text-xs text-gray-400 mb-4">
          老婆对各菜品的评价统计
        </div>
        
        <div class="max-h-80 overflow-y-auto">
          ${statsList.length === 0 ? `
            <div class="empty-state-pro">
              <span class="empty-icon-pro">⭐</span>
              <h3 class="empty-title-pro">还没有评价</h3>
              <p class="empty-desc-pro">吃完饭后给小跟班的手艺打个分吧～</p>
            </div>
          ` : statsList.map((stat, i) => {
            const avgRating = stat.count > 0 ? (stat.totalRating / stat.count).toFixed(1) : '-';
            const dish = stat.dish;
            
            return `
              <div class="list-item-pro bg-white/60 mb-3 anim-fade stagger-${(i % 10) + 1}">
                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-50 to-orange-100 flex items-center justify-center text-2xl shrink-0">
                  ${dish ? (DISH_EMOJIS[dish.name] || '🍽️') : '🍽️'}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="font-medium text-sm text-gray-800 flex items-center gap-2">
                    ${dish ? dish.name : '未知菜品'}
                  </div>
                  <div class="flex items-center gap-2 mt-1">
                    <div class="flex items-center gap-0.5">
                      ${renderStars(stat.count > 0 ? Math.round(stat.totalRating / stat.count) : 0)}
                    </div>
                    <span class="text-xs text-gray-500">${avgRating} / 5</span>
                    <span class="text-xs text-gray-400">(${stat.count}次)</span>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
          
          ${reviews.length > 0 ? `
            <div class="divider-pro mt-4 mb-3">
              <span>📝 最新评价</span>
            </div>
            
            ${reviews.slice(0, 5).map((r, i) => {
              const dish = dishes.find(d => d.id === r.dish_id);
              return `
                <div class="list-item-pro bg-white/40 mb-2 anim-fade stagger-${(i % 10) + 1}">
                  <div class="flex-1">
                    <div class="flex items-center justify-between mb-1">
                      <span class="text-xs font-medium text-gray-700">${dish ? dish.name : '未知菜品'}</span>
                      <span class="text-[10px] text-gray-400">${r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : ''}</span>
                    </div>
                    ${r.rating ? `<div class="flex items-center gap-0.5 mb-1">${renderStars(r.rating)}</div>` : ''}
                    ${r.comment ? `<p class="text-xs text-gray-600">${r.comment}</p>` : ''}
                  </div>
                </div>
              `;
            }).join('')}
          ` : ''}
        </div>
      </div>
    `);
  }

  function showServingModal() {

    ];
    
    // 从数据库获取的分量，需要规范化字段
    const dbMultipliers = (DB.servingMultipliers ? DB.servingMultipliers() : []).map(m => {
      // 规范化：数据库用 people_count，前端用 id
      // 数据库可能没有 icon，给默认值
      return {
        id: m.id || (m.people_count ? m.people_count + '人' : 'unknown'),
        name: m.name || (m.people_count ? m.people_count + '人份' : '未知'),

        icon: m.icon || (m.people_count === 1 ? '👤' : m.people_count === 2 ? '👫' : m.people_count === 3 ? '👨‍👩‍👧' : m.people_count >= 4 ? '👨‍👩‍👧‍👦' : '🍽️')

    });
    
    // 优先用数据库的，如果数据库为空就用内置的
    const allMultipliers = dbMultipliers.length > 0 ? dbMultipliers : builtinMultipliers;
    
    // 当前选中的分量

    showModal(`

    const grouped={};
    history.forEach(h=>{
      if(!grouped[h.ingredient_name])grouped[h.ingredient_name]=[];
      grouped[h.ingredient_name].push(h);
    });
    
    const ingredients=Object.keys(grouped);
    
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-5">
          <div>
            <h3 class="font-display text-lg">食材价格历史</h3>
            <div class="text-xs text-gray-400 mt-0.5">记录了 ${ingredients.length} 种食材</div>
          </div>
          <div class="flex items-center gap-2">
            <button data-action="add-price-record" class="btn-green px-3 py-2 rounded-xl text-xs font-medium">
              <i class="fa-solid fa-plus mr-1"></i> 记录
            </button>
            <button data-action="close-modal" class="text-gray-400 p-1">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
        
        <div class="max-h-96 overflow-y-auto space-y-4">
          ${ingredients.length===0?`
            <div class="empty-state-pro">
              <span class="empty-icon-pro">💰</span>
              <h3 class="empty-title-pro">暂无价格记录</h3>
              <p class="empty-desc-pro">点击右上角记录食材价格吧～</p>
            </div>
          `:ingredients.map((name,i)=>{
            const records=grouped[name];
            const latest=records[0];
            const avg=DB.getAvgPrice(name);
            const hasTrend=records.length>=2;
            const trend=hasTrend?(latest.price>records[1].price?'up':latest.price<records[1].price?'down':'same'):null;
            
            return `
              <div class="card-pro anim-fade stagger-${(i%10)+1}">
                <div class="p-4">
                  <div class="flex items-center justify-between mb-3">
                    <div class="font-bold text-gray-800">${name}</div>
                    <div class="flex items-center gap-2">
                      ${hasTrend?`
                        <span class="text-xs px-2 py-0.5 rounded-full ${trend==='up'?'bg-red-50 text-red-500':trend==='down'?'bg-green-50 text-green-500':'bg-gray-50 text-gray-500'}">
                          ${trend==='up'?'↑ 涨价':trend==='down'?'↓ 降价':'→ 持平'}
                        </span>
                      `:''}
                      <span class="text-lg font-bold text-primary-400">¥${latest.price?.toFixed(2)||'?'}</span>
                    </div>
                  </div>
                  <div class="flex items-center gap-4 text-xs text-gray-400">
                    <span>均价：¥${avg?.toFixed(2)||'-'}</span>
                    <span>单位：${latest.unit||'斤'}</span>
                    <span>共 ${records.length} 条记录</span>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `);
  }

  // ========== 添加价格记录模态框 ==========
  function showAddPriceRecordModal(){
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-display text-lg">记录价格</h3>
          <button data-action="close-modal" class="text-gray-400 p-1">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">食材名称</label>
            <input type="text" id="price-ingredient" placeholder="例如：猪肉、青菜" class="w-full px-4 py-3 text-base rounded-2xl">
          </div>
          
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs text-gray-500 font-medium mb-1.5 block">单价（元）</label>
              <input type="number" id="price-price" step="0.01" placeholder="15.8" class="w-full px-4 py-3 text-base rounded-2xl">
            </div>
            <div>
              <label class="text-xs text-gray-500 font-medium mb-1.5 block">单位</label>
              <select id="price-unit" class="w-full px-4 py-3 text-base rounded-2xl bg-white">
                <option value="斤">斤</option>
                <option value="公斤">公斤</option>
                <option value="个">个</option>
                <option value="包">包</option>
                <option value="盒">盒</option>
                <option value="瓶">瓶</option>
              </select>
            </div>
          </div>
          
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">购买地点（可选）</label>
            <input type="text" id="price-shop" placeholder="例如：永辉超市、菜市场" class="w-full px-4 py-3 text-base rounded-2xl">
          </div>
          
          <button data-action="save-price-record" class="btn-primary w-full py-4 rounded-2xl font-bold text-base">
            保存记录
          </button>
        </div>
      </div>
    `);
  }

  // ========== 外部菜谱收藏模态框 ==========
  function showSavedRecipesModal(){
    const recipes=DB.savedRecipes().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-5">
          <div>
            <h3 class="font-display text-lg">收藏的菜谱</h3>
            <div class="text-xs text-gray-400 mt-0.5">共 ${recipes.length} 个收藏</div>
          </div>
          <div class="flex items-center gap-2">
            <button data-action="add-saved-recipe" class="btn-primary px-3 py-2 rounded-xl text-xs font-medium">
              <i class="fa-solid fa-plus mr-1"></i> 收藏
            </button>
            <button data-action="close-modal" class="text-gray-400 p-1">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
        
        <div class="max-h-96 overflow-y-auto space-y-3">
          ${recipes.length===0?`
            <div class="empty-state-pro">
              <span class="empty-icon-pro">📚</span>
              <h3 class="empty-title-pro">还没有收藏</h3>
              <p class="empty-desc-pro">看到好的菜谱链接可以存这里～</p>
            </div>
          `:recipes.map((r,i)=>`
            <div class="list-item-ultra anim-fade stagger-${(i%10)+1}">
              <div class="icon-container-pro w-12 h-12 rounded-2xl flex items-center justify-center shrink-0 ${r.is_tried?'':'opacity-60'}" style="background:linear-gradient(135deg, #F0FDF4, #D1FAE5)">
                <span class="text-2xl">${r.is_tried?'✅':'🔖'}</span>
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <div class="font-medium text-sm text-gray-800 truncate">${r.title}</div>
                  ${r.is_tried?'<span class="badge-pro badge-green text-xs">已试过</span>':''}
                </div>
                ${r.source?`<div class="text-xs text-gray-400 mt-0.5">来源：${r.source}</div>`:''}
                ${r.rating?`
                  <div class="flex items-center gap-0.5 mt-1">
                    ${[1,2,3,4,5].map(s=>`<span class="text-sm ${s<=r.rating?'text-amber-400':'text-gray-200'}">★</span>`).join('')}
                  </div>
                `:''}
              </div>
              <div class="flex items-center gap-1 shrink-0">
                ${r.url?`
                  <a href="${r.url}" target="_blank" class="icon-container-pro w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg, #EFF6FF, #DBEAFE)">
                    <i class="fa-solid fa-external-link text-blue-500 text-xs"></i>
                  </a>
                `:''}
                ${!r.is_tried?`
                  <button data-action="mark-recipe-tried" data-rid="${r.id}" class="icon-container-pro w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg, #FEFCE8, #FEF3C7)">
                    <i class="fa-solid fa-check text-amber-500 text-xs"></i>
                  </button>
                `:''}
                <button data-action="delete-saved-recipe" data-rid="${r.id}" class="icon-container-pro w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg, #FEF2F2, #FEE2E2)">
                  <i class="fa-solid fa-trash text-red-400 text-xs"></i>
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `);
  }

  // ========== 添加收藏菜谱模态框 ==========
  function showAddSavedRecipeModal(){
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-display text-lg">收藏菜谱</h3>
          <button data-action="close-modal" class="text-gray-400 p-1">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">菜谱标题 *</label>
            <input type="text" id="recipe-title" placeholder="例如：超级好吃的红烧肉做法" class="w-full px-4 py-3 text-base rounded-2xl">
          </div>
          
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">链接地址（可选）</label>
            <input type="url" id="recipe-url" placeholder="https://..." class="w-full px-4 py-3 text-base rounded-2xl">
          </div>
          
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">来源（可选）</label>
            <input type="text" id="recipe-source" placeholder="例如：小红书、抖音、下厨房" class="w-full px-4 py-3 text-base rounded-2xl">
          </div>
          
          <div>
            <label class="text-xs text-gray-500 font-medium mb-1.5 block">备注（可选）</label>
            <textarea id="recipe-notes" rows="2" placeholder="想尝试的原因、注意点等..." class="w-full px-4 py-3 text-base rounded-2xl resize-none"></textarea>
          </div>
          
          <button data-action="save-saved-recipe" class="btn-primary w-full py-4 rounded-2xl font-bold text-base">
            收藏菜谱 ❤️
          </button>
        </div>
      </div>
    `);
  }

  // 补充事件处理
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    
    const action = btn.dataset.action;
    const d = btn.dataset;
    
    switch(action) {
      case 'view-weekly-plan-detail':
        closeModal();
        showWeeklyPlanDetailModal(d.pid);
        break;
        
      case 'edit-inventory-item':
        closeModal();
        showAddInventoryModal(d.iid);
        break;
        
      case 'download-backup':
        const backups = DB.backups() || [];
        const bk = backups.find(b => b.id === d.bid);
        if (bk && bk.data) {
          const blob = new Blob([bk.data], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${bk.name || 'backup'}.json`;
          a.click();
          URL.revokeObjectURL(url);
          toast('备份已下载！', 'success');
        }
        break;
        
      case 'show-recipe':
        closeModal();
        if (typeof showRecipeModal === 'function') {
          showRecipeModal(d.did);
        }
        break;
        
      case 'select-serving':
        const servingId = d.servingId;
        const multiplier = parseFloat(d.multiplier) || 1;
        localStorage.setItem('pp_current_serving', servingId);
        localStorage.setItem('pp_serving_multiplier', multiplier.toString());
        toast(`已切换到 ${servingId} 🍽️`, 'success');
        closeModal();
        showServingModal();
        break;
        
      // ========== 通知中心 ==========
      case 'show-notifications':
        showNotificationsModal();
        break;
        
      case 'mark-read':
        await DB.markAsRead(d.nid);
        closeModal();
        showNotificationsModal();
        break;
        
      case 'mark-all-read':
        await DB.markAllAsRead('hubby');
        closeModal();
        showNotificationsModal();
        renderCurrentPage();
        break;
        
      case 'delete-notification':
        await DB.deleteNotification(d.nid);
        closeModal();
        showNotificationsModal();
        break;
        
      // ========== 菜品版本历史 ==========
      case 'show-dish-versions':
        closeModal();
        showDishVersionsModal(d.did);
        break;
        
      case 'restore-version':
        if(confirm('确定要恢复到这个版本吗？当前版本会自动保存。')){
          await DB.restoreDishVersion(d.vid);
          closeModal();
          renderCurrentPage();
        }
        break;
        
      // ========== 价格历史 ==========
      case 'show-price-history':
        showPriceHistoryModal();
        break;
        
      case 'add-price-record':
        closeModal();
        showAddPriceRecordModal();
        break;
        
      case 'save-price-record':
        const name=$('#price-ingredient')?.value?.trim();
        const price=parseFloat($('#price-price')?.value);
        const unit=$('#price-unit')?.value||'斤';
        const shop=$('#price-shop')?.value?.trim();
        
        if(!name){toast('请输入食材名称','warn');return;}
        if(isNaN(price)||price<=0){toast('请输入有效的价格','warn');return;}
        
        await DB.addPriceRecord({
          ingredient_name:name,
          price:price,
          unit:unit,
          shop:shop||undefined
        });
        closeModal();
        showPriceHistoryModal();
        break;
        
      // ========== 外部菜谱收藏 ==========
      case 'show-saved-recipes':
        showSavedRecipesModal();
        break;
        
      case 'add-saved-recipe':
        closeModal();
        showAddSavedRecipeModal();
        break;
        
      case 'save-saved-recipe':
        const title=$('#recipe-title')?.value?.trim();
        const url=$('#recipe-url')?.value?.trim();
        const source=$('#recipe-source')?.value?.trim();
        const notes=$('#recipe-notes')?.value?.trim();
        
        if(!title){toast('请输入菜谱标题','warn');return;}
        
        await DB.saveExternalRecipe({
          title:title,
          url:url||undefined,
          source:source||undefined,
          notes:notes||undefined
        });
        closeModal();
        showSavedRecipesModal();
        break;
        
      case 'mark-recipe-tried':
        await DB.markAsTried(d.rid);
        closeModal();
        showSavedRecipesModal();
        break;
        
      case 'delete-saved-recipe':
        if(confirm('确定要删除这个收藏吗？')){
          await DB.deleteSavedRecipe(d.rid);
          closeModal();
          showSavedRecipesModal();
        }
        break;
    }
  });

  // 初始化 WebP 检测
  checkWebPSupport();
  </script>
  </body>
  </html>
