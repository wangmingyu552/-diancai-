html,body{height:100%}

/* ============================================
   炫酷动态渐变背景 - 专业升级版
   ============================================ */
@keyframes gradientBG{
  0%{background-position:0% 50%}
  25%{background-position:50% 100%}
  50%{background-position:100% 50%}
  75%{background-position:50% 0%}
  100%{background-position:0% 50%}
}
@keyframes aurora{
  0%,100%{opacity:0.3;transform:translate(0,0) scale(1)}
  33%{opacity:0.5;transform:translate(30px,-20px) scale(1.1)}
  66%{opacity:0.4;transform:translate(-20px,30px) scale(0.95)}
}
.bg-gradient-couple{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,218,233,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 40% 60%, rgba(255,240,245,0.6) 0%, transparent 50%),
    linear-gradient(135deg, #FFF5F7 0%, #FFE4EC 25%, #FFF0F6 50%, #FFFAF0 75%, #FFF5F7 100%);
  background-size:400% 400%;
  animation:gradientBG 20s ease infinite;
  background-attachment:fixed;
  position:relative;
}
.bg-gradient-couple::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 85%, rgba(255,107,157,0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, rgba(255,143,179,0.06) 0%, transparent 40%);
  animation:aurora 8s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
}

/* 漂浮装饰元素 */
.deco-heart,.deco-star,.deco-sparkle{
  position:fixed;
  pointer-events:none;
  z-index:0;
  opacity:.6;
  user-select:none;
}
.deco-heart{animation:floatAround 8s ease-in-out infinite}
.deco-star{animation:floatAround 10s ease-in-out infinite reverse}
.deco-sparkle{animation:sparkle 3s ease-in-out infinite}

/* 粒子容器 */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

/* 主应用容器 */
#app{
  position:relative;
  z-index:10;
  min-height:100vh;
}

/* ============================================
   高级毛玻璃效果 - 专业升级版
   ============================================ */
.glass-ultra{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(60px);
  -webkit-backdrop-filter:blur(60px);
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:
    0 20px 60px rgba(255,107,157,0.12),
    0 8px 24px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.7);
}
.glass-card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 12px 40px rgba(255,107,157,0.1),
    0 4px 12px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

/* ============================================
   动画库 - 专业升级版
   ============================================ */
/* 漂浮动画 */
@keyframes float1{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(15px,-20px) rotate(4deg)}50%{transform:translate(25px,-35px) rotate(-3deg)}75%{transform:translate(15px,-25px) rotate(3deg)}}
@keyframes float2{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-18px,-18px) rotate(-4deg)}50%{transform:translate(-28px,-28px) rotate(3deg)}75%{transform:translate(-15px,-22px) rotate(-2deg)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(12px,-15px) scale(1.08)}66%{transform:translate(-8px,-20px) scale(0.92)}}
.anim-float1{animation:float1 7s ease-in-out infinite}
.anim-float2{animation:float2 8s ease-in-out infinite}
.anim-float3{animation:float3 6s ease-in-out infinite}

/* 入场动画 */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.08)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.anim-fade{animation:fadeUp .6s cubic-bezier(.25,.46,.45,.94) both}
.anim-slide{animation:slideUp .5s cubic-bezier(.25,.46,.45,.94) both}
.anim-bounce{animation:bounceIn .7s cubic-bezier(.68,-.55,.265,1.55) both}
.anim-scale{animation:scaleIn .4s ease-out both}
.anim-slide-right{animation:slideInRight .4s ease-out both}

/* 脉冲和发光 */
@keyframes pulseSoft{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 25px rgba(255,107,157,0.35)}50%{box-shadow:0 0 50px rgba(255,107,157,0.55),0 0 80px rgba(255,107,157,0.25)}}
@keyframes glowStrong{0%,100%{box-shadow:0 0 30px rgba(255,107,157,0.45)}50%{box-shadow:0 0 60px rgba(255,107,157,0.7),0 0 100px rgba(255,107,157,0.3)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.35)}28%{transform:scale(1)}42%{transform:scale(1.35)}70%{transform:scale(1)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(150px) rotate(1080deg);opacity:0}}
@keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
@keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes floatAround{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-15px) rotate(5deg)}50%{transform:translate(-5px,-25px) rotate(-3deg)}75%{transform:translate(-15px,-10px) rotate(3deg)}}
@keyframes fadeInScale{0%{opacity:0;transform:scale(.8) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.anim-pulse{animation:pulseSoft 2s ease-in-out infinite}
.anim-glow{animation:glow 2.5s ease-in-out infinite}
.anim-glow-strong{animation:glowStrong 2s ease-in-out infinite}
.anim-heartbeat{animation:heartBeat 1.3s ease-in-out infinite}
.anim-wiggle{animation:wiggle .5s ease-in-out infinite}
.anim-pop{animation:popIn .4s cubic-bezier(.68,-.55,.265,1.55) both}
.anim-fade-scale{animation:fadeInScale .5s ease-out both}
.anim-rainbow{animation:rainbow 3s linear infinite}
.anim-float-around{animation:floatAround 6s ease-in-out infinite}

/* ============================================
   菜品卡片 - 专业炫酷版
   ============================================ */
.dish-card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:
    0 8px 32px rgba(255,107,157,0.1),
    0 2px 8px rgba(0,0,0,0.03),
    inset 0 1px 0 rgba(255,255,255,0.7);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.dish-card::before{
  content:'';
  position:absolute;
  inset:-2px;
  background:linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,143,179,0.06), rgba(255,182,193,0.08));
  border-radius:26px;
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
  z-index:0;
}
.dish-card::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50%;
  background:linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
  border-radius:24px 24px 0 0;
  pointer-events:none;
  opacity:0.6;
}
.dish-card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:
    0 20px 60px rgba(255,107,157,0.18),
    0 8px 24px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.8);
}
.dish-card:hover::before{opacity:1}
.dish-card:active{transform:translateY(-2px) scale(.98)}
.dish-card.sel{
  background:linear-gradient(135deg, rgba(255,240,245,0.9), rgba(255,250,240,0.85));
  border:2px solid rgba(255,107,157,0.6);
  box-shadow:
    0 16px 48px rgba(255,107,157,0.25),
    0 0 0 6px rgba(255,107,157,0.1),
    inset 0 1px 0 rgba(255,255,255,0.85);
  transform:translateY(-4px) scale(1.03);
}
.dish-card.sel::before{
  opacity:1;
  background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.12), rgba(255,182,193,0.15));
}
.dish-card.sel::after{
  opacity:0.8;
}

/* ============================================
   图标容器 - 专业炫酷版
   ============================================ */
.emoji-container{
  position:relative;
  z-index:1;
}
.emoji-container::before{
  content:'';
  position:absolute;
  inset:-4px;
  background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.1));
  border-radius:inherit;
  filter:blur(8px);
  opacity:0;
  transition:opacity .35s ease;
  z-index:-1;
}
.emoji-container:hover::before{opacity:1}
.sel .emoji-container::before{opacity:1}

/* ============================================
   渐变按钮 - 专业发光版
   ============================================ */
.btn-primary{
  background:linear-gradient(135deg, #FF6B9D 0%, #FF8FB8 30%, #FFB3D1 70%, #FF6B9D 100%);
  background-size:300% 300%;
  color:white;
  box-shadow:
    0 8px 32px rgba(255,107,157,0.4),
    0 0 0 1px rgba(255,255,255,0.25) inset;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.btn-primary::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.15));
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.btn-primary:hover{
  background-position:100% 100%;
  transform:translateY(-2px);
  box-shadow:
    0 16px 48px rgba(255,107,157,0.5),
    0 0 0 1px rgba(255,255,255,0.3) inset;
}
.btn-primary:hover::before{opacity:1}
.btn-primary:active{
  transform:translateY(0) scale(.97);
  box-shadow:
    0 6px 20px rgba(255,107,157,0.3),
    0 0 0 1px rgba(255,255,255,0.2) inset;
}

/* ============================================
   分类标签按钮 - 专业版
   ============================================ */
.cat-btn{
  border-radius:100px;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  border:1.5px solid transparent;
  position:relative;
  overflow:hidden;
}
.cat-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,107,157,0.08), transparent);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.cat-btn:hover::before{opacity:1}
.cat-btn.active{
  background:linear-gradient(135deg, #FF6B9D, #FF8FB8, #FFB3D1);
  background-size:200% 200%;
  color:white;
  border-color:transparent;
  box-shadow:
    0 8px 28px rgba(255,107,157,0.35),
    0 0 0 1px rgba(255,255,255,0.25) inset;
  transform:translateY(-2px) scale(1.03);
}
.cat-btn:not(.active){
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border-color:rgba(255,107,157,0.18);
  color:#444;
}
.cat-btn:not(.active):hover{
  background:rgba(255,255,255,0.8);
  border-color:rgba(255,107,157,0.3);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(255,107,157,0.12);
}

/* ============================================
   Tab 按钮 - 专业版
   ============================================ */
.tab-btn{
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  min-height:56px;
}
.tab-btn.active{
  color:#FF6B9D;
  font-weight:600;
}
.tab-btn.active::after{
  content:'';
  position:absolute;
  bottom:-3px;
  left:50%;
  transform:translateX(-50%);
  width:32px;
  height:4px;
  background:linear-gradient(90deg, #FF6B9D, #FF8FB8, #FFB3D1);
  border-radius:4px;
  box-shadow:0 4px 12px rgba(255,107,157,0.4);
}

/* 确保图标不干扰点击事件 */
.tab-btn i, .tab-btn .fa-solid {
  pointer-events: none;
}

/* 底部导航按钮确保填满区域 */
nav.fixed button {
  position: relative;
  z-index: 1;
}
nav.fixed button > * {
  pointer-events: none;
}

/* 全局：确保所有带 data-action 的按钮的子元素不干扰点击 */
[data-action] > * {
  pointer-events: none;
}
[data-action] i,
[data-action] span,
[data-action] .fa-solid {
  pointer-events: none;
}

/* ============================================
   模态框 - 专业版
   ============================================ */
.modal-mask{
  background:rgba(0,0,0,0.15);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  z-index:100;
}

/* ============================================
   状态点 - 专业版
   ============================================ */
.status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  display:inline-block;
  box-shadow:0 0 0 4px rgba(255,255,255,0.7);
  position:relative;
}
.status-dot::before{
  content:'';
  position:absolute;
  inset:-6px;
  border-radius:50%;
  background:inherit;
  filter:blur(6px);
  opacity:0.4;
  animation:pulseSoft 2s ease-in-out infinite;
}
.status-dot.ordered{background:linear-gradient(135deg,#FF6B9D,#FF8FB8);animation:pulseSoft 1.2s infinite}
.status-dot.seen{background:linear-gradient(135deg,#FF9F43,#FECA57)}
.status-dot.shopping{background:linear-gradient(135deg,#54A0FF,#48DBFB)}
.status-dot.cooking{background:linear-gradient(135deg,#A55EEA,#DDA0DD)}
.status-dot.eating{background:linear-gradient(135deg,#26DE81,#2ED573)}

/* ============================================

   ============================================ */

.top-safe{padding-top:max(0px,env(safe-area-inset-top))}

/* ============================================
   输入框 - 专业版
   ============================================ */
input,textarea,select{
  font-family:inherit;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border:1.5px solid rgba(255,107,157,0.18);
  border-radius:16px;
  outline:none;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
}
input:focus,textarea:focus,select:focus{
  border-color:rgba(255,107,157,0.55);
  box-shadow:
    0 0 0 6px rgba(255,107,157,0.12),
    inset 0 1px 0 rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.9);
  transform:translateY(-1px);
}

button{cursor:pointer;-webkit-user-select:none;user-select:none;border:none;background:none}

/* ============================================================
   数据层（异步）
   ============================================================ */
const DB={
  _dishes:[],_orders:[],_templates:[],_inventory:{},_settings:{},
  _ready:false,
  _subscribed:false,

  async init(){
    if(this._ready)return;
    if(!sb){toast('Supabase 连接失败，请检查 URL 和 Key','error');return}
    try{
      const [dRes,oRes,tRes,iRes,sRes]=await Promise.all([
        sb.from('dishes').select('*').order('is_favorite',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
        sb.from('templates').select('*'),
        sb.from('inventory').select('*'),
        sb.from('settings').select('*')
      ]);
      this._dishes=dRes.data||[];
      this._orders=oRes.data||[];
      this._templates=tRes.data||[];
      (iRes.data||[]).forEach(r=>{this._inventory[r.ingredient_name]=r.have_it});
      (sRes.data||[]).forEach(r=>{this._settings[r.key]=r.value});
      this._ready=true;
      this._subscribe();
    }catch(e){console.error('数据加载失败:',e);toast('数据加载失败','error')}
  },

  _subscribe(){
    if(!sb || this._subscribed)return;
    this._subscribed = true;
    const ch=sb.channel('pp-realtime');
    ch.on('postgres_changes',{event:'*',schema:'public',table:'orders'},async()=>{
      const{data}=await sb.from('orders').select('*').order('created_at',{ascending:false});
      this._orders=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'dishes'},async()=>{
      const{data}=await sb.from('dishes').select('*').order('is_favorite',{ascending:false});
      this._dishes=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'templates'},async()=>{
      const{data}=await sb.from('templates').select('*');
      this._templates=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'inventory'},async()=>{
      const{data}=await sb.from('inventory').select('*');
      this._inventory={};(data||[]).forEach(r=>{this._inventory[r.ingredient_name]=r.have_it});
      renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'settings'},async()=>{
      const{data}=await sb.from('settings').select('*');
      this._settings={};(data||[]).forEach(r=>{this._settings[r.key]=r.value});
      renderCurrentPage();
    });
    ch.subscribe((status)=>{
      if(status==='SUBSCRIBED')console.log('实时连接已建立');
    });
  },

  dishes(){return this._dishes},
  orders(){return this._orders},
  templates(){return this._templates},
  inventory(){return this._inventory},
  setting(k,d=null){return this._settings[k]!==undefined?this._settings[k]:d},
  today(){return new Date().toISOString().slice(0,10)},
  todayOrder(){return this._orders.find(o=>o.order_date===this.today()&&!o.cancelled)},
  recentOrders(n=5){return this._orders.filter(o=>!o.cancelled).slice(0,n)},
  dishWeekCount(did){const w=Date.now()-7*864e5;return this._orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>w&&!o.cancelled).reduce((c,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return c+(items||[]).filter(i=>i.did===did).length},0)},
  getDish(id){return this._dishes.find(d=>d.id===id)},
  getDishesByIds(ids){return ids.map(id=>this.getDish(id)).filter(Boolean)},
  orderCost(o){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return this.getDishesByIds((items||[]).map(i=>i.did)).reduce((s,d)=>s+(d.cost_estimate||0),0)},

  async addOrder(items,remark){
    const o={id:'o'+Date.now(),order_date:this.today(),status:'ordered',remark:remark||'',items:items.map(did=>({did})),cancelled:false,cancel_reason:'',rating:null};
    const{error}=await sb.from('orders').insert(o);
    if(error)toast('下单失败：'+error.message,'error');
    else toast('下单成功，小跟班快接单!','success');
    return error?null:o;
  },
  async updateOrder(id,patch){
    patch.updated_at=new Date().toISOString();
    const{error}=await sb.from('orders').update(patch).eq('id',id);
    if(error)toast('更新失败','error');
  },
  async setInv(name,have){
    if(have){
      await sb.from('inventory').upsert({ingredient_name:name,have_it:true,updated_at:new Date().toISOString()},{onConflict:'ingredient_name'});
    }else{
      await sb.from('inventory').delete().eq('ingredient_name',name);
    }
    this._inventory[name]=have||undefined;
  },
  hasInv(name){return !!this._inventory[name]},
  async saveDish(d){
    if(d._exists){const{...clean}=d;delete clean._exists;const{error}=await sb.from('dishes').update(clean).eq('id',d.id);if(error)toast('保存失败','error')}
    else{const{...clean}=d;delete clean._exists;const{error}=await sb.from('dishes').insert(clean);if(error)toast('添加失败','error')}
  },
  async deleteDish(id){await sb.from('dishes').delete().eq('id',id)},
  async saveTpl(t){
    if(t._exists){const{...clean}=t;delete clean._exists;await sb.from('templates').update(clean).eq('id',t.id)}
    else{const{...clean}=t;delete clean._exists;await sb.from('templates').insert(clean)}
  },
  async deleteTpl(id){await sb.from('templates').delete().eq('id',id)},
  async saveSetting(k,v){await sb.from('settings').upsert({key:k,value:v},{onConflict:'key'});this._settings[k]=v},
  async setNoCook(date,reason){
    await this.saveSetting('noCook_'+date,'1');
    await this.saveSetting('noCookReason_'+date,reason);
    this._settings['noCook_'+date]='1';
    this._settings['noCookReason_'+date]=reason;
  },
  async cancelNoCook(date){
    await sb.from('settings').delete().eq('key','noCook_'+date);
    await sb.from('settings').delete().eq('key','noCookReason_'+date);
    delete this._settings['noCook_'+date];
    delete this._settings['noCookReason_'+date];
  },
  isNoCook(){return !!this._settings['noCook_'+this.today()]}
};

/* 创建背景装饰粒子 */
function createParticles(){
  const container=$('#particles');
  if(!container)return;
  container.innerHTML='';
  const particles=['💕','💖','✨','⭐','🌸','💗','🌟','💫'];
  const count=8;
  for(let i=0;i<count;i++){
    const p=document.createElement('div');
    const emoji=pick(particles);
    const size=16+Math.random()*20;
    const x=Math.random()*100;
    const y=Math.random()*100;
    const delay=Math.random()*5;
    const duration=6+Math.random()*8;
    p.textContent=emoji;
    p.style.cssText=`
      position:absolute;
      left:${x}%;
      top:${y}%;
      font-size:${size}px;
      opacity:${0.15+Math.random()*0.25};
      animation:floatAround ${duration}s ease-in-out infinite;
      animation-delay:${delay}s;
      pointer-events:none;
      user-select:none;
      z-index:0;
    `;
    if(i%2===0)p.style.animationDirection='reverse';
    container.appendChild(p);
  }
}

let currentPage='',currentTab='';
function go(page,tab=''){currentPage=page;currentTab=tab;window.location.hash=page+(tab?'/'+tab:'');renderCurrentPage()}
async function renderCurrentPage(){
  if(!DB._ready){$('#app').innerHTML=loadingHTML();await DB.init()}
  renderPage(currentPage,currentTab);
}
function renderPage(page,tab){
  const app=$('#app');
  if(page==='role-select'){app.innerHTML=pgRoleSelect();return}
  if(page==='wife'){
    if(tab==='waiting'){app.innerHTML=pgWifeWaiting();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('wife');return}
    app.innerHTML=pgWifeHome();
  }else if(page==='hubby'){
    if(tab==='manage'){app.innerHTML=pgHubbyManage();return}
    if(tab==='stats'){app.innerHTML=pgHubbyStats();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('hubby');return}
    if(tab==='settings'){app.innerHTML=pgSettings();return}
    app.innerHTML=pgHubbyHome();
  }else{app.innerHTML=pgRoleSelect()}
}
function initRouter(){
  const hash=window.location.hash.slice(1)||'';
  const[page,...rest]=hash.split('/');
  const role=localStorage.getItem('pp_role');
  if(page==='wife'||page==='hubby')go(page,rest[0]||'home');
  else if(role)go(role==='wife'?'wife/home':'hubby/home');
  else go('role-select');
  window.addEventListener('hashchange',()=>{const h=window.location.hash.slice(1)||'';const[p,...r]=h.split('/');if(p!==currentPage||r[0]!==currentTab){currentPage=p;currentTab=r[0]||'';renderCurrentPage()}});
}

function renderDishGrid(dishes){
  const filtered=_selCats==='全部'?dishes:dishes.filter(d=>d.category===_selCats);
  const favs=filtered.filter(d=>d.is_favorite);const others=filtered.filter(d=>!d.is_favorite);
  let html='';
  if(favs.length&&_selCats==='全部'){
    html+=`<div class="text-sm text-primary-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade">
      <span class="text-2xl">⭐</span> 常吃（小跟班最拿手的）
    </div>
    <div class="grid grid-cols-3 gap-3 mb-5">
      ${favs.map((d,i)=>dishCard(d,true,i+1)).join('')}
    </div>`;
    if(others.length)html+=`<div class="text-sm text-gray-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade stagger-4">
      <span class="text-2xl">🍽️</span> 全部菜品
    </div>`;
  }
  const favOffset=favs.length&&_selCats==='全部'?favs.length:0;
  html+=`<div class="grid grid-cols-3 gap-3 mb-4">
    ${others.map((d,i)=>dishCard(d,false,i+1+favOffset)).join('')}
  </div>`;
  if(!filtered.length)html=`<div class="text-center text-gray-400 py-24 anim-fade">
    <div class="text-6xl mb-5 opacity-30">🍚</div>
    <p class="text-lg">暂无菜品</p>
    <p class="text-sm mt-2 opacity-60">让小跟班去添加几个吧～</p>
  </div>`;
  return html;
}

function dishCard(d,isFav=false,idx=0){
  const wc=DB.dishWeekCount(d.id);const sel=_selDishes.has(d.id);
  const staggerClass=idx>0&&idx<=30?`stagger-${idx}`:'';
  let topRight='';
  if(wc>=3)topRight=`<span class="absolute top-2 right-2 bg-gradient-to-br from-rose-400 to-pink-400 text-white text-[9px] px-2 py-0.5 rounded-full shadow-lg font-bold anim-pulse">本周${wc}次 🔥</span>`;
  else if(wc>=2)topRight=`<span class="absolute top-2 right-2 bg-gradient-to-br from-amber-400 to-orange-400 text-white text-[9px] px-2 py-0.5 rounded-full shadow-lg font-bold">本周${wc}次 ✨</span>`;
  else if(sel)topRight=`<div class="absolute top-2 right-2 w-6 h-6 rounded-full bg-gradient-to-br from-primary-400 to-pink-400 flex items-center justify-center text-white shadow-lg shadow-primary-400/30 anim-pop">
    <i class="fa-solid fa-check text-[10px]"></i>
  </div>`;
  const hasRecipe=d.recipe&&d.recipe.trim();
  const catEmoji={'荤菜':'🥩','素菜':'🥬','汤':'🍲','主食':'🍚','全部':'🍽️'};
  const emoji=DISH_EMOJIS[d.name]||catEmoji[d.category]||'🍽️';
  return `<div class="dish-card relative p-3 text-left ${sel?'sel':''} anim-fade-scale ${staggerClass}" data-did="${d.id}">

/* ============================================================
   页面：统计
   ============================================================ */
function pgHubbyStats(){
  const orders=DB.orders().filter(o=>!o.cancelled);
  const thisMonth=new Date();thisMonth.setDate(1);thisMonth.setHours(0,0,0,0);
  const mo=orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>=thisMonth.getTime());
  const totalDays=new Set(mo.map(o=>o.order_date)).size;
  const totalDishes=mo.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
  const totalCost=mo.reduce((s,o)=>s+DB.orderCost(o),0);
  const avgCost=totalDays?Math.round(totalCost/totalDays):0;
  const dishCount={};orders.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{dishCount[i.did]=(dishCount[i.did]||0)+1})});
  const top5=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  let meatCnt=0,vegCnt=0;mo.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{const d=DB.getDish(i.did);if(d){if(d.category==='荤菜')meatCnt++;else if(d.category==='素菜')vegCnt++}})});
  const dishTotal=meatCnt+vegCnt;const meatPct=dishTotal?Math.round(meatCnt/dishTotal*100):50;const vegPct=100-meatPct;
  const rated=mo.filter(o=>o.rating);const goodCnt=rated.filter(o=>o.rating==='good').length;const goodRate=rated.length?Math.round(goodCnt/rated.length*100):0;
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const o=orders.find(x=>x.order_date===ds&&!x.cancelled);last7.push({date:ds,order:o})}
  return `<div class="min-h-screen pb-24">
    <header class="sticky top-0 z-30 bg-primary-50/90 backdrop-blur-lg px-4 pt-4 pb-3"><h1 class="font-display text-xl">吃饭统计</h1></header>
    <div class="px-4 space-y-4 pb-4">
      <div class="grid grid-cols-2 gap-3 anim-fade">
        <div class="bg-white rounded-2xl border border-primary-50 p-4 text-center"><div class="text-2xl font-bold text-primary-500">${totalDays}</div><div class="text-xs text-gray-400 mt-1">做饭天数</div></div>
        <div class="bg-white rounded-2xl border border-primary-50 p-4 text-center"><div class="text-2xl font-bold text-primary-500">${totalDishes}</div><div class="text-xs text-gray-400 mt-1">做了多少道菜</div></div>
        <div class="bg-white rounded-2xl border border-primary-50 p-4 text-center"><div class="text-2xl font-bold text-primary-500">${totalCost}</div><div class="text-xs text-gray-400 mt-1">买菜花费(元)</div></div>
        <div class="bg-white rounded-2xl border border-primary-50 p-4 text-center"><div class="text-2xl font-bold text-primary-500">${avgCost}</div><div class="text-xs text-gray-400 mt-1">日均花费(元)</div></div>
      </div>
      <div class="bg-white rounded-2xl border border-primary-50 p-4 anim-fade" style="animation-delay:.1s"><div class="text-sm font-medium mb-2"><i class="fa-solid fa-face-grin-hearts text-green-500 mr-1.5"></i>好评率</div><div class="flex items-center gap-3"><div class="flex-1 h-3 bg-primary-50 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full transition-all" style="width:${goodRate}%"></div></div><span class="text-lg font-bold text-green-600">${goodRate}%</span></div><div class="text-xs text-gray-400 mt-1">${rated.length} 次评价</div></div>
      <div class="bg-white rounded-2xl border border-primary-50 p-4 anim-fade" style="animation-delay:.15s"><div class="text-sm font-medium mb-2"><i class="fa-solid fa-chart-pie text-primary-400 mr-1.5"></i>本月荤素比</div><div class="flex items-center gap-3"><div class="flex-1 h-3 bg-green-100 rounded-full overflow-hidden flex"><div class="h-full bg-primary-400" style="width:${meatPct}%"></div><div class="h-full bg-green-500" style="width:${vegPct}%"></div></div></div><div class="flex justify-between text-xs mt-2"><span class="text-primary-400">荤 ${meatPct}%</span><span class="text-green-500">素 ${vegPct}%</span></div>${meatPct>65?'<div class="text-xs text-amber-500 mt-1"><i class="fa-solid fa-lightbulb mr-1"></i>荤菜偏多，可以多加点素菜哦</div>':''}</div>
      <div class="bg-white rounded-2xl border border-primary-50 p-4 anim-fade" style="animation-delay:.2s"><div class="text-sm font-medium mb-3"><i class="fa-solid fa-trophy text-amber-500 mr-1.5"></i>老婆最爱 TOP5</div><div class="space-y-2.5">${top5.map(([did,cnt],i)=>{const d=DB.getDish(did);if(!d)return'';const maxCnt=top5[0]?.[1]||1;return `<div class="flex items-center gap-3"><span class="w-5 h-5 rounded-full ${i===0?'bg-amber-400 text-white':i===1?'bg-gray-300 text-white':i===2?'bg-amber-700 text-white':'bg-primary-50 text-gray-400'} flex items-center justify-center text-xs font-bold">${i+1}</span><div class="flex-1"><div class="flex justify-between text-sm mb-1"><span>${d.name}</span><span class="text-gray-400">${cnt}次</span></div><div class="h-1.5 bg-primary-50 rounded-full overflow-hidden"><div class="h-full bg-primary-400 rounded-full" style="width:${Math.round(cnt/maxCnt*100)}%"></div></div></div></div>`}).join('')}${!top5.length?'<div class="text-center text-gray-400 text-sm py-4">暂无数据</div>':''}</div></div>
      <div class="bg-white rounded-2xl border border-primary-50 p-4 anim-fade" style="animation-delay:.25s"><div class="text-sm font-medium mb-3"><i class="fa-solid fa-calendar-week text-primary-400 mr-1.5"></i>近7天</div><div class="space-y-2">${last7.map(({date,order})=>`<div class="flex items-center gap-3 py-1"><div class="w-12 text-center"><div class="text-xs text-gray-400">${fmtDate(date)}</div><div class="text-[10px] text-gray-300">周${weekDay(date)}</div></div><div class="w-1.5 h-1.5 rounded-full ${order?'bg-green-500':'bg-gray-200'}"></div><div class="flex-1 text-sm ${order?'text-gray-800':'text-gray-300'}">${order?(()=>{const items=typeof order.items==='string'?JSON.parse(order.items):order.items;return DB.getDishesByIds((items||[]).map(i=>i.did)).map(d=>d.name).join('、')})():'休息'}</div></div>`).join('')}</div></div>
    </div>
    ${hubbyNav('stats')}
  </div>`;
}

/* ============================================================

function pgCalendar(role){
  const now=new Date();const year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
  const orders=DB.orders();const today=DB.today();
  let cells='';for(let i=0;i<firstDay;i++)cells+=`<div class="aspect-square"></div>`;
  for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const o=orders.find(x=>x.order_date===ds);const isToday=ds===today;const hasOrder=o&&!o.cancelled;const cancelled=o&&o.cancelled;let dot='';if(hasOrder){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;dot=`<div class="flex gap-0.5 justify-center mt-0.5">${(items||[]).slice(0,3).map(()=>'<div class="w-1 h-1 rounded-full bg-primary-400"></div>').join('')}</div>`}if(cancelled)dot=`<div class="text-[10px] text-gray-300 mt-0.5">休</div>`;cells+=`<button data-action="cal-day" data-date="${ds}" class="aspect-square flex flex-col items-center justify-center rounded-xl text-sm transition ${isToday?'bg-primary-400 text-white font-bold':'hover:bg-primary-50'} ${!isToday&&hasOrder?'text-gray-800':''} ${!isToday&&!hasOrder&&!cancelled?'text-gray-400':''}">${d}${dot}</button>`}
  return `<div class="min-h-screen pb-24"><header class="sticky top-0 z-30 bg-primary-50/90 backdrop-blur-lg px-4 pt-4 pb-3"><h1 class="font-display text-xl">${year}年${month+1}月</h1></header><div class="px-4"><div class="grid grid-cols-7 gap-1 mb-2">${['日','一','二','三','四','五','六'].map(w=>`<div class="text-center text-xs text-gray-400 py-1">${w}</div>`).join('')}</div><div class="grid grid-cols-7 gap-1">${cells}</div><div id="cal-detail" class="mt-4"></div></div>${role==='wife'?wifeNav('calendar'):hubbyNav('calendar')}</div>`;
}

function showDishModal(did){const d=did?DB.getDish(did):null;const isEdit=!!d;showModal(`<div class="p-5"><div class="flex items-center justify-between mb-4"><h3 class="font-display text-lg">${isEdit?'编辑菜品':'添加菜品'}</h3><button data-action="close-modal" class="text-gray-400 p-1"><i class="fa-solid fa-xmark"></i></button></div><div class="space-y-3"><div><label class="text-xs text-gray-400 block mb-1">菜名</label><input id="dm-name" value="${d?d.name:''}" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400" placeholder="如：红烧排骨"></div><div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-gray-400 block mb-1">分类</label><select id="dm-cat" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400 bg-white">${['荤菜','素菜','汤','主食'].map(c=>`<option ${d&&d.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div><label class="text-xs text-gray-400 block mb-1">烹饪时间(分钟)</label><input id="dm-time" type="number" value="${d?d.cook_time:15}" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400"></div></div><div><label class="text-xs text-gray-400 block mb-1">预估菜价(元)</label><input id="dm-cost" type="number" value="${d?d.cost_estimate:10}" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400"></div><div><label class="text-xs text-gray-400 block mb-1">食材（每行一种）</label><textarea id="dm-ing" rows="3" class="w-full border border-primary-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary-400 resize-none" placeholder="排骨500g&#10;葱姜蒜&#10;生抽老抽">${d?(d.ingredients||[]).join('\n'):''}</textarea></div><div><label class="text-xs text-gray-400 block mb-1">做法步骤（可选，每行一步）</label><textarea id="dm-recipe" rows="5" class="w-full border border-primary-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-primary-400 resize-none" placeholder="1. 排骨冷水下锅焯水，去血沫后捞出洗净&#10;2. 锅中放油，加冰糖小火炒出糖色&#10;3. 放入排骨翻炒上色，加葱姜蒜、生抽老抽">${d?d.recipe||'':''}</textarea></div><label class="flex items-center gap-2"><input id="dm-fav" type="checkbox" ${d&&d.is_favorite?'checked':''} class="w-4 h-4 rounded accent-primary-400"><span class="text-sm">设为常吃（置顶显示）</span></label><button data-action="save-dish" data-did="${did||''}" class="w-full py-3 bg-primary-400 text-white rounded-xl font-medium active:scale-95 transition-transform">${isEdit?'保存修改':'添加菜品'}</button></div></div>`)}
function showTplModal(tid){const t=tid?DB.templates().find(x=>x.id===tid):null;const isEdit=!!t;const dishes=DB.dishes();const selItems=new Set(t?(typeof t.items==='string'?JSON.parse(t.items):t.items):[]);window._tmSel=selItems;showModal(`<div class="p-5"><div class="flex items-center justify-between mb-4"><h3 class="font-display text-lg">${isEdit?'编辑模板':'添加模板'}</h3><button data-action="close-modal" class="text-gray-400 p-1"><i class="fa-solid fa-xmark"></i></button></div><div class="space-y-3"><div class="grid grid-cols-2 gap-3"><div><label class="text-xs text-gray-400 block mb-1">模板名称</label><input id="tm-name" value="${t?t.name:''}" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400" placeholder="如：简单餐"></div><div><label class="text-xs text-gray-400 block mb-1">描述</label><input id="tm-desc" value="${t?t.description:''}" class="w-full border border-primary-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-primary-400" placeholder="如：两菜一汤"></div></div><div><label class="text-xs text-gray-400 block mb-2">选择菜品（点击选择）</label><div class="max-h-48 overflow-y-auto grid grid-cols-2 gap-2" id="tm-dishes">${dishes.map(d=>`<button data-action="tm-toggle" data-did="${d.id}" class="text-left text-xs p-2 rounded-lg border ${selItems.has(d.id)?'bg-primary-50 border-primary-400 text-primary-500':'border-primary-200 text-gray-600'}">${d.name}</button>`).join('')}</div></div><button data-action="save-tpl" data-tid="${tid||''}" class="w-full py-3 bg-primary-400 text-white rounded-xl font-medium active:scale-95 transition-transform">${isEdit?'保存修改':'添加模板'}</button></div></div>`)}
function showDayDetail(date){const el=$('#cal-detail');if(!el)return;const o=DB.orders().find(x=>x.order_date===date);if(!o){el.innerHTML=`<div class="bg-white rounded-xl border border-primary-50 p-4 text-center text-gray-400 text-sm">${fmtDate(date)} 周${weekDay(date)} — 休息</div>`;return}const items=typeof o.items==='string'?JSON.parse(o.items):o.items;const dishes=DB.getDishesByIds((items||[]).map(i=>i.did));el.innerHTML=`<div class="bg-white rounded-xl border border-primary-50 p-4 anim-fade"><div class="text-sm font-medium mb-2">${fmtDate(date)} 周${weekDay(date)}</div>${o.cancelled?`<div class="text-sm text-gray-400">${o.cancel_reason}</div>`:`<div class="flex flex-wrap gap-1.5 mb-2">${dishes.map(d=>`<span class="text-xs bg-primary-50 px-2 py-0.5 rounded">${d.name}</span>`).join('')}</div><div class="flex items-center gap-2 text-xs text-gray-400"><span class="status-dot ${o.status}"></span>${STATUS_LABELS[o.status]}${o.rating?(o.rating==='good'?'<span class="text-green-500 ml-1">好吃</span>':o.rating==='ok'?'<span class="text-amber-500 ml-1">一般</span>':'<span class="text-red-400 ml-1">别做了</span>'):''}</div>${o.remark?`<div class="text-xs text-primary-500 mt-1">${o.remark}</div>`:''}`}</div>`}
function showRecipeModal(did){const d=DB.getDish(did);if(!d||!d.recipe||!d.recipe.trim())return;const catEmoji={'荤菜':'🥩','素菜':'🥬','汤':'🍲','主食':'🍚','全部':'🍽️'};const emoji=DISH_EMOJIS[d.name]||catEmoji[d.category]||'🍽️';const steps=d.recipe.split('\n').filter(s=>s.trim());const wc=DB.dishWeekCount(d.id);let weekBadge='';if(wc>=3)weekBadge=`<span class="bg-gradient-to-br from-rose-400 to-pink-400 text-white text-xs px-2.5 py-1 rounded-full shadow-lg font-bold">本周${wc}次 🔥</span>`;else if(wc>=2)weekBadge=`<span class="bg-gradient-to-br from-amber-400 to-orange-400 text-white text-xs px-2.5 py-1 rounded-full shadow-lg font-bold">本周${wc}次 ✨</span>`;showModal(`<div class="p-5"><div class="flex items-center justify-between mb-4"><h3 class="font-display text-lg">${d.name}</h3><button data-action="close-modal" class="text-gray-400 p-1"><i class="fa-solid fa-xmark"></i></button></div><div class="flex items-center gap-3 mb-4"><div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-50 to-primary-100 flex items-center justify-center text-3xl shadow-sm">${emoji}</div><div class="flex-1"><div class="flex items-center gap-2 mb-1.5">${d.is_favorite?'<span class="text-base">⭐</span>':''}<span class="text-sm font-bold text-gray-800">${d.category}</span>${weekBadge}</div><div class="flex items-center gap-3 text-xs text-gray-400"><span class="flex items-center gap-1"><i class="fa-solid fa-clock text-primary-300"></i> ${d.cook_time}分钟</span><span class="flex items-center gap-1"><i class="fa-solid fa-yen-sign text-primary-300"></i> ~${d.cost_estimate}元</span></div></div></div>${(d.ingredients||[]).length?`<div class="mb-4"><div class="text-xs text-gray-400 mb-2 font-medium">食材</div><div class="flex flex-wrap gap-1.5">${(d.ingredients||[]).map(i=>`<span class="text-xs bg-primary-50 text-gray-600 px-2.5 py-1 rounded-lg">${i}</span>`).join('')}</div></div>`:''}<div><div class="text-xs text-gray-400 mb-2 font-medium">做法步骤</div><div class="space-y-3">${steps.map((s,i)=>`<div class="flex items-start gap-3"><div class="w-6 h-6 shrink-0 rounded-full bg-gradient-to-br from-primary-400 to-pink-400 flex items-center justify-center text-white text-xs font-bold shadow-sm">${i+1}</div><div class="flex-1 text-sm text-gray-700 leading-relaxed pt-0.5">${s}</div></div>`).join('')}</div></div></div>`)}

/* ============================================================
   全局快捷函数（用于绕过事件委托问题）
   ============================================================ */
window.submitOrderDirect = async function() {
  console.log('✅ 直接调用 submitOrderDirect！');
  const remark = document.getElementById('order-remark')?.value || '';
  closeModal();
  const result = await DB.addOrder([..._selDishes], remark);
  if (result) {
    _selDishes.clear();
    setTimeout(() => go('wife/waiting'), 600);
  }
};

/* ============================================================
   事件处理
   ============================================================ */
document.addEventListener('click', async e => {
  console.log('✅ 点击事件触发！', e.target);
  const btn = e.target.closest('[data-action]');
  console.log('✅ 找到按钮：', btn);
  if (!btn) return;
  const a = btn.dataset.action;
  const d = btn.dataset;
  console.log('✅ 执行 action：', a);
  
  switch (a) {
    case 'select-role':
      localStorage.setItem('pp_role', d.role);
      go(d.role === 'wife' ? 'wife/home' : 'hubby/home');
      break;
      
    case 'switch-role':
      localStorage.removeItem('pp_role');
      go('role-select');
      break;
      
    case 'cat-filter': {
      _selCats = d.cat;
      const list = $('#dish-list');
      if (list) list.innerHTML = renderDishGrid(DB.dishes());
      $$('#cat-tabs .tab-btn').forEach(b => {
        if (b.dataset.cat === _selCats) {
          b.className = b.className.replace(/border-primary-200 text-gray-600/g, 'bg-primary-400 text-white border-primary-400');
        } else {
          b.className = b.className.replace(/bg-primary-400 text-white border-primary-400/g, 'border-primary-200 text-gray-600');
        }
      });
      break;
    }
      
    case 'toggle-dish':
      if (_selDishes.has(d.did)) {
        _selDishes.delete(d.did);
      } else {
        _selDishes.add(d.did);
        celebrateSelect();
      }
      refreshSelBar();
      $$('.dish-card').forEach(c => {
        if (c.dataset.did === d.did) {
          c.classList.toggle('sel', _selDishes.has(d.did));
        }
      });
      break;
      
    case 'go-confirm':
      showConfirmModal();
      break;
      
    case 'submit-order': {
      const remark = $('#order-remark')?.value || '';
      closeModal();
      const result = await DB.addOrder([..._selDishes], remark);
      if (result) {
        _selDishes.clear();
        setTimeout(() => go('wife/waiting'), 600);
      }
      break;
    }
      
    case 'reorder': {
      const o = DB.orders().find(x => x.id === d.oid);
      if (o) {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        _selDishes = new Set((items || []).map(i => i.did));
        refreshSelBar();
        toast('已选好，可修改后提交', 'info');
      }
      break;
    }
      
    case 'apply-tpl': {
      const t = DB.templates().find(x => x.id === d.tid);
      if (t) {
        const items = typeof t.items === 'string' ? JSON.parse(t.items) : t.items;
        _selDishes = new Set(items);
        refreshSelBar();
        toast('已选好，可修改后提交', 'info');
      }
      break;
    }
      
    case 'random-meal': {
      const dishes = DB.dishes();
      const w3 = Date.now() - 3 * 864e5;
      const recent = new Set();
      DB.orders().filter(o => o.created_at && new Date(o.created_at).getTime() > w3 && !o.cancelled).forEach(o => {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        (items || []).forEach(i => recent.add(i.did));
      });
      const cats = {'荤菜': 2, '素菜': 1, '汤': 1};
      const picked = [];
      for (const [cat, n] of Object.entries(cats)) {
        const pool = dishes.filter(dd => dd.category === cat && !recent.has(dd.id) && !picked.includes(dd.id));
        const src = pool.length >= n ? pool : dishes.filter(dd => dd.category === cat && !picked.includes(dd.id));
        for (let i = 0; i < n && src.length; i++) {
          const idx = Math.floor(Math.random() * src.length);
          picked.push(src[idx].id);
          src.splice(idx, 1);
        }
      }
      _selDishes = new Set(picked);
      refreshSelBar();
      toast('随机选好了，不满意可以换', 'success');
      break;
    }
      
    case 'mark-no-cook':
      showNoCookModal();
      break;
      
    case 'save-no-cook':
      await DB.setNoCook(DB.today(), decodeURIComponent(d.reason));
      closeModal();
      renderCurrentPage();
      break;
      
    case 'save-no-cook-custom': {
      const v = $('#no-cook-custom')?.value || '不做饭';
      await DB.setNoCook(DB.today(), v);
      closeModal();
      renderCurrentPage();
      break;
    }
      
    case 'rate': {
      const o = DB.todayOrder();
      if (o) {
        await DB.updateOrder(o.id, {rating: d.r});
        toast(d.r === 'good' ? '谢谢老婆!' : d.r === 'ok' ? '下次改进!' : '好吧...', d.r === 'good' ? 'success' : 'info');
        if (d.r === 'good') showConfetti();
        setTimeout(() => go('wife/home'), 1500);
      }
      break;
    }
      
    case 'wife-modify': {
      const o = DB.todayOrder();
      if (o && (o.status === 'ordered' || o.status === 'seen')) {
        await DB.updateOrder(o.id, {status: 'ordered'});
        go('wife/home');
      }
      break;
    }
      
    case 'update-status': {
      const o = DB.todayOrder();
      if (o) {
        await DB.updateOrder(o.id, {status: d.st});
        toast(STATUS_LABELS[d.st], 'success');
        renderCurrentPage();
      }
      break;
    }
      
    case 'cancel-order':
      showCancelModal(d.oid);
      break;
      
    case 'do-cancel': {
      await DB.updateOrder(d.oid, {cancelled: true, cancel_reason: decodeURIComponent(d.reason), status: 'cancelled'});
      closeModal();
      toast('已取消', 'info');
      renderCurrentPage();
      break;
    }
      
    case 'do-cancel-custom': {
      const v = $('#cancel-custom')?.value || '';
      if (!v.trim()) {
        toast('请填写原因', 'warn');
        return;
      }
      await DB.updateOrder(d.oid, {cancelled: true, cancel_reason: v, status: 'cancelled'});
      closeModal();
      toast('已取消', 'info');
      renderCurrentPage();
      break;
    }
      
    case 'toggle-inv': {
      const name = decodeURIComponent(d.name);
      await DB.setInv(name, !DB.hasInv(name));
      renderCurrentPage();
      break;
    }
      
    case 'cancel-no-cook':
      await DB.cancelNoCook(DB.today());
      renderCurrentPage();
      break;
      
    case 'wife-tab':
      go('wife/' + d.tab);
      break;
      
    case 'hubby-tab':
      go('hubby/' + d.tab);
      break;
      
    case 'manage-tab':
      _manageTab = d.mt;
      renderCurrentPage();
      break;
      
    case 'add-dish':
      showDishModal(null);
      break;
      
    case 'edit-dish':
      showDishModal(d.did);
      break;
      
    case 'save-dish': {
      const name = $('#dm-name')?.value?.trim();
      if (!name) {
        toast('请输入菜名', 'warn');
        return;
      }
      const cat = $('#dm-cat')?.value;
      const time = parseInt($('#dm-time')?.value) || 15;
      const cost = parseInt($('#dm-cost')?.value) || 10;
      const ing = ($('#dm-ing')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
      const recipe = ($('#dm-recipe')?.value || '').trim();
      const fav = $('#dm-fav')?.checked || false;
      const existing = d.did ? DB.getDish(d.did) : null;
      const dishObj = {
        id: d.did || uid(),
        name,
        category: cat,
        ingredients: ing,
        cook_time: time,
        cost_estimate: cost,
        is_favorite: fav,
        recipe
      };
      if (existing) dishObj._exists = true;
      await DB.saveDish(dishObj);
      closeModal();
      toast(d.did ? '已保存' : '已添加', 'success');
      renderCurrentPage();
      break;
    }
      
    case 'del-dish':
      await DB.deleteDish(d.did);
      toast('已删除', 'info');
      renderCurrentPage();
      break;
      
    case 'add-tpl':
      showTplModal(null);
      break;
      
    case 'edit-tpl':
      showTplModal(d.tid);
      break;
      
    case 'tm-toggle': {
      if (!window._tmSel) window._tmSel = new Set();
      if (window._tmSel.has(d.did)) {
        window._tmSel.delete(d.did);
      } else {
        window._tmSel.add(d.did);
      }
      $$('#tm-dishes button').forEach(b => {
        if (b.dataset.did === d.did) {
          if (window._tmSel.has(d.did)) {
            b.className = b.className.replace('border-primary-200 text-gray-600', 'bg-primary-50 border-primary-400 text-primary-500');
          } else {
            b.className = b.className.replace('bg-primary-50 border-primary-400 text-primary-500', 'border-primary-200 text-gray-600');
          }
        }
      });
      break;
    }
      
    case 'save-tpl': {
      const name = $('#tm-name')?.value?.trim();
      if (!name) {
        toast('请输入模板名称', 'warn');
        return;
      }
      const desc = $('#tm-desc')?.value?.trim();
      const items = [...(window._tmSel || [])];
      const existing = d.tid ? DB.templates().find(x => x.id === d.tid) : null;
      const tplObj = {
        id: d.tid || uid(),
        name,
        description: desc,
        icon: 'fa-utensils',
        items
      };
      if (existing) tplObj._exists = true;
      await DB.saveTpl(tplObj);
      window._tmSel = null;
      closeModal();
      toast(d.tid ? '已保存' : '已添加', 'success');
      renderCurrentPage();
      break;
    }
      
    case 'del-tpl':
      await DB.deleteTpl(d.tid);
      toast('已删除', 'info');
      renderCurrentPage();
      break;
      
    case 'cal-day':
      showDayDetail(d.date);
      break;
      
    case 'save-anni': {
      const v = $('#anni-input')?.value || '';
      await DB.saveSetting('anni', v);
      toast('已保存', 'success');
      break;
    }
      
    case 'export-data': {
      const orders = DB.orders();
      let csv = '\uFEFF日期,状态,菜品,备注,评价\n';
      orders.forEach(o => {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        const names = DB.getDishesByIds((items || []).map(i => i.did)).map(d => d.name).join('+');
        const rating = o.rating === 'good' ? '好吃' : o.rating === 'ok' ? '一般' : o.rating === 'bad' ? '别做了' : '';
        csv += `${o.order_date},${o.cancelled ? '取消' : STATUS_LABELS[o.status]},"${names}","${o.remark || ''}","${rating}"\n`;
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `小跟班点菜记录_${DB.today()}.csv`;
      a.click();
      toast('已导出', 'success');
      break;
    }
      
    case 'show-recipe':
      showRecipeModal(d.did);
      break;
      
    case 'close-modal':
      closeModal();
      break;
  }
});

function refreshSelBar(){const bar=$('#sel-bar');if(!bar)return;const count=_selDishes.size;bar.style.display=count>0?'block':'none';const ce=$('#sel-count');if(ce)ce.textContent=count;const co=$('#sel-cost');if(co){const dishes=DB.getDishesByIds([..._selDishes]);const total=dishes.reduce((s,d)=>s+(d.cost_estimate||0),0);co.textContent=`~${total}元`}}

/* 自动刷新等待页文案 */
setInterval(()=>{const m=$('#status-msg');if(m&&currentPage==='wife/waiting'){const o=DB.todayOrder();if(o){const msgs=STATUS_MSGS[o.status];if(msgs)m.textContent=pick(msgs.wife||msgs)}}},4000);

/* Service Worker 注册 */
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

/* 启动 */
initRouter();
createParticles();
</script>
