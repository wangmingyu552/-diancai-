  <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>盼盼老婆请点菜</title>
  <meta name="theme-color" content="#FF6B9D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="点菜">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
  tailwind.config={theme:{extend:{colors:{
    primary:{50:'#FFF0F5',100:'#FFE0EC',200:'#FFB3D1',300:'#FF8FB8',400:'#FF6B9D',500:'#FF4D82',600:'#E63268',700:'#CC1F52'},
    accent:{50:'#FFF7ED',100:'#FFEDD5',200:'#FED7AA',300:'#FDBA74',400:'#FB923C',500:'#F97316'},
    text:{main:'#2D2D2D',sub:'#8E8E93',light:'#C7C7CC'}
  },fontFamily:{display:['ZCOOL KuaiLe','cursive'],body:['Noto Sans SC','sans-serif']}}}}
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  ::-webkit-scrollbar{display:none}
  html,body{height:100%}
  body{overscroll-behavior:none;margin:0;position:relative;z-index:1}

  /* ============================================
    炫酷动态渐变背景 - 专业升级版
    ============================================ */
  @keyframes gradientBG{
    0%{background-position:0% 50%}
    25%{background-position:50% 100%}
    50%{background-position:100% 50%}
    75%{background-position:50% 0%}
    100%{background-position:0% 50%}
  }
  @keyframes aurora{
    0%,100%{opacity:0.3;transform:translate(0,0) scale(1)}
    33%{opacity:0.5;transform:translate(30px,-20px) scale(1.1)}
    66%{opacity:0.4;transform:translate(-20px,30px) scale(0.95)}
  }
  .bg-gradient-couple{
    background:
      radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,218,233,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 40% 60%, rgba(255,240,245,0.6) 0%, transparent 50%),
      linear-gradient(135deg, #FFF5F7 0%, #FFE4EC 25%, #FFF0F6 50%, #FFFAF0 75%, #FFF5F7 100%);
    background-size:400% 400%;
    animation:gradientBG 20s ease infinite;
    background-attachment:fixed;
    position:relative;
  }
  .bg-gradient-couple::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 15% 85%, rgba(255,107,157,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(255,143,179,0.06) 0%, transparent 40%);
    animation:aurora 8s ease-in-out infinite;
    pointer-events:none;
    z-index:0;
  }

  /* 漂浮装饰元素 */
  .deco-heart,.deco-star,.deco-sparkle{
    position:fixed;
    pointer-events:none;
    z-index:0;
    opacity:.6;
    user-select:none;
  }
  .deco-heart{animation:floatAround 8s ease-in-out infinite}
  .deco-star{animation:floatAround 10s ease-in-out infinite reverse}
  .deco-sparkle{animation:sparkle 3s ease-in-out infinite}

  /* 粒子容器 */
  #particles{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:0;
    overflow:hidden;
  }

  /* 主应用容器 */
  #app{
    position:relative;
    z-index:10;
    min-height:100vh;
  }

  /* ============================================
    高级毛玻璃效果 - 专业升级版
    ============================================ */
  .glass-ultra{
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(60px);
    -webkit-backdrop-filter:blur(60px);
    border:1px solid rgba(255,255,255,0.5);
    box-shadow:
      0 20px 60px rgba(255,107,157,0.12),
      0 8px 24px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .glass-card{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:
      0 12px 40px rgba(255,107,157,0.1),
      0 4px 12px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* ============================================
    动画库 - 专业升级版
    ============================================ */
  /* 漂浮动画 */
  @keyframes float1{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(15px,-20px) rotate(4deg)}50%{transform:translate(25px,-35px) rotate(-3deg)}75%{transform:translate(15px,-25px) rotate(3deg)}}
  @keyframes float2{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-18px,-18px) rotate(-4deg)}50%{transform:translate(-28px,-28px) rotate(3deg)}75%{transform:translate(-15px,-22px) rotate(-2deg)}}
  @keyframes float3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(12px,-15px) scale(1.08)}66%{transform:translate(-8px,-20px) scale(0.92)}}
  .anim-float1{animation:float1 7s ease-in-out infinite}
  .anim-float2{animation:float2 8s ease-in-out infinite}
  .anim-float3{animation:float3 6s ease-in-out infinite}

  /* 入场动画 */
  @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes bounceIn{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.08)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
  @keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  .anim-fade{animation:fadeUp .6s cubic-bezier(.25,.46,.45,.94) both}
  .anim-slide{animation:slideUp .5s cubic-bezier(.25,.46,.45,.94) both}
  .anim-bounce{animation:bounceIn .7s cubic-bezier(.68,-.55,.265,1.55) both}
  .anim-scale{animation:scaleIn .4s ease-out both}
  .anim-slide-right{animation:slideInRight .4s ease-out both}

  /* 脉冲和发光 */
  @keyframes pulseSoft{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
  @keyframes glow{0%,100%{box-shadow:0 0 25px rgba(255,107,157,0.35)}50%{box-shadow:0 0 50px rgba(255,107,157,0.55),0 0 80px rgba(255,107,157,0.25)}}
  @keyframes glowStrong{0%,100%{box-shadow:0 0 30px rgba(255,107,157,0.45)}50%{box-shadow:0 0 60px rgba(255,107,157,0.7),0 0 100px rgba(255,107,157,0.3)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.35)}28%{transform:scale(1)}42%{transform:scale(1.35)}70%{transform:scale(1)}}
  @keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(150px) rotate(1080deg);opacity:0}}
  @keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
  @keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  @keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
  @keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
  @keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
  @keyframes floatAround{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-15px) rotate(5deg)}50%{transform:translate(-5px,-25px) rotate(-3deg)}75%{transform:translate(-15px,-10px) rotate(3deg)}}
  @keyframes fadeInScale{0%{opacity:0;transform:scale(.8) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}

  /* ========== 超级炫酷动画增强版 ========== */
  @keyframes pulseUltra{
    0%,100%{transform:scale(1);opacity:1}
    25%{transform:scale(1.1);opacity:0.9}
    50%{transform:scale(1.05);opacity:1}
    75%{transform:scale(1.15);opacity:0.85}
  }
  @keyframes glowPulse{
    0%,100%{
      transform:scale(1);
      opacity:0.4;
      filter:blur(25px);
    }
    33%{
      transform:scale(1.2);
      opacity:0.6;
      filter:blur(35px);
    }
    66%{
      transform:scale(1.1);
      opacity:0.5;
      filter:blur(30px);
    }
  }
  @keyframes ringExpand{
    0%{
      transform:scale(0.8);
      opacity:0.6;
    }
    50%{
      transform:scale(1.1);
      opacity:0.3;
    }
    100%{
      transform:scale(1.3);
      opacity:0;
    }
  }
  @keyframes orbit{
    0%{transform:rotate(0deg) translateX(15px) rotate(0deg)}
    100%{transform:rotate(360deg) translateX(15px) rotate(-360deg)}
  }
  @keyframes orbitReverse{
    0%{transform:rotate(360deg) translateX(25px) rotate(-360deg)}
    100%{transform:rotate(0deg) translateX(25px) rotate(0deg)}
  }
  @keyframes shimmerUltra{
    0%{background-position:-200% center}
    100%{background-position:200% center}
  }
  @keyframes breathe{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.02)}
  }
  @keyframes float3d{
    0%,100%{
      transform:translateY(0) rotateX(0deg) rotateY(0deg);
    }
    25%{
      transform:translateY(-10px) rotateX(5deg) rotateY(5deg);
    }
    50%{
      transform:translateY(-5px) rotateX(0deg) rotateY(-5deg);
    }
    75%{
      transform:translateY(-15px) rotateX(-5deg) rotateY(3deg);
    }
  }
  @keyframes glowRotate{
    0%{
      transform:rotate(0deg) scale(1);
      opacity:0.5;
    }
    50%{
      transform:rotate(180deg) scale(1.2);
      opacity:0.7;
    }
    100%{
      transform:rotate(360deg) scale(1);
      opacity:0.5;
    }
  }
  @keyframes particleRing{
    0%{
      transform:rotate(0deg);
      opacity:0.8;
    }
    100%{
      transform:rotate(360deg);
      opacity:0.8;
    }
  }
  @keyframes bounceUltra{
    0%,100%{
      transform:translateY(0) scale(1);
    }
    10%{
      transform:translateY(0) scale(1.1,0.9);
    }
    30%{
      transform:translateY(-20px) scale(0.95,1.05);
    }
    50%{
      transform:translateY(0) scale(1.05,0.95);
    }
    70%{
      transform:translateY(-7px) scale(1);
    }
  }
  @keyframes slideInBounce{
    0%{
      opacity:0;
      transform:translateY(50px) scale(0.8);
    }
    60%{
      opacity:1;
      transform:translateY(-10px) scale(1.05);
    }
    80%{
      transform:translateY(5px) scale(0.98);
    }
    100%{
      transform:translateY(0) scale(1);
    }
  }
  @keyframes glowBorder{
    0%,100%{
      box-shadow:
        0 0 5px currentColor,
        0 0 10px currentColor,
        0 0 15px currentColor;
    }
    50%{
      box-shadow:
        0 0 10px currentColor,
        0 0 20px currentColor,
        0 0 30px currentColor,
        0 0 40px currentColor;
    }
  }
  @keyframes morph{
    0%,100%{border-radius:50% 50% 50% 50% / 50% 50% 50% 50%}
    25%{border-radius:60% 40% 60% 40% / 40% 60% 40% 60%}
    50%{border-radius:40% 60% 40% 60% / 60% 40% 60% 40%}
    75%{border-radius:50% 30% 50% 70% / 60% 40% 60% 40%}
  }
  @keyframes wave{
    0%,100%{transform:rotate(-3deg)}
    25%{transform:rotate(3deg)}
    50%{transform:rotate(-2deg)}
    75%{transform:rotate(2deg)}
  }
  @keyframes spinPulse{
    0%{transform:rotate(0deg) scale(1)}
    50%{transform:rotate(180deg) scale(1.1)}
    100%{transform:rotate(360deg) scale(1)}
  }
  @keyframes ringBreathe{
    0%,100%{
      transform:scale(1);
      opacity:0.15;
    }
    50%{
      transform:scale(1.08);
      opacity:0.3;
    }
  }

  /* 动画类 */
  .anim-pulse{animation:pulseSoft 2s ease-in-out infinite}
  .anim-pulse-ultra{animation:pulseUltra 1.5s ease-in-out infinite}
  .anim-glow{animation:glow 2.5s ease-in-out infinite}
  .anim-glow-strong{animation:glowStrong 2s ease-in-out infinite}
  .anim-glow-pulse{animation:glowPulse 3s ease-in-out infinite}
  .anim-heartbeat{animation:heartBeat 1.3s ease-in-out infinite}
  .anim-wiggle{animation:wiggle .5s ease-in-out infinite}
  .anim-pop{animation:popIn .4s cubic-bezier(.68,-.55,.265,1.55) both}
  .anim-fade-scale{animation:fadeInScale .5s ease-out both}
  .anim-rainbow{animation:rainbow 3s linear infinite}
  .anim-float-around{animation:floatAround 6s ease-in-out infinite}
  .anim-orbit{animation:orbit 4s linear infinite}
  .anim-orbit-reverse{animation:orbitReverse 6s linear infinite}
  .anim-breathe{animation:breathe 3s ease-in-out infinite}
  .anim-float-3d{animation:float3d 5s ease-in-out infinite}
  .anim-glow-rotate{animation:glowRotate 4s linear infinite}
  .anim-bounce-ultra{animation:bounceUltra 1s ease-in-out}
  .anim-slide-bounce{animation:slideInBounce 0.6s cubic-bezier(.68,-.55,.265,1.55) both}
  .anim-glow-border{animation:glowBorder 2s ease-in-out infinite}
  .anim-morph{animation:morph 8s ease-in-out infinite}
  .anim-wave{animation:wave 2s ease-in-out infinite}
  .anim-spin-pulse{animation:spinPulse 2s ease-in-out infinite}

  /* 逐个进入动画延迟类 */
  .stagger-1{animation-delay:.05s}
  .stagger-2{animation-delay:.1s}
  .stagger-3{animation-delay:.15s}
  .stagger-4{animation-delay:.2s}
  .stagger-5{animation-delay:.25s}
  .stagger-6{animation-delay:.3s}
  .stagger-7{animation-delay:.35s}
  .stagger-8{animation-delay:.4s}
  .stagger-9{animation-delay:.45s}
  .stagger-10{animation-delay:.5s}
  .stagger-11{animation-delay:.55s}
  .stagger-12{animation-delay:.6s}
  .stagger-13{animation-delay:.65s}
  .stagger-14{animation-delay:.7s}
  .stagger-15{animation-delay:.75s}
  .stagger-16{animation-delay:.8s}
  .stagger-17{animation-delay:.85s}
  .stagger-18{animation-delay:.9s}
  .stagger-19{animation-delay:.95s}
  .stagger-20{animation-delay:1s}
  .stagger-21{animation-delay:1.05s}
  .stagger-22{animation-delay:1.1s}
  .stagger-23{animation-delay:1.15s}
  .stagger-24{animation-delay:1.2s}
  .stagger-25{animation-delay:1.25s}
  .stagger-26{animation-delay:1.3s}
  .stagger-27{animation-delay:1.35s}
  .stagger-28{animation-delay:1.4s}
  .stagger-29{animation-delay:1.45s}
  .stagger-30{animation-delay:1.5s}

  /* ============================================
    性能优化 - GPU 加速
    ============================================ */
  .gpu-accelerate{
    transform:translateZ(0);
    backface-visibility:hidden;
    perspective:1000px;
  }
  .will-change-transform{will-change:transform}
  .will-change-opacity{will-change:opacity}
  .will-change-all{will-change:transform,opacity}

  /* 减少动画在低端设备上的消耗 */
  @media(prefers-reduced-motion:reduce){
    *,*::before,*::after{
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
  }

  /* ============================================
    响应式布局 - 桌面端优化
    ============================================ */
  /* 平板尺寸 (≥ 640px) */
  @media(min-width:640px){
    .modal-mask{
      align-items:center !important;
    }
  }

  /* 桌面端小屏幕 (≥ 768px) */
  @media(min-width:768px){
    /* 主应用容器居中，限制最大宽度 */
    #app{
      max-width:768px;
      margin:0 auto;
      box-shadow:0 0 60px rgba(255,107,157,0.15);
    }
    
    /* 侧边栏优化 */
    .sidebar{
      max-width:320px !important;
    }
    
    /* 模态框更宽一点 */
    .modal-mask .bg-white{
      max-width:480px !important;
      border-radius:28px !important;
    }
    
    /* Toast 位置优化 */
    .toast-container{
      top:30px;
    }
  }

  /* 桌面端中等屏幕 (≥ 1024px) */
  @media(min-width:1024px){
    #app{
      max-width:480px;
    }
    
    /* 模态框更大一点 */
    .modal-mask .bg-white{
      max-width:520px !important;
    }
  }

  /* 桌面端大屏幕 (≥ 1280px) */
  @media(min-width:1280px){
    /* 可以在左右添加装饰 */
    body::before,
    body::after{
      content:'';
      position:fixed;
      top:0;
      bottom:0;
      width:calc((100vw - 480px) / 2);
      z-index:1;
      pointer-events:none;
    }
    body::before{
      left:0;
      background:
        radial-gradient(ellipse at 80% 30%, rgba(255,182,193,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(255,218,233,0.2) 0%, transparent 50%);
    }
    body::after{
      right:0;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(255,218,233,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 70%, rgba(255,182,193,0.2) 0%, transparent 50%);
    }
  }

  /* 横屏优化 */
  @media(orientation:landscape) and (max-height:500px){
    /* 横屏时模态框调整 */
    .modal-mask .bg-white{
      max-height:90vh !important;
    }
    
    /* 调整一些垂直间距 */
    .modal-body-pro{
      max-height:45vh !important;
    }
  }

  /* ============================================
    菜品卡片 - 专业炫酷版
    ============================================ */
  .dish-card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:
      0 8px 32px rgba(255,107,157,0.1),
      0 2px 8px rgba(0,0,0,0.03),
      inset 0 1px 0 rgba(255,255,255,0.7);
    transition:all .35s cubic-bezier(.34,1.56,.64,1);
    position:relative;
    overflow:hidden;
  }
  .dish-card::before{
    content:'';
    position:absolute;
    inset:-2px;
    background:linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,143,179,0.06), rgba(255,182,193,0.08));
    border-radius:26px;
    opacity:0;
    transition:opacity .35s ease;
    pointer-events:none;
    z-index:0;
  }
  .dish-card::after{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50%;
    background:linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
    border-radius:24px 24px 0 0;
    pointer-events:none;
    opacity:0.6;
  }
  .dish-card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:
      0 20px 60px rgba(255,107,157,0.18),
      0 8px 24px rgba(0,0,0,0.06),
      inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .dish-card:hover::before{opacity:1}
  .dish-card:active{transform:translateY(-2px) scale(.98)}
  .dish-card.sel{
    background:linear-gradient(135deg, rgba(255,240,245,0.9), rgba(255,250,240,0.85));
    border:2px solid rgba(255,107,157,0.6);
    box-shadow:
      0 16px 48px rgba(255,107,157,0.25),
      0 0 0 6px rgba(255,107,157,0.1),
      inset 0 1px 0 rgba(255,255,255,0.85);
    transform:translateY(-4px) scale(1.03);
  }
  .dish-card.sel::before{
    opacity:1;
    background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.12), rgba(255,182,193,0.15));
  }
  .dish-card.sel::after{
    opacity:0.8;
  }

  /* ============================================
    图标容器 - 专业炫酷版
    ============================================ */
  .emoji-container{
    position:relative;
    z-index:1;
  }
  .emoji-container::before{
    content:'';
    position:absolute;
    inset:-4px;
    background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.1));
    border-radius:inherit;
    filter:blur(8px);
    opacity:0;
    transition:opacity .35s ease;
    z-index:-1;
  }
  .emoji-container:hover::before{opacity:1}
  .sel .emoji-container::before{opacity:1}

  /* ============================================
    渐变按钮 - 专业发光版
    ============================================ */
  .btn-primary{
    background:linear-gradient(135deg, #FF6B9D 0%, #FF8FB8 30%, #FFB3D1 70%, #FF6B9D 100%);
    background-size:300% 300%;
    color:white;
    box-shadow:
      0 8px 32px rgba(255,107,157,0.4),
      0 0 0 1px rgba(255,255,255,0.25) inset;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    position:relative;
    overflow:hidden;
  }
  .btn-primary::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.15));
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
  }
  .btn-primary:hover{
    background-position:100% 100%;
    transform:translateY(-2px);
    box-shadow:
      0 16px 48px rgba(255,107,157,0.5),
      0 0 0 1px rgba(255,255,255,0.3) inset;
  }
  .btn-primary:hover::before{opacity:1}
  .btn-primary:active{
    transform:translateY(0) scale(.97);
    box-shadow:
      0 6px 20px rgba(255,107,157,0.3),
      0 0 0 1px rgba(255,255,255,0.2) inset;
  }

  /* ============================================
    分类标签按钮 - 专业版
    ============================================ */
  .cat-btn{
    border-radius:100px;
    transition:all .35s cubic-bezier(.34,1.56,.64,1);
    border:1.5px solid transparent;
    position:relative;
    overflow:hidden;
  }
  .cat-btn::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(255,107,157,0.08), transparent);
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
  }
  .cat-btn:hover::before{opacity:1}
  .cat-btn.active{
    background:linear-gradient(135deg, #FF6B9D, #FF8FB8, #FFB3D1);
    background-size:200% 200%;
    color:white;
    border-color:transparent;
    box-shadow:
      0 8px 28px rgba(255,107,157,0.35),
      0 0 0 1px rgba(255,255,255,0.25) inset;
    transform:translateY(-2px) scale(1.03);
  }
  .cat-btn:not(.active){
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);
    border-color:rgba(255,107,157,0.18);
    color:#444;
  }
  .cat-btn:not(.active):hover{
    background:rgba(255,255,255,0.8);
    border-color:rgba(255,107,157,0.3);
    transform:translateY(-1px);
    box-shadow:0 6px 20px rgba(255,107,157,0.12);
  }

  /* ============================================
    Tab 按钮 - 专业版
    ============================================ */
  .tab-btn{
    transition:all .35s cubic-bezier(.34,1.56,.64,1);
    position:relative;
    min-height:56px;
  }
  .tab-btn.active{
    color:#FF6B9D;
    font-weight:600;
  }
  .tab-btn.active::after{
    content:'';
    position:absolute;
    bottom:-3px;
    left:50%;
    transform:translateX(-50%);
    width:32px;
    height:4px;
    background:linear-gradient(90deg, #FF6B9D, #FF8FB8, #FFB3D1);
    border-radius:4px;
    box-shadow:0 4px 12px rgba(255,107,157,0.4);
  }

  /* 确保图标不干扰点击事件 */
  .tab-btn i, .tab-btn .fa-solid {
    pointer-events: none;
  }

  /* 底部导航按钮确保填满区域 */
  nav.fixed button {
    position: relative;
    z-index: 1;
  }
  nav.fixed button > * {
    pointer-events: none;
  }

  /* 全局：确保所有带 data-action 的按钮的子元素不干扰点击 */
  [data-action] > * {
    pointer-events: none;
  }
  [data-action] i,
  [data-action] span,
  [data-action] .fa-solid {
    pointer-events: none;
  }

  /* ============================================
    模态框 - 专业版
    ============================================ */
  .modal-mask{
    background:rgba(0,0,0,0.15);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    z-index:100;
  }

  /* ============================================
    状态点 - 专业版
    ============================================ */
  .status-dot{
    width:12px;
    height:12px;
    border-radius:50%;
    display:inline-block;
    box-shadow:0 0 0 4px rgba(255,255,255,0.7);
    position:relative;
  }
  .status-dot::before{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    background:inherit;
    filter:blur(6px);
    opacity:0.4;
    animation:pulseSoft 2s ease-in-out infinite;
  }
  .status-dot.ordered{background:linear-gradient(135deg,#FF6B9D,#FF8FB8);animation:pulseSoft 1.2s infinite}
  .status-dot.seen{background:linear-gradient(135deg,#FF9F43,#FECA57)}

  .status-dot.cooking{background:linear-gradient(135deg,#A55EEA,#DDA0DD)}
  .status-dot.eating{background:linear-gradient(135deg,#26DE81,#2ED573)}

  /* ============================================
    安全区域
    ============================================ */
  .bottom-safe{padding-bottom:max(16px,env(safe-area-inset-bottom))}
  .top-safe{padding-top:max(0px,env(safe-area-inset-top))}

  /* ============================================
    输入框 - 专业版
    ============================================ */
  input,textarea,select{
    font-family:inherit;
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(15px);
    -webkit-backdrop-filter:blur(15px);

    border-radius:16px;

    transition:all .35s cubic-bezier(.34,1.56,.64,1);

      inset 0 1px 0 rgba(255,255,255,0.7);

    transform:translateY(-1px);

    侧边栏样式 - 专业炫酷版
    ============================================ */

    left:0;

    background:linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,240,245,0.9));

    炫酷卡片样式 - 专业升级版

    transition:all .4s cubic-bezier(.34,1.56,.64,1);

  .card-pro::before{
    content:'';

  /* ============================================

    炫酷统计卡片增强版 - 专业版
    ============================================ */
  .stat-card-ultra{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    padding:20px;
    transition:all .4s cubic-bezier(.34,1.56,.64,1);
    background:rgba(255,255,255,0.75);
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:
      0 16px 48px rgba(255,107,157,0.1),

  }
  .stat-card-ultra::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:50%;
    background:linear-gradient(180deg, rgba(255,255,255,0.5), transparent);
    pointer-events:none;

  .stat-card-ultra:hover{

    box-shadow:
      0 28px 80px rgba(255,107,157,0.18),

  .stat-icon-ultra{
    width:52px;
    height:52px;

    align-items:center;
    justify-content:center;

  /* ============================================
    炫酷大图标容器增强版 - 超级炫酷版
    ============================================ */
  .big-icon-ultra{
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transform-style:preserve-3d;
    perspective:1000px;
  }
  /* 第一层发光 - 最外层大光晕 */
  .big-icon-ultra .glow-layer-1{
    position:absolute;
    inset:-40px;
    border-radius:50%;
    filter:blur(35px);
    opacity:0.5;
    animation:glowPulse 3s ease-in-out infinite;
  }
  /* 第二层发光 - 中间层光晕 */
  .big-icon-ultra .glow-layer-2{
    position:absolute;
    inset:-20px;
    border-radius:50%;
    filter:blur(20px);
    opacity:0.4;
    animation:glowRotate 4s linear infinite;
  }
  /* 第三层发光 - 内层光晕（新增） */
  .big-icon-ultra::before{
    content:'';
    position:absolute;
    inset:-8px;
    border-radius:50%;
    background:inherit;
    filter:blur(10px);
    opacity:0.3;
    animation:breathe 2s ease-in-out infinite;
    z-index:0;
  }
  /* 第一层环 - 虚线旋转环 */
  .big-icon-ultra .ring-1{
    position:absolute;
    inset:-22px;
    border-radius:50%;
    border:2px dashed;
    opacity:0.5;
    animation:spin 15s linear infinite;
  }
  /* 第二层环 - 双点划线反向旋转环 */
  .big-icon-ultra .ring-2{
    position:absolute;
    inset:-35px;
    border-radius:50%;
    border:2px double;
    opacity:0.35;
    animation:spinPulse 8s ease-in-out infinite reverse;
  }
  /* 第三层环 - 呼吸环 */
  .big-icon-ultra .ring-3{
    position:absolute;
    inset:-48px;
    border-radius:50%;
    border:1px solid;
    opacity:0.2;
    animation:ringBreathe 4s ease-in-out infinite;
  }
  /* 第四层环 - 轨道环（新增） */
  .big-icon-ultra::after{
    content:'';
    position:absolute;
    inset:-55px;
    border-radius:50%;
    border:1px dashed;
    opacity:0.12;
    animation:spin 40s linear infinite reverse;
  }
  /* 内部图标容器 */
  .big-icon-ultra .inner-icon{
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    animation:
      breathe 3s ease-in-out infinite,
      float3d 6s ease-in-out infinite;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.2),
      0 15px 40px rgba(0,0,0,0.1),
      inset 0 4px 0 rgba(255,255,255,0.9),
      inset 0 -2px 0 rgba(0,0,0,0.05);
    transform-style:preserve-3d;
    transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  /* 鼠标悬停效果 */
  .big-icon-ultra:hover .inner-icon{
    transform:translateY(-5px) scale(1.05);
    box-shadow:
      0 40px 100px rgba(0,0,0,0.25),
      0 20px 50px rgba(0,0,0,0.15),
      inset 0 4px 0 rgba(255,255,255,0.9),
      inset 0 -2px 0 rgba(0,0,0,0.05);
  }

  /* ============================================
    炫酷时间线样式 - 专业版
    ============================================ */
  .timeline-pro{
    position:relative;
    padding-left:28px;
  }
  .timeline-pro::before{
    content:'';
    position:absolute;
    left:10px;
    top:8px;
    bottom:8px;
    width:3px;
    background:linear-gradient(180deg, #FF6B9D, #FF8FB8, #FFB3D1);
    border-radius:3px;
  }
  .timeline-item-pro{
    position:relative;
    padding-bottom:24px;
  }
  .timeline-item-pro:last-child{
    padding-bottom:0;
  }
  .timeline-dot-pro{
    position:absolute;
    left:-28px;
    top:4px;
    width:20px;
    height:20px;
    border-radius:50%;
    background:linear-gradient(135deg, #FF6B9D, #FF8FB8);
    border:3px solid white;
    box-shadow:
      0 4px 12px rgba(255,107,157,0.35),
      0 0 0 2px rgba(255,107,157,0.1);

  }
  .timeline-dot-pro.active{
    transform:scale(1.2);

  }
  .timeline-dot-pro.done{
    background:linear-gradient(135deg, #22C55E, #34D399);

      0 4px 12px rgba(34,197,94,0.35),
      0 0 0 2px rgba(34,197,94,0.1);

  .timeline-content-pro{
    background:rgba(255,255,255,0.7);

    padding:14px 16px;
    border:1px solid rgba(255,107,157,0.1);

  .timeline-content-pro:hover{
    transform:translateX(4px);
    box-shadow:0 8px 24px rgba(255,107,157,0.12);
  }
  .timeline-content-pro.active{
    background:linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,143,179,0.06));
    border-color:rgba(255,107,157,0.25);
  }

  /* ============================================

  /* ============================================
    炫酷工具提示 - 专业版
    ============================================ */
  .tooltip-pro{
    position:relative;
  }
  .tooltip-pro::after{
    content:attr(data-tooltip);
    position:absolute;
    bottom:100%;
    left:50%;
    transform:translateX(-50%) translateY(-8px);
    padding:8px 14px;
    background:rgba(30,30,40,0.95);
    backdrop-filter:blur(10px);
    color:white;
    font-size:12px;
    border-radius:10px;
    white-space:nowrap;
    opacity:0;
    visibility:hidden;
    transition:all .25s ease;
    box-shadow:
      0 8px 24px rgba(0,0,0,0.25),
      0 0 0 1px rgba(255,255,255,0.1) inset;
    z-index:1000;
  }
  .tooltip-pro::before{
    content:'';
    position:absolute;
    bottom:100%;
    left:50%;
    transform:translateX(-50%);
    border:6px solid transparent;
    border-top-color:rgba(30,30,40,0.95);
    opacity:0;
    visibility:hidden;
    transition:all .25s ease;
    z-index:1001;
  }
  .tooltip-pro:hover::after,
  .tooltip-pro:hover::before{
    opacity:1;
    visibility:visible;
  }
  .tooltip-pro:hover::after{
    transform:translateX(-50%) translateY(-12px);
  }

  /* ============================================
    Toast 提示 - 专业炫酷版
    ============================================ */
  .toast-container{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:2000;
    display:flex;
    flex-direction:column;
    gap:10px;
    pointer-events:none;
  }
  .toast{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 20px;
    background:rgba(30,30,40,0.9);
    backdrop-filter:blur(20px);

  /* ============================================

    async saveDish(d){
      const clean={};
      for(const k in d){
        if(k!=='_exists')clean[k]=d[k];
      }
      if(d._exists){
        const existing=this.getDish(d.id);
        // 更新前保存版本
        if(existing){
          await this.saveDishVersion(existing,'更新菜品');
        }
        const merged=existing?{...existing,...clean}:clean;
        const{error}=await sb.from('dishes').update(clean).eq('id',d.id);
        if(error){toast('保存失败：'+error.message,'error');return}
        const idx=this._dishes.findIndex(x=>x.id===d.id);
        if(idx>=0)this._dishes[idx]=merged;
      }else{
        const{error}=await sb.from('dishes').insert(clean);
        if(error){toast('添加失败：'+error.message,'error');return}
        this._dishes.push(clean);
      }
    },
    async deleteDish(id){
      await sb.from('dishes').delete().eq('id',id);
      const idx=this._dishes.findIndex(x=>x.id===id);
      if(idx>=0)this._dishes.splice(idx,1);
    },

    getAnniMilestones(){
      const anniInfo=this.getAnniInfo();
      if(!anniInfo)return [];
      const milestones=[
        {days:100,name:'百日纪念',icon:'💯'},
        {days:200,name:'双百日纪念',icon:'🌟'},
        {days:300,name:'三百日纪念',icon:'🎊'},
        {days:365,name:'一周年',icon:'🎂'},
        {days:500,name:'五百日纪念',icon:'✨'},
        {days:730,name:'两周年',icon:'🎂'},
        {days:1000,name:'千日纪念',icon:'🏆'},
        {days:1095,name:'三周年',icon:'🎂'},
        {days:1460,name:'四周年',icon:'🎂'},
        {days:1825,name:'五周年',icon:'🎂'}
      ];
      return milestones.map(m=>{
        const daysFromStart=m.days;
        const daysToMilestone=daysFromStart-anniInfo.daysTogether;
        return {...m,daysToMilestone,isToday:daysToMilestone===0,isPast:daysToMilestone<0,isUpcoming:daysToMilestone>0&&daysToMilestone<=30};
      });
    },

    getUpcomingSpecialDates(days=7){
      const today=new Date();
      const todayStr=this.today();
      return this._specialDates.map(sd=>{
        let targetDate,diff;
        if(sd.repeat_yearly){
          const sdDate=new Date(sd.date);
          targetDate=new Date(today.getFullYear(),sdDate.getMonth(),sdDate.getDate());
          if(targetDate<today)targetDate.setFullYear(today.getFullYear()+1);
          diff=Math.ceil((targetDate-today)/864e5);
        }else{
          targetDate=new Date(sd.date);
          diff=Math.ceil((targetDate-today)/864e5);
        }
        return {...sd,targetDate,daysLeft:diff};
      }).filter(sd=>sd.daysLeft>=0&&sd.daysLeft<=days);
    },

    getAnniInfo(){
      const anni=this.setting('anni','');
      if(!anni)return null;
      const today=new Date();
      const startDate=new Date(anni);
      
      const daysTogether=Math.floor((today-startDate)/864e5);
      
      let nextAnni=new Date(today.getFullYear(),startDate.getMonth(),startDate.getDate());
      if(nextAnni<today)nextAnni.setFullYear(today.getFullYear()+1);
      const daysToNext=Math.ceil((nextAnni-today)/864e5);
      
      const yearsTogether=Math.floor(daysTogether/365);
      const monthsTogether=Math.floor((daysTogether%365)/30);
      
      const isAnniToday=today.getMonth()===startDate.getMonth()&&today.getDate()===startDate.getDate();
      
      return {
        date:anni,
        daysTogether,
        daysToNext,
        yearsTogether,
        monthsTogether,
        isAnniToday,
        nextAnni
      };
    },

    isTodaySpecialDate(){
      const todayStr=this.today();
      const today=new Date();
      return this._specialDates.some(sd=>{
        if(sd.repeat_yearly){
          const sdDate=new Date(sd.date);
          return sdDate.getMonth()===today.getMonth()&&sdDate.getDate()===today.getDate();
        }else{
          return sd.date===todayStr;
        }

    _currentStatus: null,
    
    _loadCurrentStatus(){
      try{
        const local=localStorage.getItem('pp_current_status');
        if(local){
          this._currentStatus=JSON.parse(local);
          // 检查是否过期（只比较日期字符串，避免时间问题）
          if(this._currentStatus && this._currentStatus.endDate){
            const todayStr=new Date().toISOString().split('T')[0];
            if(this._currentStatus.endDate < todayStr){
              this._currentStatus=null;
              localStorage.removeItem('pp_current_status');
            }
          }
        }
      }catch(e){}
      return this._currentStatus;
    },
    
    _saveCurrentStatus(){
      try{
        if(this._currentStatus){

          localStorage.removeItem('pp_current_status');
        }
      }catch(e){}

      const scenario=scenarios.find(s=>s.id===scenarioId);

      const today=new Date();
      const endDate=new Date(today);
      endDate.setDate(today.getDate()+durationDays-1);
      
      this._currentStatus={
        scenarioId:scenario.id,
        name:scenario.name,
        icon:scenario.icon,
        color:scenario.color,
        description:scenario.description,
        tips:scenario.tips,
        startDate:today.toISOString().split('T')[0],
        endDate:endDate.toISOString().split('T')[0],
        durationDays,
        setAt:new Date().toISOString()
      };
      
      this._saveCurrentStatus();
      return this._currentStatus;

      if(!this._currentStatus)this._loadCurrentStatus();
      return this._currentStatus;

    clearCurrentStatus(){
      this._currentStatus=null;
      this._saveCurrentStatus();

    hasActiveStatus(){
      const status=this.getCurrentStatus();
      if(!status)return false;
      const todayStr=new Date().toISOString().split('T')[0];
      return status.endDate >= todayStr;

    getStatusDaysLeft(){
      const status=this.getCurrentStatus();
      if(!status)return 0;
      const today=new Date();
      today.setHours(0,0,0,0);
      const endDate=new Date(status.endDate);
      endDate.setHours(0,0,0,0);
      return Math.ceil((endDate-today)/864e5)+1;

    // 给菜品打分（针对某个场景）
    _scoreDishForScenario(d,scenario){
      let score=0;
      
      // 辣度检查
      const spicyLevel=d.spicy_level||0;
      if(spicyLevel>(scenario.maxSpicy||3))return -100; // 直接排除
      
      // 标签匹配
      const tags=this._getDishTags(d);
      scenario.includeTags.forEach(tag=>{
        if(tags.includes(tag))score+=10;
      });
      scenario.excludeTags.forEach(tag=>{
        if(tags.includes(tag))score-=20;
      });
      
      // 分类偏好
      if(scenario.preferredCategories.includes(d.category))score+=5;
      
      // 收藏加分
      if(d.is_favorite)score+=15;
      
      // 难度加分（简单优先）
      if(d.difficulty==='简单')score+=3;
      else if(d.difficulty==='中等')score+=1;
      
      return score;
    },

    // 根据场景推荐菜品
    recommendForScenario(scenarioId){
      const scenario=this.getScenario(scenarioId);
      if(!scenario)return [];
      
      const dishes=this.dishes();
      
      // 打分并过滤
      const scored=dishes.map(d=>({
        dish:d,
        score:this._scoreDishForScenario(d,scenario)
      })).filter(item=>item.score>=-50); // 排除完全不合适的
      
      // 排序
      scored.sort((a,b)=>b.score-a.score);
      
      return scored.map(item=>item.dish);
    },

    generateComboForScenario(scenarioId){
      const scenario=this.getScenario(scenarioId);
      if(!scenario)return null;
      
      const recommended=this.recommendForScenario(scenarioId);
      const counts=scenario.recommendCount||{main:2,soup:1,staple:1};
      
      // 按分类分组
      const soups=recommended.filter(d=>d.category==='汤');
      const staples=recommended.filter(d=>d.category==='主食');
      const mains=recommended.filter(d=>d.category!=='汤'&&d.category!=='主食');
      
      const combo={
        scenario:scenario,
        soups:soups.slice(0,counts.soup),
        staples:staples.slice(0,counts.staple),
        mains:mains.slice(0,counts.main)
      };
      
      combo.all=[...combo.mains,...combo.soups,...combo.staples];
      
      return combo;

    getCookingStats(){
      const orders=this._orders.filter(o=>!o.cancelled);
      const dishes=new Set();
      const goodRatings=orders.filter(o=>o.rating==='good').length;
      let totalCookTime=0;
      let quickDishes=0;
      let lowFatDishes=0;
      let spicyDishes=0;

      orders.forEach(o=>{
        const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
        (items||[]).forEach(i=>{
          const d=this.getDish(i.did);
          if(d){
            dishes.add(d.id);
            totalCookTime+=d.cook_time||0;
            if(d.cook_time&&d.cook_time<=15)quickDishes++;
            const tags=d.tags||[];
            if(Array.isArray(tags)&&tags.some(t=>t==='减脂'||t==='低脂'||t==='健康'))lowFatDishes++;
            if(d.spicy_level&&d.spicy_level>=1)spicyDishes++;
          }
        });
      });

      return {
        totalOrders:orders.length,
        totalDishes:dishes.size,
        goodRatings,
        totalCookTime,
        quickDishes,
        lowFatDishes,
        spicyDishes,
        hardDishes:Array.from(dishes).filter(id=>{const d=this.getDish(id);return d&&d.difficulty==='困难'}).length
      };
    },

    checkAchievements(){
      const stats=this.getCookingStats();
      const unlocked=this.getUnlockedAchievements().map(a=>a.id);
      
      // 成就奖励配置
      const rewards={
        a1:10,   // 初次下厨
        a2:50,   // 连续一周
        a3:100,  // 满汉全席
        a4:80,   // 五星大厨
        a5:60,   // 硬菜大师
        a6:40,   // 快手小能手
        a7:200,  // 甜蜜纪念日
        a8:500,  // 百次成就
        a9:60,   // 减脂达人
        a10:40   // 无辣不欢
      };
      
      // 计算连续做饭天数
      const getStreak=()=>{
        const orders=this._orders.filter(o=>!o.cancelled);
        if(!orders.length)return 0;
        const dates=[...new Set(orders.map(o=>o.order_date))].sort().reverse();
        if(!dates.length)return 0;
        let streak=0;
        const today=this.today();
        const d=new Date(today);
        for(let i=0;i<365;i++){
          const dateStr=d.toISOString().split('T')[0];
          if(dates.includes(dateStr)){
            streak++;
          }else if(i>0){
            break;
          }
          d.setDate(d.getDate()-1);
        }
        return streak;
      };
      
      // 检查是否做过硬菜三件套
      const checkHardDishes=()=>{
        const dishNames=new Set();
        const orders=this._orders.filter(o=>!o.cancelled);
        orders.forEach(o=>{
          const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
          (items||[]).forEach(i=>{
            const d=this.getDish(i.did);
            if(d)dishNames.add(d.name);
          });
        });
        return dishNames.has('红烧肉')&&dishNames.has('红烧排骨')&&dishNames.has('可乐鸡翅');
      };
      
      // 检查是否在纪念日做饭
      const checkAnniversary=()=>{
        const orders=this._orders.filter(o=>!o.cancelled);
        const specialDates=this._specialDates||[];
        for(const sd of specialDates){
          if(!sd.date)continue;
          const sdDate=new Date(sd.date);
          for(const o of orders){
            if(!o.order_date)continue;
            const oDate=new Date(o.order_date);
            if(sd.repeat_yearly){
              // 检查月日是否相同
              if(sdDate.getMonth()===oDate.getMonth()&&sdDate.getDate()===oDate.getDate())return true;
            }else{
              if(sd.date===o.order_date)return true;
            }
          }
        }
        return false;
      };
      
      const toCheck=[
        {id:'a1',check:()=>stats.totalOrders>=1},
        {id:'a2',check:()=>getStreak()>=7},
        {id:'a3',check:()=>stats.totalDishes>=10},
        {id:'a4',check:()=>stats.goodRatings>=10},
        {id:'a5',check:()=>checkHardDishes()},
        {id:'a6',check:()=>stats.quickDishes>=10},
        {id:'a7',check:()=>checkAnniversary()},
        {id:'a8',check:()=>stats.totalOrders>=100},
        {id:'a9',check:()=>stats.lowFatDishes>=20},
        {id:'a10',check:()=>stats.spicyDishes>=10}
      ];
      
      toCheck.forEach(async({id,check})=>{
        if(!unlocked.includes(id)&&check()){
          await this.unlockAchievement(id,rewards[id]);
        }
      });
    },

      const cutoff=Date.now()-days*864e5;
      return orders.filter(o=>{
        if(!o.created_at)return false;
        return new Date(o.created_at).getTime()>cutoff;
      });

    getRecentDishes(){
      // 获取最近常吃的菜
      const dishCount={};
      const orders=this._orders.filter(o=>!o.cancelled);
      orders.forEach(o=>{
        const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
        (items||[]).forEach(i=>{
          dishCount[i.did]=(dishCount[i.did]||0)+1;
        });
      });
      // 按次数排序
      const sorted=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]);
      return sorted.map(([id,count])=>({
        dish:this.getDish(id),
        count
      })).filter(item=>item.dish);
    },
    
    getNotEatenRecently(days=14){
      // 获取好久没吃的菜
      const lastEaten={};
      const orders=this._orders.filter(o=>!o.cancelled);
      const today=new Date();
      
      orders.forEach(o=>{
        const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
        const orderDate=o.order_date?new Date(o.order_date):new Date(o.created_at);
        (items||[]).forEach(i=>{
          if(!lastEaten[i.did]||orderDate>new Date(lastEaten[i.did])){
            lastEaten[i.did]=orderDate.toISOString();
          }
        });
      });
      
      const cutoff=new Date(today.getTime()-days*864e5);
      const result=[];
      
      this._dishes.forEach(d=>{
        const last=lastEaten[d.id];
        if(!last||new Date(last)<cutoff){
          result.push({
            dish:d,
            lastEaten:last?new Date(last):null,
            daysSince:last?Math.floor((today-new Date(last))/864e5):null
          });
        }
      });
      
      return result;
    },

    getWeekStart(date=new Date()){
      const d=new Date(date);
      const day=d.getDay();
      const diff=d.getDate()-day+(day===0?-6:1);
      const monday=new Date(d.setDate(diff));
      return monday.toISOString().split('T')[0];
    },

      const d=new Date(weekStart);

      for(let i=0;i<7;i++){
        const d=new Date(weekStart);
        d.setDate(d.getDate()+i);
        days.push({
          index:i,
          date:d.toISOString().split('T')[0],
          name:dayNames[i],
          isToday:d.toISOString().split('T')[0]===this.today()
        });
      }
      return days;

    dailyNutrition(){return this._dailyNutrition},

    calculateDishNutrition(dish){
      const baseCalories={
        '荤菜':350,'素菜':120,'汤':180,'主食':250
      };
      const baseProtein={
        '荤菜':25,'素菜':5,'汤':8,'主食':6
      };
      const baseCarbs={
        '荤菜':15,'素菜':20,'汤':12,'主食':50
      };
      const baseFat={
        '荤菜':20,'素菜':5,'汤':10,'主食':3
      };
      
      const cat=dish.category||'素菜';
      const difficulty=dish.difficulty||'简单';
      const multiplier=difficulty==='困难'?1.3:difficulty==='中等'?1.1:1;
      
      return {
        calories:Math.round((baseCalories[cat]||200)*multiplier),
        protein:Math.round((baseProtein[cat]||10)*multiplier*10)/10,
        carbs:Math.round((baseCarbs[cat]||25)*multiplier*10)/10,
        fat:Math.round((baseFat[cat]||8)*multiplier*10)/10,
        fiber:dish.category==='素菜'?8:dish.category==='汤'?3:2
      };
    },
    
    async addNutritionRecord(date,nutrition){
      // 只使用数据库表实际有的字段（根据 features_1_to_9_db.sql）
      const record={
        id:'dn'+Date.now(),
        date:date,
        total_calories:nutrition.total_calories||0,
        total_protein:nutrition.total_protein||0,
        total_carbs:nutrition.total_carbs||0,
        total_fat:nutrition.total_fat||0,
        total_fiber:nutrition.total_fiber||0,
        meal_count:nutrition.meal_count||0,
        notes:nutrition.notes||'',
        created_at:new Date().toISOString(),
        updated_at:new Date().toISOString()
      };
      // 可选字段：如果数据库有 role 字段就加上
      if(nutrition.role){
        record.role=nutrition.role;
      }
      const{error}=await sb.from('daily_nutrition').insert(record);
      if(error){
        toast('记录营养失败：'+error.message,'error');
        return null;
      }
      return record;
    },
    
    async addOrUpdateNutritionForOrder(order){
      if(!order)return;
      
      // 获取当前分量设置
      const multiplier = parseFloat(localStorage.getItem('pp_serving_multiplier')) || 1;
      const servingId = localStorage.getItem('pp_current_serving') || '1人';
      
      // 获取订单中的菜品
      const items=typeof order.items==='string'?JSON.parse(order.items):order.items;
      const dishIds=(items||[]).map(i=>i.did);
      const dishes=this.getDishesByIds(dishIds);
      
      if(dishes.length===0)return;
      
      // 计算这些菜品的总营养（应用分量倍率）
      let totalCalories=0,totalProtein=0,totalCarbs=0,totalFat=0,totalFiber=0;
      dishes.forEach(d=>{
        const n=this.calculateDishNutrition(d);
        totalCalories+=Math.round(n.calories * multiplier);
        totalProtein+=Math.round(n.protein * multiplier * 10) / 10;
        totalCarbs+=Math.round(n.carbs * multiplier * 10) / 10;
        totalFat+=Math.round(n.fat * multiplier * 10) / 10;
        totalFiber+=Math.round(n.fiber * multiplier * 10) / 10;
      });
      
      const today=this.today();
      const existing=this.getNutritionForDate(today);
      
      // 分量提示信息
      const servingNote = multiplier !== 1 ? ` (${servingId} ×${multiplier})` : '';
      
      if(existing){
        // 更新现有记录
        const updated={
          total_calories:(existing.total_calories||0)+totalCalories,
          total_protein:(existing.total_protein||0)+totalProtein,
          total_carbs:(existing.total_carbs||0)+totalCarbs,
          total_fat:(existing.total_fat||0)+totalFat,
          total_fiber:(existing.total_fiber||0)+totalFiber,
          meal_count:(existing.meal_count||0)+1,
          updated_at:new Date().toISOString()
        };
        const{error}=await sb.from('daily_nutrition').update(updated).eq('id',existing.id);
        if(!error){
          toast(`已记录营养：+${totalCalories} kcal${servingNote} 🍽️`,'success');
        }
      }else{
        // 创建新记录（不传 role，因为数据库表可能没有这个字段）
        await this.addNutritionRecord(today,{
          total_calories:totalCalories,
          total_protein:totalProtein,
          total_carbs:totalCarbs,
          total_fat:totalFat,
          total_fiber:totalFiber,
          meal_count:1
        });
        toast(`已记录今日营养：${totalCalories} kcal${servingNote} 🍽️`,'success');
      }
    },
    
    getWeeklyNutritionSummary(weekStart){
      const summary={calories:0,protein:0,carbs:0,fat:0,fiber:0,days:0};
      for(let i=0;i<7;i++){
        const d=new Date(weekStart);
        d.setDate(d.getDate()+i);
        const dateStr=d.toISOString().split('T')[0];
        const record=this.getNutritionForDate(dateStr);
        if(record){
          summary.calories+=record.total_calories||0;
          summary.protein+=record.total_protein||0;
          summary.carbs+=record.total_carbs||0;
          summary.fat+=record.total_fat||0;
          summary.fiber+=record.total_fiber||0;
          summary.days++;
        }
      }
      return summary;
    },

    getSmartRecommendations(role='wife',count=5){
      const recent=this.getRecentDishes().slice(0,10);
      const recentIds=new Set(recent.map(r=>r.dish?.id).filter(Boolean));
      
      const notEaten=this.getNotEatenRecently(7);
      const favorites=this._dishes.filter(d=>d.is_favorite);
      
      let candidates=[];
      
      // 优先推荐收藏但最近没吃的
      favorites.forEach(d=>{
        if(!recentIds.has(d.id)){
          candidates.push({dish:d,score:100});
        }
      });
      
      // 好久没吃的
      notEaten.forEach(item=>{
        const existing=candidates.find(c=>c.dish.id===item.dish.id);
        if(existing){
          existing.score+=50;
        }else{
          candidates.push({dish:item.dish,score:50+(item.daysSince||0)*2});
        }
      });
      
      // 随机补充
      const randomDishes=this.getRandomDishes(10,d=>!recentIds.has(d.id));
      randomDishes.forEach(d=>{
        if(!candidates.find(c=>c.dish.id===d.id)){
          candidates.push({dish:d,score:Math.random()*30});
        }
      });
      
      candidates.sort((a,b)=>b.score-a.score);
      return candidates.slice(0,count).map(c=>c.dish);
    },

  function showConfetti(count = 50){
    const colors=['#FF6B9D','#FF8FB8','#FFB3D1','#FFD700','#FF69B4','#FF1493','#FF6347','#FFA500','#98FB98','#87CEEB','#DDA0DD','#F0E68C'];
    const emojis = ['💕','💖','✨','⭐','🌸','💗','🌟','💫','🎉','🎊','💝','🌹'];
    const c=document.createElement('div');
    c.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none;overflow:hidden;';
    document.body.appendChild(c);
    
    for(let i=0;i<count;i++){
      const p=document.createElement('div');
      const useEmoji = Math.random() > 0.6;
      const x = Math.random() * 100;
      const delay = Math.random() * 2;
      const duration = 2 + Math.random() * 3;
      const size = 10 + Math.random() * 20;
      const rotation = Math.random() * 720 - 360;
      
      if (useEmoji) {
        p.textContent = pick(emojis);
        p.style.fontSize = size + 'px';
      } else {
        p.className='confetti-piece';
        p.style.width = size + 'px';
        p.style.height = size * 0.6 + 'px';
        p.style.backgroundColor = pick(colors);
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      }
      
      p.style.cssText += `
        position:absolute;
        left:${x}%;
        top:-20px;
        opacity:1;
        animation:confettiFall ${duration}s ease-out forwards;
        animation-delay:${delay}s;
        transform:rotate(${rotation}deg);
      `;
      c.appendChild(p);
    }
    
    setTimeout(() => c.remove(), 6000);
  }

  /* ============================================================
    路由
    ============================================================ */
  let currentPage='',currentTab='';
  function go(page,tab=''){
    // 支持两种调用方式：go('wife', 'home') 或 go('wife/home')
    if(page.includes('/')){
      const parts=page.split('/');
      currentPage=parts[0];
      currentTab=parts[1]||'';
    }else{
      currentPage=page;
      currentTab=tab;
    }
    window.location.hash=currentPage+(currentTab?'/'+currentTab:'');
    renderCurrentPage();
  }
  async function renderCurrentPage(){
    if(!DB._ready){$('#app').innerHTML=loadingHTML();await DB.init()}
    renderPage(currentPage,currentTab);
  }
  function renderPage(page,tab){
    const app=$('#app');
    if(page==='role-select'){app.innerHTML=pgRoleSelect()}
    else if(page==='wife'){
      if(tab==='waiting')app.innerHTML=pgWifeWaiting();
      else if(tab==='calendar')app.innerHTML=pgCalendar('wife');
      else app.innerHTML=pgWifeHome();
    }else if(page==='hubby'){
      if(tab==='manage')app.innerHTML=pgHubbyManage();
      else if(tab==='shopping')app.innerHTML=pgHubbyShopping();
      else if(tab==='achievements')app.innerHTML=pgHubbyAchievements();
      else if(tab==='stats')app.innerHTML=pgHubbyStats();
      else if(tab==='calendar')app.innerHTML=pgCalendar('hubby');
      else if(tab==='settings')app.innerHTML=pgSettings();
      else app.innerHTML=pgHubbyHome();
    }else{app.innerHTML=pgRoleSelect()}
    refreshLazyLoad();
    
    // 登录页面回车键支持
    if(page==='role-select' && _loginSelectedRole){
      setTimeout(()=>{
        const input=$('#login-password');
        if(input){
          input.focus();
          input.onkeydown=(e)=>{
            if(e.key==='Enter'){
              const loginBtn=document.querySelector('[data-action="do-login"]');
              if(loginBtn)loginBtn.click();
            }
          };
        }
      },50);
    }
    
    // 检查是否需要自动显示小馋猫爱吃
    if(page==='wife' && !tab && localStorage.getItem('pp_show_wife_loves')==='1'){
      localStorage.removeItem('pp_show_wife_loves');
      setTimeout(()=>{
        // 模拟点击 show-wife-loves
        const wifeLoveTag = '小馋猫爱吃';
        const loveDishes = DB.dishes().filter(dish => {
          const tags=DB._getDishTags(dish);
          return tags.includes(wifeLoveTag);
        });
        const list = $('#dish-list');
        if (list) {
          if (loveDishes.length > 0) {
            list.innerHTML = `<div class="text-sm text-primary-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade">
              <span class="text-2xl">🐱</span> 小馋猫爱吃
            </div>
            <div class="grid grid-cols-3 gap-3">
              ${loveDishes.map((dish, i) => dishCard(dish, true, i + 1)).join('')}
            </div>`;
          } else {
            list.innerHTML = `<div class="text-center text-gray-400 py-24 anim-fade">
              <div class="text-6xl mb-5 opacity-30">🐱</div>
              <p class="text-lg">小馋猫还没有爱吃的菜</p>
              <p class="text-sm mt-2 opacity-60">快去添加吧～</p>
            </div>`;
          }
        }
        const currentCat = $('#current-cat');
        if (currentCat) currentCat.textContent = '小馋猫爱吃';
        refreshLazyLoad();
      },100);
    }
  }
  function initRouter(){
    const hash=window.location.hash.slice(1)||'';
    const[page,...rest]=hash.split('/');
    const role=localStorage.getItem('pp_role');
    if(page==='wife'||page==='hubby')go(page,rest[0]||'home');
    else if(role)go(role==='wife'?'wife/home':'hubby/home');
    else go('role-select');
    window.addEventListener('hashchange',()=>{const h=window.location.hash.slice(1)||'';const[p,...r]=h.split('/');if(p!==currentPage||r[0]!==currentTab){currentPage=p;currentTab=r[0]||'';renderCurrentPage()}});
  }

    const statusDaysLeft=DB.getStatusDaysLeft();
    
    if(!hasActiveStatus || !currentStatus)return '';
    
    const colors=STATUS_COLORS[currentStatus.color]||STATUS_COLORS.rose;
    
    let actionButtons='';
    if(isWife){
      // 老婆页面：显示"看看推荐"和"结束"按钮
      actionButtons=`<div class="flex gap-2 mt-3">

        </button>
      </div>`;

    return `<div class="card-pro mb-3 anim-fade-scale ripple-effect" style="background:linear-gradient(135deg, ${colors.bg}, ${colors.bg2});border-color:${colors.border}">

          <div class="big-icon-ultra" style="width:52px;height:52px">
            <div class="glow-layer-1" style="background:radial-gradient(circle, ${colors.glow}, transparent 70%)"></div>
            <div class="glow-layer-2" style="background:radial-gradient(circle, ${colors.glow}, transparent 70%);opacity:0.5"></div>

            </div>
          </div>
          <div class="flex-1">

            <p class="text-xs" style="color:${colors.text};opacity:0.6">💡 ${currentStatus.tips}</p>

                      <div class="space-y-3">
                        ${items.map((item,j)=>`

  function renderDishGrid(dishes){
    const filtered=_selCats==='全部'?dishes:dishes.filter(d=>d.category===_selCats);
    const favs=filtered.filter(d=>d.is_favorite);const others=filtered.filter(d=>!d.is_favorite);
    let html='';
    if(favs.length&&_selCats==='全部'){
      html+=`<div class="text-sm text-primary-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade">
        <span class="text-2xl">⭐</span> 常吃（小跟班最拿手的）
      </div>
      <div class="grid grid-cols-3 gap-3 mb-5">
        ${favs.map((d,i)=>dishCard(d,true,i+1)).join('')}
      </div>`;
      if(others.length)html+=`<div class="text-sm text-gray-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade stagger-4">
        <span class="text-2xl">🍽️</span> 全部菜品
      </div>`;
    }
    const favOffset=favs.length&&_selCats==='全部'?favs.length:0;
    html+=`<div class="grid grid-cols-3 gap-3 mb-4">
      ${others.map((d,i)=>dishCard(d,false,i+1+favOffset)).join('')}
    </div>`;
    if(!filtered.length)html=`<div class="text-center text-gray-400 py-24 anim-fade">
      <div class="text-6xl mb-5 opacity-30">🍚</div>
      <p class="text-lg">暂无菜品</p>
      <p class="text-sm mt-2 opacity-60">让小跟班去添加几个吧～</p>
    </div>`;
    return html;
  }

  const DISH_IMAGE_URLS={};

  function getDishImageUrl(dish){
    if(dish.image_url)return dish.image_url;
    return DISH_IMAGE_URLS[dish.name]||null;
  }

  function getDishEmoji(dish){
    const catEmoji={'荤菜':'🥩','素菜':'🥬','汤':'🍲','主食':'🍚','全部':'🍽️'};
    return DISH_EMOJIS[dish.name]||catEmoji[dish.category]||'🍽️';
  }

  function renderDishIcon(dish, size='w-12 h-12', bgClass='bg-gradient-to-br from-purple-50 to-pink-100', emojiSize='text-2xl'){
    const emoji=getDishEmoji(dish);
    const imgUrl=getDishImageUrl(dish);
    
    if(imgUrl){
      return `
        <div class="${size} rounded-xl overflow-hidden shrink-0 shadow-sm">
          <img src="${imgUrl}" class="w-full h-full object-cover" alt="${dish.name}" 
            onerror="this.parentElement.innerHTML='<div class=\\'${size} ${bgClass} flex items-center justify-center ${emojiSize}\\'>${emoji}</div>'">
        </div>
      `;
    }else{
      return `
        <div class="${size} rounded-xl ${bgClass} flex items-center justify-center ${emojiSize} shrink-0">
          ${emoji}
        </div>
      `;
    }
  }

  function renderSmallDishIcon(dish, size='w-10 h-10'){
    return renderDishIcon(dish, size, 'bg-gradient-to-br from-primary-50 to-primary-100', 'text-xl');
  }

  function dishCard(d,isFav=false,idx=0){
    const wc=DB.dishWeekCount(d.id);const sel=_selDishes.has(d.id);

    const locked=DB.getLockedAchievements();
    
    // 本月统计
    const thisMonth=new Date();thisMonth.setDate(1);thisMonth.setHours(0,0,0,0);
    const mo=orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>=thisMonth.getTime());
    const monthDays=new Set(mo.map(o=>o.order_date)).size;
    const monthDishes=mo.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
    const monthCost=mo.reduce((s,o)=>s+DB.orderCost(o),0);
    const monthAvgCost=monthDays?Math.round(monthCost/monthDays):0;
    
    // 总统计
    const totalDays=new Set(orders.map(o=>o.order_date)).size;
    const totalDishesAll=orders.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
    const totalCostAll=orders.reduce((s,o)=>s+DB.orderCost(o),0);
    const avgCostAll=totalDays?Math.round(totalCostAll/totalDays):0;
    
    // 菜品统计
    const dishCount={};orders.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{dishCount[i.did]=(dishCount[i.did]||0)+1})});
    const top5=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
    
    // 荤素比（总）
    let meatCnt=0,vegCnt=0,soupCnt=0,stapleCnt=0;

      const items=typeof o.items==='string'?JSON.parse(o.items):o.items;

        const d=DB.getDish(i.did);
        if(d){
          if(d.category==='荤菜')meatCnt++;

          else if(d.category==='汤')soupCnt++;

  function pgCalendar(role){
    const now=new Date();const year=now.getFullYear(),month=now.getMonth();
    const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
    const orders=DB.orders();const today=DB.today();
    let cells='';for(let i=0;i<firstDay;i++)cells+=`<div class="h-10"></div>`;
    for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const o=orders.find(x=>x.order_date===ds);const isToday=ds===today;const hasOrder=o&&!o.cancelled;const cancelled=o&&o.cancelled;let dot='';if(hasOrder){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;dot=`<div class="flex gap-0.5 justify-center mt-0.5">${(items||[]).slice(0,3).map(()=>'<div class="w-1 h-1 rounded-full bg-primary-400"></div>').join('')}</div>`}if(cancelled)dot=`<div class="text-[10px] text-gray-300 mt-0.5">休</div>`;cells+=`<button data-action="cal-day" data-date="${ds}" class="h-10 flex flex-col items-center justify-center rounded-lg text-sm transition ${isToday?'bg-primary-400 text-white font-bold':'hover:bg-primary-50'} ${!isToday&&hasOrder?'text-gray-800':''} ${!isToday&&!hasOrder&&!cancelled?'text-gray-400':''}">${d}${dot}</button>`}
    return `<div class="min-h-screen pb-24"><header class="sticky top-0 z-30 bg-primary-50/90 backdrop-blur-lg px-4 pt-2 pb-2"><h1 class="font-display text-lg">${year}年${month+1}月</h1></header><div class="px-4"><div class="grid grid-cols-7 gap-1 mb-1">${['日','一','二','三','四','五','六'].map(w=>`<div class="text-center text-xs text-gray-400 py-0.5">${w}</div>`).join('')}</div><div class="grid grid-cols-7 gap-1">${cells}</div><div id="cal-detail" class="mt-3"></div></div>${role==='wife'?wifeNav('calendar'):hubbyNav('calendar')}</div>`;
  }

  function showRecipeModal(did){
    const d=DB.getDish(did);
    if(!d||!d.recipe||!d.recipe.trim())return;
    
    // 获取当前分量设置
    const multiplier = parseFloat(localStorage.getItem('pp_serving_multiplier')) || 1;
    const servingId = localStorage.getItem('pp_current_serving') || '1人';
    
    const catEmoji={'荤菜':'🥩','素菜':'🥬','汤':'🍲','主食':'🍚','全部':'🍽️'};
    const emoji=DISH_EMOJIS[d.name]||catEmoji[d.category]||'🍽️';
    
    // 应用分量调整到做法步骤
    let adjustedRecipe = d.recipe;
    let adjustedIngredients = d.ingredients || [];
    
    if(multiplier !== 1 && DB.adjustRecipeForServings){
      adjustedRecipe = DB.adjustRecipeForServings(d.recipe, multiplier);
      // 也调整食材列表（简单处理：如果食材里有数字就调整）
      adjustedIngredients = (d.ingredients || []).map(ing => {
        return ing.replace(/(\d+(\.\d+)?)/g, (match) => {
          const num = parseFloat(match);
          if(!isNaN(num) && num > 0) {
            return (num * multiplier).toFixed(num % 1 === 0 ? 0 : 1);
          }
          return match;
        });
      });
    }
    
    const steps = adjustedRecipe.split('\n').filter(s=>s.trim());
    const wc=DB.dishWeekCount(d.id);
    let weekBadge='';
    if(wc>=3)weekBadge=`<span class="bg-gradient-to-br from-rose-400 to-pink-400 text-white text-xs px-2.5 py-1 rounded-full shadow-lg font-bold">本周${wc}次 🔥</span>`;
    else if(wc>=2)weekBadge=`<span class="bg-gradient-to-br from-amber-400 to-orange-400 text-white text-xs px-2.5 py-1 rounded-full shadow-lg font-bold">本周${wc}次 ✨</span>`;
    
    // 分量提示
    let servingBadge = '';
    if(multiplier !== 1) {
      servingBadge = `<span class="bg-gradient-to-br from-blue-400 to-cyan-400 text-white text-xs px-2.5 py-1 rounded-full shadow-lg font-bold ml-2">${servingId} ×${multiplier}</span>`;
    }
    
    showModal(`
      <div class="p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-display text-lg">${d.name}${servingBadge}</h3>
          <button data-action="close-modal" class="text-gray-400 p-1">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="flex items-center gap-3 mb-4">
          <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary-50 to-primary-100 flex items-center justify-center text-3xl shadow-sm">${emoji}</div>
          <div class="flex-1">
            <div class="flex items-center gap-2 mb-1.5">
              ${d.is_favorite?'<span class="text-base">⭐</span>':''}
              <span class="text-sm font-bold text-gray-800">${d.category}</span>
              ${weekBadge}
            </div>
            <div class="flex items-center gap-3 text-xs text-gray-400">
              <span class="flex items-center gap-1"><i class="fa-solid fa-clock text-primary-300"></i> ${d.cook_time}分钟</span>
              <span class="flex items-center gap-1"><i class="fa-solid fa-heart text-rose-400"></i> ${d.cost_estimate}亲亲</span>
            </div>
          </div>
        </div>
        ${adjustedIngredients.length?`
          <div class="mb-4">
            <div class="text-xs text-gray-400 mb-2 font-medium">
              食材
              ${multiplier !== 1 ? `<span class="text-blue-400 ml-1">(已按 ${servingId} 调整)</span>` : ''}
            </div>
            <div class="flex flex-wrap gap-1.5">
              ${adjustedIngredients.map(i=>`<span class="text-xs bg-primary-50 text-gray-600 px-2.5 py-1 rounded-lg">${i}</span>`).join('')}

        <div>
          <div class="text-xs text-gray-400 mb-2 font-medium">

  function refreshSelBar(){const bar=$('#sel-bar');if(!bar)return;const count=_selDishes.size;bar.style.display=count>0?'block':'none';const ce=$('#sel-count');if(ce)ce.textContent=count;const co=$('#sel-cost');if(co){const dishes=DB.getDishesByIds([..._selDishes]);const total=dishes.reduce((s,d)=>s+(d.cost_estimate||0),0);co.textContent=`${total}亲亲`}}

  /* 检查并触发特殊日期庆祝 */
  function checkAndCelebrateSpecialDay() {
    const anniInfo = DB.getAnniInfo();
    const milestones = DB.getAnniMilestones();
    const todayMilestone = milestones.find(m => m.isToday);
    const hasTodaySpecial = DB.isTodaySpecialDate();
    const isAnniToday = anniInfo && anniInfo.isAnniToday;
    
    if (hasTodaySpecial || isAnniToday || todayMilestone) {
      setTimeout(() => {
        showSpecialDayCelebration();
        
        // 显示 toast 提示
        let msg = '🎉 今天是个特殊的日子！';
        if (isAnniToday && anniInfo) {
          msg = `💕 在一起纪念日快乐！我们已经在一起 ${anniInfo.daysTogether} 天啦！`;
        } else if (todayMilestone) {
          msg = `🏆 恭喜达成 ${todayMilestone.name}！`;
        } else {
          const todaySd = DB.getTodaySpecialDate();
          if (todaySd) {
            msg = `${todaySd.icon} 今天是 ${todaySd.name}！`;
          }
        }
        toast(msg, 'success');
      }, 1500);
    }
  }

  /* 启动 */
  initRouter();
  createParticles();

  /* 数据准备好后检查特殊日期 */
  setTimeout(() => {
    if (DB._ready) {
      checkAndCelebrateSpecialDay();
    } else {
      const checkReady = setInterval(() => {
        if (DB._ready) {
          clearInterval(checkReady);
          checkAndCelebrateSpecialDay();
        }
      }, 500);
    }
  }, 100);

  /* ============================================================

    ============================================================ */
  let _loadingOverlay = null;
  function showLoading(text = '加载中...') {
    if (_loadingOverlay) return;
    _loadingOverlay = document.createElement('div');
    _loadingOverlay.className = 'loading-overlay';
    _loadingOverlay.innerHTML = `
      <div class="loading-spinner"></div>
      <span class="loading-text">${text}</span>
    `;
    document.body.appendChild(_loadingOverlay);
  }
  function hideLoading() {
    if (!_loadingOverlay) return;
    _loadingOverlay.classList.add('hidden');
    setTimeout(() => {
      if (_loadingOverlay) {
        _loadingOverlay.remove();
        _loadingOverlay = null;
      }
    }, 300);
  }

    ============================================================ */
  let _gestureStartX = 0;
  let _gestureStartY = 0;
  let _gestureCurrentX = 0;
  let _gestureCurrentY = 0;
  let _isSwipeDetected = false;
  const SWIPE_THRESHOLD = 50;

  function initGestures() {
    document.addEventListener('touchstart', (e) => {
      _gestureStartX = e.touches[0].clientX;
      _gestureStartY = e.touches[0].clientY;
      _gestureCurrentX = _gestureStartX;
      _gestureCurrentY = _gestureStartY;
      _isSwipeDetected = false;
    }, { passive: true });
    
    document.addEventListener('touchmove', (e) => {
      _gestureCurrentX = e.touches[0].clientX;
      _gestureCurrentY = e.touches[0].clientY;
    }, { passive: true });
    
    document.addEventListener('touchend', (e) => {
      if (_isSwipeDetected) return;
      
      const deltaX = _gestureCurrentX - _gestureStartX;
      const deltaY = _gestureCurrentY - _gestureStartY;
      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);
      
      if (absX < 10 && absY < 10) return;
      
      if (absX > absY) {
        if (absX > SWIPE_THRESHOLD) {
          _isSwipeDetected = true;
          if (deltaX > 0) {
            onSwipeRight();
          } else {
            onSwipeLeft();
          }
        }
      } else {
        if (absY > SWIPE_THRESHOLD) {
          _isSwipeDetected = true;
          if (deltaY > 0) {
            onSwipeDown();
          } else {
            onSwipeUp();
          }
        }
      }
    }, { passive: true });
  }

  function onSwipeRight() {
    const hash = window.location.hash;
    if (hash && hash !== '#wife/home' && hash !== '#hubby/home') {
      history.back();
    }
  }
  function onSwipeLeft() {}
  function onSwipeDown() {
    const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    if (scrollTop <= 0) {

    }
  }
  function onSwipeUp() {}

  let _audioCtx = null;
  function getAudioContext() {
    if (!_audioCtx) {

      if (AudioContext) {
        _audioCtx = new AudioContext();
      }
    }
    return _audioCtx;

  function playNotificationSound(type = 'default') {
    const ctx = getAudioContext();
    if (!ctx) return;
    
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
    
    const oscillator = ctx.createOscillator();
    const gainNode = ctx.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(ctx.destination);
    
    const now = ctx.currentTime;
    
    switch(type) {
      case 'success':
        oscillator.frequency.setValueAtTime(880, now);
        oscillator.frequency.setValueAtTime(1100, now + 0.1);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        oscillator.start(now);
        oscillator.stop(now + 0.3);
        break;
        
      case 'error':
        oscillator.frequency.setValueAtTime(200, now);
        oscillator.frequency.setValueAtTime(150, now + 0.1);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        oscillator.start(now);
        oscillator.stop(now + 0.3);
        break;
        
      case 'newOrder':
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(523, now);
        oscillator.frequency.setValueAtTime(659, now + 0.1);
        oscillator.frequency.setValueAtTime(784, now + 0.2);
        oscillator.frequency.setValueAtTime(1047, now + 0.3);
        gainNode.gain.setValueAtTime(0.25, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        oscillator.start(now);
        oscillator.stop(now + 0.5);
        break;
        
      default:
        oscillator.frequency.setValueAtTime(600, now);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        oscillator.start(now);
        oscillator.stop(now + 0.2);
    }
  }

  /* ============================================================
    新增工具函数 6：IndexedDB 离线存储
    ============================================================ */
  const IDB_NAME = 'pp-menu-db';
  const IDB_VERSION = 1;
  let _idb = null;

  function openIDB() {
    return new Promise((resolve, reject) => {
      if (_idb) {
        resolve(_idb);
        return;
      }
      
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      
      req.onerror = () => reject(req.error);
      req.onsuccess = () => {
        _idb = req.result;
        resolve(_idb);
      };
      
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        
        if (!db.objectStoreNames.contains('dishes')) {
          db.createObjectStore('dishes', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('orders')) {
          db.createObjectStore('orders', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('settings')) {
          db.createObjectStore('settings', { keyPath: 'key' });
        }
        if (!db.objectStoreNames.contains('reviews')) {
          db.createObjectStore('reviews', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('special_dates')) {
          db.createObjectStore('special_dates', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('shopping_lists')) {
          db.createObjectStore('shopping_lists', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('achievements')) {
          db.createObjectStore('achievements', { keyPath: 'id' });
        }
      };
    });
  }

  async function idbPut(storeName, data) {
    try {
      const db = await openIDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const req = store.put(data);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
      });
    } catch(e) {
      console.warn('IDB put failed:', e);
      return false;
    }
  }

  async function idbGet(storeName, key) {
    try {
      const db = await openIDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    } catch(e) {
      console.warn('IDB get failed:', e);
      return null;
    }
  }

  async function idbGetAll(storeName) {

  async function importAllData(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          
          if (!data.version || !data.exportedAt) {
            reject(new Error('无效的备份文件'));
            return;
          }
          
          showLoading('正在导入数据...');
          
          if (data.localStorage) {
            for (const [key, val] of Object.entries(data.localStorage)) {
              localStorage.setItem(key, val);
            }
          }
          
          if (data.dishes && DB.upsertDish) {
            for (const d of data.dishes) {
              await DB.upsertDish(d);
            }
          }
          
          hideLoading();
          toast('数据导入成功！请刷新页面', 'success');
          playNotificationSound('success');
          vibrate([100, 50, 100]);
          
          resolve(true);
        } catch(err) {
          hideLoading();
          toast('导入失败：' + err.message, 'error');
          playNotificationSound('error');
          reject(err);
        }
      };
      reader.onerror = () => {

        reject(reader.error);
      };
      reader.readAsText(file);
    });
  }

  function getImageUrl(baseUrl, options = {}) {
    if (!baseUrl) return null;
    
    const { preferWebP = true } = options;
    
    if (preferWebP && _supportsWebP) {
      if (!baseUrl.toLowerCase().endsWith('.webp')) {
        const webpUrl = baseUrl.replace(/\.(jpg|jpeg|png|gif)$/i, '.webp');
