<script>
/* ============================================================

   ============================================================ */
const CATEGORIES=['全部','荤菜','素菜','汤','主食'];
const CAT_ICONS={'全部':'fa-utensils','荤菜':'fa-drumstick-bite','素菜':'fa-leaf','汤':'fa-bowl-food','主食':'fa-bowl-rice'};
const STATUS_LABELS={ordered:'已点菜',seen:'已看到',shopping:'买菜中',cooking:'做饭中',eating:'开饭啦'};
const STATUS_ICONS={ordered:'fa-bell',seen:'fa-eye',shopping:'fa-cart-shopping',cooking:'fa-fire-burner',eating:'fa-utensils'};
const STATUS_MSGS={
  ordered:{wife:['老婆已经点好菜啦，盼盼快接单!','叮咚~ 今晚的菜单已送达','菜单已下单，等盼盼来接~'],hubby:['老婆点了菜，快看看!','新订单来了!','老婆在等你接单哦']},
  seen:{wife:['盼盼看到啦，马上安排!','收到收到，这就去买菜','盼盼已读不回...开玩笑的']},
  shopping:{wife:['盼盼在菜市场挑菜中~','正在挑选最新鲜的食材','买菜去了，马上回来~']},
  cooking:{wife:['锅里咕噜咕噜响啦，再等一会儿~','盼盼大厨正在施展厨艺','快好了快好了，再耐心等一下']},
  eating:{wife:['饭做好啦! 快洗手吃饭~','今晚的菜已就位，快来验收!','开饭开饭!']}
};
const CANCEL_REASONS=[{text:'加班太晚了，明天补上!',icon:'fa-briefcase'},{text:'今天身体不太舒服',icon:'fa-face-tired'},{text:'今天出去吃',icon:'fa-utensils'},{text:'今天点外卖',icon:'fa-motorcycle'}];

/* ============================================================
   Supabase 客户端
   ============================================================ */
let sb;
try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)}catch(e){console.error('Supabase 初始化失败:',e)}

/* ============================================================
   数据层（异步）
   ============================================================ */
const DB={
  _dishes:[],_orders:[],_templates:[],_inventory:{},_settings:{},
  _ready:false,

  async init(){
    if(this._ready)return;
    if(!sb){toast('Supabase 连接失败，请检查 URL 和 Key','error');return}
    try{
      const [dRes,oRes,tRes,iRes,sRes]=await Promise.all([
        sb.from('dishes').select('*').order('is_favorite',{ascending:false}),
        sb.from('orders').select('*').order('created_at',{ascending:false}),
        sb.from('templates').select('*'),
        sb.from('inventory').select('*'),
        sb.from('settings').select('*')
      ]);
      this._dishes=dRes.data||[];
      this._orders=oRes.data||[];
      this._templates=tRes.data||[];
      (iRes.data||[]).forEach(r=>{this._inventory[r.ingredient_name]=r.have_it});
      (sRes.data||[]).forEach(r=>{this._settings[r.key]=r.value});
      this._ready=true;
      this._subscribe();
    }catch(e){console.error('数据加载失败:',e);toast('数据加载失败','error')}
  },

  _subscribe(){
    if(!sb)return;
    const ch=sb.channel('pp-realtime').subscribe((status)=>{
      if(status==='SUBSCRIBED')console.log('实时连接已建立');
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'orders'},async()=>{
      const{data}=await sb.from('orders').select('*').order('created_at',{ascending:false});
      this._orders=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'dishes'},async()=>{
      const{data}=await sb.from('dishes').select('*').order('is_favorite',{ascending:false});
      this._dishes=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'templates'},async()=>{
      const{data}=await sb.from('templates').select('*');
      this._templates=data||[];renderCurrentPage();
    });
    ch.on('postgres_changes',{event:'*',schema:'public',table:'inventory'},async()=>{
      const{data}=await sb.from('inventory').select('*');
      this._inventory={};(data||[]).forEach(r=>{this._inventory[r.ingredient_name]=r.have_it});
      renderCurrentPage();
    });
  },

  dishes(){return this._dishes},
  orders(){return this._orders},
  templates(){return this._templates},
  inventory(){return this._inventory},
  setting(k,d=null){return this._settings[k]!==undefined?this._settings[k]:d},
  today(){return new Date().toISOString().slice(0,10)},
  todayOrder(){return this._orders.find(o=>o.order_date===this.today()&&!o.cancelled)},
  recentOrders(n=5){return this._orders.filter(o=>!o.cancelled).slice(0,n)},
  dishWeekCount(did){const w=Date.now()-7*864e5;return this._orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>w&&!o.cancelled).reduce((c,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return c+(items||[]).filter(i=>i.did===did).length},0)},
  getDish(id){return this._dishes.find(d=>d.id===id)},
  getDishesByIds(ids){return ids.map(id=>this.getDish(id)).filter(Boolean)},
  orderCost(o){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return this.getDishesByIds((items||[]).map(i=>i.did)).reduce((s,d)=>s+(d.cost_estimate||0),0)},

  async addOrder(items,remark){
    const o={id:'o'+Date.now(),order_date:this.today(),status:'ordered',remark:remark||'',items:items.map(did=>({did})),cancelled:false,cancel_reason:'',rating:null};
    const{error}=await sb.from('orders').insert(o);
    if(error)toast('下单失败：'+error.message,'error');
    else toast('下单成功，盼盼快接单!','success');
    return error?null:o;
  },
  async updateOrder(id,patch){
    patch.updated_at=new Date().toISOString();
    const{error}=await sb.from('orders').update(patch).eq('id',id);
    if(error)toast('更新失败','error');
  },
  async setInv(name,have){
    if(have){
      await sb.from('inventory').upsert({ingredient_name:name,have_it:true,updated_at:new Date().toISOString()},{onConflict:'ingredient_name'});
    }else{
      await sb.from('inventory').delete().eq('ingredient_name',name);
    }
    this._inventory[name]=have||undefined;
  },
  hasInv(name){return !!this._inventory[name]},
  async saveDish(d){
    if(d._exists){const{...clean}=d;delete clean._exists;const{error}=await sb.from('dishes').update(clean).eq('id',d.id);if(error)toast('保存失败','error')}
    else{const{...clean}=d;delete clean._exists;const{error}=await sb.from('dishes').insert(clean);if(error)toast('添加失败','error')}
  },
  async deleteDish(id){await sb.from('dishes').delete().eq('id',id)},
  async saveTpl(t){
    if(t._exists){const{...clean}=t;delete clean._exists;await sb.from('templates').update(clean).eq('id',t.id)}
    else{const{...clean}=t;delete clean._exists;await sb.from('templates').insert(clean)}
  },
  async deleteTpl(id){await sb.from('templates').delete().eq('id',id)},
  async saveSetting(k,v){await sb.from('settings').upsert({key:k,value:v},{onConflict:'key'});this._settings[k]=v},
  async setNoCook(date,reason){
    await this.saveSetting('noCook_'+date,'1');
    await this.saveSetting('noCookReason_'+date,reason);
    this._settings['noCook_'+date]='1';
    this._settings['noCookReason_'+date]=reason;
  },
  async cancelNoCook(date){
    await sb.from('settings').delete().eq('key','noCook_'+date);
    await sb.from('settings').delete().eq('key','noCookReason_'+date);
    delete this._settings['noCook_'+date];
    delete this._settings['noCookReason_'+date];
  },
  isNoCook(){return !!this._settings['noCook_'+this.today()]}
};

const $$=s=>document.querySelectorAll(s);

function toast(msg,type='info'){
  const colors={info:'bg-bark-500 text-white',success:'bg-green-600 text-white',warn:'bg-amber-500 text-white',error:'bg-red-500 text-white'};
  const el=document.createElement('div');
  el.className=`${colors[type]||colors.info} px-5 py-2.5 rounded-xl text-sm font-medium shadow-lg anim-fade pointer-events-auto`;
  el.textContent=msg;$('#toast-box').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)},2500);
}

function loadingHTML(){return `<div class="min-h-screen flex flex-col items-center justify-center gap-3"><div class="loading-spinner"></div><p class="text-bark-300 text-sm">加载中...</p></div>`}
function showConfetti(){
  const colors=['#E8590C','#2F9E44','#F59F00','#E03131','#339AF0','#845EF7'];
  const c=document.createElement('div');c.style.cssText='position:fixed;top:50%;left:50%;z-index:9999;pointer-events:none;';
  document.body.appendChild(c);
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.backgroundColor=pick(colors);p.style.left=(Math.random()*200-100)+'px';p.style.animationDelay=(Math.random()*.5)+'s';p.style.animationDuration=(1+Math.random())+'s';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p)}
  setTimeout(()=>c.remove(),2500);
}

/* ============================================================
   路由
   ============================================================ */
let currentPage='',currentTab='';
function go(page,tab=''){currentPage=page;currentTab=tab;window.location.hash=page+(tab?'/'+tab:'');renderCurrentPage()}
async function renderCurrentPage(){
  if(!DB._ready){$('#app').innerHTML=loadingHTML();await DB.init()}
  renderPage(currentPage,currentTab);
}
function renderPage(page,tab){
  const app=$('#app');
  if(page==='role-select'){app.innerHTML=pgRoleSelect();return}
  if(page==='wife'){
    if(tab==='waiting'){app.innerHTML=pgWifeWaiting();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('wife');return}
    app.innerHTML=pgWifeHome();
  }else if(page==='hubby'){
    if(tab==='manage'){app.innerHTML=pgHubbyManage();return}
    if(tab==='stats'){app.innerHTML=pgHubbyStats();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('hubby');return}
    if(tab==='settings'){app.innerHTML=pgSettings();return}
    app.innerHTML=pgHubbyHome();
  }else{app.innerHTML=pgRoleSelect()}
}
function initRouter(){
  const hash=window.location.hash.slice(1)||'';
  const[page,...rest]=hash.split('/');
  const role=localStorage.getItem('pp_role');
  if(page==='wife'||page==='hubby')go(page,rest[0]||'home');
  else if(role)go(role==='wife'?'wife/home':'hubby/home');
  else go('role-select');
  window.addEventListener('hashchange',()=>{const h=window.location.hash.slice(1)||'';const[p,...r]=h.split('/');if(p!==currentPage||r[0]!==currentTab){currentPage=p;currentTab=r[0]||'';renderCurrentPage()}});
}

function pgWifeHome(){
  const order=DB.todayOrder();
  if(order){setTimeout(()=>go('wife/waiting'),50);return '<div class="min-h-screen flex items-center justify-center"><div class="loading-spinner"></div></div>'}
  _selDishes=new Set();_selCats='全部';
  const dishes=DB.dishes();const recent=DB.recentOrders(3);const tpls=DB.templates();
  const anni=DB.setting('anni','');
  let anniBanner='';
  if(anni){const today=new Date();const ad=new Date(anni);if(today.getMonth()===ad.getMonth()&&today.getDate()===ad.getDate()){anniBanner=`<div class="bg-gradient-to-r from-rose-50 to-pink-50 border border-rose-200 rounded-2xl p-4 mb-4 anim-fade"><div class="flex items-center gap-2 text-rose-500 font-medium mb-1"><i class="fa-solid fa-heart"></i> 今天是纪念日哦</div><p class="text-rose-400 text-sm">要不要加个硬菜庆祝一下？</p></div>`}}
  return `<div class="min-h-screen pb-24">
    <header class="sticky top-0 z-30 bg-warm-50/90 backdrop-blur-lg px-4 pt-4 pb-3">
      <div class="flex items-center justify-between mb-3">
        <h1 class="font-display text-xl">今天吃什么</h1>
        <button data-action="mark-no-cook" class="text-bark-300 text-xs border border-warm-200 rounded-full px-3 py-1 active:bg-warm-100"><i class="fa-solid fa-xmark mr-1"></i>今天不做饭</button>

function renderDishGrid(dishes){
  const filtered=_selCats==='全部'?dishes:dishes.filter(d=>d.category===_selCats);

/* ============================================================

function pgHubbyStats(){
  const orders=DB.orders().filter(o=>!o.cancelled);
  const thisMonth=new Date();thisMonth.setDate(1);thisMonth.setHours(0,0,0,0);
  const mo=orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>=thisMonth.getTime());
  const totalDays=new Set(mo.map(o=>o.order_date)).size;
  const totalDishes=mo.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
  const totalCost=mo.reduce((s,o)=>s+DB.orderCost(o),0);
  const avgCost=totalDays?Math.round(totalCost/totalDays):0;
  const dishCount={};orders.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{dishCount[i.did]=(dishCount[i.did]||0)+1})});
  const top5=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  let meatCnt=0,vegCnt=0;mo.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{const d=DB.getDish(i.did);if(d){if(d.category==='荤菜')meatCnt++;else if(d.category==='素菜')vegCnt++}})});
  const dishTotal=meatCnt+vegCnt;const meatPct=dishTotal?Math.round(meatCnt/dishTotal*100):50;const vegPct=100-meatPct;
  const rated=mo.filter(o=>o.rating);const goodCnt=rated.filter(o=>o.rating==='good').length;const goodRate=rated.length?Math.round(goodCnt/rated.length*100):0;
  const last7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const o=orders.find(x=>x.order_date===ds&&!x.cancelled);last7.push({date:ds,order:o})}

/* ============================================================

document.addEventListener('click',async e=>{
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const a=btn.dataset.action;const d=btn.dataset;
  switch(a){
    case 'select-role':localStorage.setItem('pp_role',d.role);go(d.role==='wife'?'wife/home':'hubby/home');break;
    case 'switch-role':localStorage.removeItem('pp_role');go('role-select');break;
    case 'cat-filter':_selCats=d.cat;const list=$('#dish-list');if(list)list.innerHTML=renderDishGrid(DB.dishes());$$('#cat-tabs .tab-btn').forEach(b=>{if(b.dataset.cat===_selCats)b.className=b.className.replace(/border-warm-200 text-bark-400/g,'bg-warm-500 text-white border-warm-500');else b.className=b.className.replace(/bg-warm-500 text-white border-warm-500/g,'border-warm-200 text-bark-400')});break;
    case 'toggle-dish':if(_selDishes.has(d.did))_selDishes.delete(d.did);else _selDishes.add(d.did);refreshSelBar();$$('.dish-card').forEach(c=>{if(c.dataset.did===d.did)c.classList.toggle('sel',_selDishes.has(d.did))});break;
    case 'go-confirm':showConfirmModal();break;
    case 'submit-order':{const remark=$('#order-remark')?.value||'';closeModal();const result=await DB.addOrder([..._selDishes],remark);if(result){_selDishes.clear();setTimeout(()=>go('wife/waiting'),600)}break}
    case 'reorder':{const o=DB.orders().find(x=>x.id===d.oid);if(o){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;_selDishes=new Set((items||[]).map(i=>i.did));refreshSelBar();toast('已选好，可修改后提交','info')}break}
    case 'apply-tpl':{const t=DB.templates().find(x=>x.id===d.tid);if(t){const items=typeof t.items==='string'?JSON.parse(t.items):t.items;_selDishes=new Set(items);refreshSelBar();toast('已选好，可修改后提交','info')}break}
    case 'random-meal':{const dishes=DB.dishes();const w3=Date.now()-3*864e5;const recent=new Set();DB.orders().filter(o=>o.created_at&&new Date(o.created_at).getTime()>w3&&!o.cancelled).forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>recent.add(i.did))});const cats={'荤菜':2,'素菜':1,'汤':1};const picked=[];for(const[cat,n]of Object.entries(cats)){const pool=dishes.filter(dd=>dd.category===cat&&!recent.has(dd.id)&&!picked.includes(dd.id));const src=pool.length>=n?pool:dishes.filter(dd=>dd.category===cat&&!picked.includes(dd.id));for(let i=0;i<n&&src.length;i++){const idx=Math.floor(Math.random()*src.length);picked.push(src[idx].id);src.splice(idx,1)}}_selDishes=new Set(picked);refreshSelBar();toast('随机选好了，不满意可以换','success');break}
    case 'mark-no-cook':showNoCookModal();break;
    case 'save-no-cook':await DB.setNoCook(DB.today(),decodeURIComponent(d.reason));closeModal();renderCurrentPage();break;
    case 'save-no-cook-custom':{const v=$('#no-cook-custom')?.value||'不做饭';await DB.setNoCook(DB.today(),v);closeModal();renderCurrentPage();break}
    case 'rate':{const o=DB.todayOrder();if(o){await DB.updateOrder(o.id,{rating:d.r});toast(d.r==='good'?'谢谢老婆!':d.r==='ok'?'下次改进!':'好吧...',d.r==='good'?'success':'info');if(d.r==='good')showConfetti();renderCurrentPage()}break}
    case 'wife-modify':{const o=DB.todayOrder();if(o&&(o.status==='ordered'||o.status==='seen')){await DB.updateOrder(o.id,{status:'ordered'});go('wife/home')}break}
    case 'update-status':{const o=DB.todayOrder();if(o){await DB.updateOrder(o.id,{status:d.st});toast(STATUS_LABELS[d.st],'success');renderCurrentPage()}break}
    case 'cancel-order':showCancelModal(d.oid);break;
    case 'do-cancel':{await DB.updateOrder(d.oid,{cancelled:true,cancel_reason:decodeURIComponent(d.reason),status:'cancelled'});closeModal();toast('已取消','info');renderCurrentPage();break}
    case 'do-cancel-custom':{const v=$('#cancel-custom')?.value||'';if(!v.trim()){toast('请填写原因','warn');return}await DB.updateOrder(d.oid,{cancelled:true,cancel_reason:v,status:'cancelled'});closeModal();toast('已取消','info');renderCurrentPage();break}
    case 'toggle-inv':{const name=decodeURIComponent(d.name);await DB.setInv(name,!DB.hasInv(name));renderCurrentPage();break}
    case 'cancel-no-cook':await DB.cancelNoCook(DB.today());renderCurrentPage();break;
    case 'wife-tab':go('wife/'+d.tab);break;
    case 'hubby-tab':go('hubby/'+d.tab);break;
    case 'manage-tab':_manageTab=d.mt;renderCurrentPage();break;
    case 'add-dish':showDishModal(null);break;
    case 'edit-dish':showDishModal(d.did);break;
    case 'save-dish':{const name=$('#dm-name')?.value?.trim();if(!name){toast('请输入菜名','warn');return}const cat=$('#dm-cat')?.value;const time=parseInt($('#dm-time')?.value)||15;const cost=parseInt($('#dm-cost')?.value)||10;const ing=($('#dm-ing')?.value||'').split('\n').map(s=>s.trim()).filter(Boolean);const fav=$('#dm-fav')?.checked||false;const existing=d.did?DB.getDish(d.did):null;const dishObj={id:d.did||uid(),name,category:cat,ingredients:ing,cook_time:time,cost_estimate:cost,is_favorite:fav};if(existing)dishObj._exists=true;await DB.saveDish(dishObj);closeModal();toast(d.did?'已保存':'已添加','success');renderCurrentPage();break}
    case 'del-dish':await DB.deleteDish(d.did);toast('已删除','info');renderCurrentPage();break;
    case 'add-tpl':showTplModal(null);break;
    case 'edit-tpl':showTplModal(d.tid);break;
    case 'tm-toggle':{if(!window._tmSel)window._tmSel=new Set();if(window._tmSel.has(d.did))window._tmSel.delete(d.did);else window._tmSel.add(d.did);$$('#tm-dishes button').forEach(b=>{if(b.dataset.did===d.did){if(window._tmSel.has(d.did))b.className=b.className.replace('border-warm-200 text-bark-400','bg-warm-50 border-warm-500 text-warm-600');else b.className=b.className.replace('bg-warm-50 border-warm-500 text-warm-600','border-warm-200 text-bark-400')}});break}
    case 'save-tpl':{const name=$('#tm-name')?.value?.trim();if(!name){toast('请输入模板名称','warn');return}const desc=$('#tm-desc')?.value?.trim();const items=[...(window._tmSel||[])];const existing=d.tid?DB.templates().find(x=>x.id===d.tid):null;const tplObj={id:d.tid||uid(),name,description:desc,icon:'fa-utensils',items};if(existing)tplObj._exists=true;await DB.saveTpl(tplObj);window._tmSel=null;closeModal();toast(d.tid?'已保存':'已添加','success');renderCurrentPage();break}
    case 'del-tpl':await DB.deleteTpl(d.tid);toast('已删除','info');renderCurrentPage();break;
    case 'cal-day':showDayDetail(d.date);break;
    case 'save-anni':{const v=$('#anni-input')?.value||'';await DB.saveSetting('anni',v);toast('已保存','success');break}
    case 'export-data':{const orders=DB.orders();let csv='\uFEFF日期,状态,菜品,备注,评价\n';orders.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;const names=DB.getDishesByIds((items||[]).map(i=>i.did)).map(d=>d.name).join('+');const rating=o.rating==='good'?'好吃':o.rating==='ok'?'一般':o.rating==='bad'?'别做了':'';csv+=`${o.order_date},${o.cancelled?'取消':STATUS_LABELS[o.status]},"${names}","${o.remark||''}","${rating}"\n`});const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`盼盼点菜记录_${DB.today()}.csv`;a.click();toast('已导出','success');break}
    case 'close-modal':closeModal();break;
  }
});

function refreshSelBar(){const bar=$('#sel-bar');if(!bar)return;const count=_selDishes.size;bar.style.display=count>0?'block':'none';const ce=$('#sel-count');if(ce)ce.textContent=count;const co=$('#sel-cost');if(co){const dishes=DB.getDishesByIds([..._selDishes]);const total=dishes.reduce((s,d)=>s+(d.cost_estimate||0),0);co.textContent=`~${total}元`}}

/* 自动刷新等待页文案 */
setInterval(()=>{const m=$('#status-msg');if(m&&currentPage==='wife/waiting'){const o=DB.todayOrder();if(o){const msgs=STATUS_MSGS[o.status];if(msgs)m.textContent=pick(msgs.wife||msgs)}}},4000);

/* 启动 */
initRouter();
</script>
</body>
</html>
