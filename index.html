<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>盼盼老婆请点菜</title>
<meta name="theme-color" content="#FF6B9D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="点菜">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{colors:{
  primary:{50:'#FFF0F5',100:'#FFE0EC',200:'#FFB3D1',300:'#FF8FB8',400:'#FF6B9D',500:'#FF4D82',600:'#E63268',700:'#CC1F52'},
  accent:{50:'#FFF7ED',100:'#FFEDD5',200:'#FED7AA',300:'#FDBA74',400:'#FB923C',500:'#F97316'},
  text:{main:'#2D2D2D',sub:'#8E8E93',light:'#C7C7CC'}
},fontFamily:{display:['ZCOOL KuaiLe','cursive'],body:['Noto Sans SC','sans-serif']}}}}
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
html,body{height:100%}
body{overscroll-behavior:none;margin:0;position:relative;z-index:1}

/* ============================================
   炫酷动态渐变背景 - 专业升级版
   ============================================ */
@keyframes gradientBG{
  0%{background-position:0% 50%}
  25%{background-position:50% 100%}
  50%{background-position:100% 50%}
  75%{background-position:50% 0%}
  100%{background-position:0% 50%}
}
@keyframes aurora{
  0%,100%{opacity:0.3;transform:translate(0,0) scale(1)}
  33%{opacity:0.5;transform:translate(30px,-20px) scale(1.1)}
  66%{opacity:0.4;transform:translate(-20px,30px) scale(0.95)}
}
.bg-gradient-couple{
  background:
    radial-gradient(ellipse at 20% 20%, rgba(255,182,193,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255,218,233,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 40% 60%, rgba(255,240,245,0.6) 0%, transparent 50%),
    linear-gradient(135deg, #FFF5F7 0%, #FFE4EC 25%, #FFF0F6 50%, #FFFAF0 75%, #FFF5F7 100%);
  background-size:400% 400%;
  animation:gradientBG 20s ease infinite;
  background-attachment:fixed;
  position:relative;
}
.bg-gradient-couple::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 85%, rgba(255,107,157,0.08) 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, rgba(255,143,179,0.06) 0%, transparent 40%);
  animation:aurora 8s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
}

/* 漂浮装饰元素 */
.deco-heart,.deco-star,.deco-sparkle{
  position:fixed;
  pointer-events:none;
  z-index:0;
  opacity:.6;
  user-select:none;
}
.deco-heart{animation:floatAround 8s ease-in-out infinite}
.deco-star{animation:floatAround 10s ease-in-out infinite reverse}
.deco-sparkle{animation:sparkle 3s ease-in-out infinite}

/* 粒子容器 */
#particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

/* 主应用容器 */
#app{
  position:relative;
  z-index:10;
  min-height:100vh;
}

/* ============================================
   高级毛玻璃效果 - 专业升级版
   ============================================ */
.glass-ultra{
  background:rgba(255,255,255,0.18);
  backdrop-filter:blur(60px);
  -webkit-backdrop-filter:blur(60px);
  border:1px solid rgba(255,255,255,0.5);
  box-shadow:
    0 20px 60px rgba(255,107,157,0.12),
    0 8px 24px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.7);
}
.glass-card{
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 12px 40px rgba(255,107,157,0.1),
    0 4px 12px rgba(0,0,0,0.04),
    inset 0 1px 0 rgba(255,255,255,0.6);
}

/* ============================================
   动画库 - 专业升级版
   ============================================ */
/* 漂浮动画 */
@keyframes float1{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(15px,-20px) rotate(4deg)}50%{transform:translate(25px,-35px) rotate(-3deg)}75%{transform:translate(15px,-25px) rotate(3deg)}}
@keyframes float2{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(-18px,-18px) rotate(-4deg)}50%{transform:translate(-28px,-28px) rotate(3deg)}75%{transform:translate(-15px,-22px) rotate(-2deg)}}
@keyframes float3{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(12px,-15px) scale(1.08)}66%{transform:translate(-8px,-20px) scale(0.92)}}
.anim-float1{animation:float1 7s ease-in-out infinite}
.anim-float2{animation:float2 8s ease-in-out infinite}
.anim-float3{animation:float3 6s ease-in-out infinite}

/* 入场动画 */
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bounceIn{0%{transform:scale(.4);opacity:0}50%{transform:scale(1.08)}70%{transform:scale(.95)}100%{transform:scale(1);opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.anim-fade{animation:fadeUp .6s cubic-bezier(.25,.46,.45,.94) both}
.anim-slide{animation:slideUp .5s cubic-bezier(.25,.46,.45,.94) both}
.anim-bounce{animation:bounceIn .7s cubic-bezier(.68,-.55,.265,1.55) both}
.anim-scale{animation:scaleIn .4s ease-out both}
.anim-slide-right{animation:slideInRight .4s ease-out both}

/* 脉冲和发光 */
@keyframes pulseSoft{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 25px rgba(255,107,157,0.35)}50%{box-shadow:0 0 50px rgba(255,107,157,0.55),0 0 80px rgba(255,107,157,0.25)}}
@keyframes glowStrong{0%,100%{box-shadow:0 0 30px rgba(255,107,157,0.45)}50%{box-shadow:0 0 60px rgba(255,107,157,0.7),0 0 100px rgba(255,107,157,0.3)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.35)}28%{transform:scale(1)}42%{transform:scale(1.35)}70%{transform:scale(1)}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(150px) rotate(1080deg);opacity:0}}
@keyframes ripple{0%{transform:scale(.8);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
@keyframes rainbow{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(360deg)}}
@keyframes floatAround{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-15px) rotate(5deg)}50%{transform:translate(-5px,-25px) rotate(-3deg)}75%{transform:translate(-15px,-10px) rotate(3deg)}}
@keyframes fadeInScale{0%{opacity:0;transform:scale(.8) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* ========== 超级炫酷动画增强版 ========== */
@keyframes pulseUltra{
  0%,100%{transform:scale(1);opacity:1}
  25%{transform:scale(1.1);opacity:0.9}
  50%{transform:scale(1.05);opacity:1}
  75%{transform:scale(1.15);opacity:0.85}
}
@keyframes glowPulse{
  0%,100%{
    transform:scale(1);
    opacity:0.4;
    filter:blur(25px);
  }
  33%{
    transform:scale(1.2);
    opacity:0.6;
    filter:blur(35px);
  }
  66%{
    transform:scale(1.1);
    opacity:0.5;
    filter:blur(30px);
  }
}
@keyframes ringExpand{
  0%{
    transform:scale(0.8);
    opacity:0.6;
  }
  50%{
    transform:scale(1.1);
    opacity:0.3;
  }
  100%{
    transform:scale(1.3);
    opacity:0;
  }
}
@keyframes orbit{
  0%{transform:rotate(0deg) translateX(15px) rotate(0deg)}
  100%{transform:rotate(360deg) translateX(15px) rotate(-360deg)}
}
@keyframes orbitReverse{
  0%{transform:rotate(360deg) translateX(25px) rotate(-360deg)}
  100%{transform:rotate(0deg) translateX(25px) rotate(0deg)}
}
@keyframes shimmerUltra{
  0%{background-position:-200% center}
  100%{background-position:200% center}
}
@keyframes breathe{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.02)}
}
@keyframes float3d{
  0%,100%{
    transform:translateY(0) rotateX(0deg) rotateY(0deg);
  }
  25%{
    transform:translateY(-10px) rotateX(5deg) rotateY(5deg);
  }
  50%{
    transform:translateY(-5px) rotateX(0deg) rotateY(-5deg);
  }
  75%{
    transform:translateY(-15px) rotateX(-5deg) rotateY(3deg);
  }
}
@keyframes glowRotate{
  0%{
    transform:rotate(0deg) scale(1);
    opacity:0.5;
  }
  50%{
    transform:rotate(180deg) scale(1.2);
    opacity:0.7;
  }
  100%{
    transform:rotate(360deg) scale(1);
    opacity:0.5;
  }
}
@keyframes particleRing{
  0%{
    transform:rotate(0deg);
    opacity:0.8;
  }
  100%{
    transform:rotate(360deg);
    opacity:0.8;
  }
}
@keyframes bounceUltra{
  0%,100%{
    transform:translateY(0) scale(1);
  }
  10%{
    transform:translateY(0) scale(1.1,0.9);
  }
  30%{
    transform:translateY(-20px) scale(0.95,1.05);
  }
  50%{
    transform:translateY(0) scale(1.05,0.95);
  }
  70%{
    transform:translateY(-7px) scale(1);
  }
}
@keyframes slideInBounce{
  0%{
    opacity:0;
    transform:translateY(50px) scale(0.8);
  }
  60%{
    opacity:1;
    transform:translateY(-10px) scale(1.05);
  }
  80%{
    transform:translateY(5px) scale(0.98);
  }
  100%{
    transform:translateY(0) scale(1);
  }
}
@keyframes glowBorder{
  0%,100%{
    box-shadow:
      0 0 5px currentColor,
      0 0 10px currentColor,
      0 0 15px currentColor;
  }
  50%{
    box-shadow:
      0 0 10px currentColor,
      0 0 20px currentColor,
      0 0 30px currentColor,
      0 0 40px currentColor;
  }
}
@keyframes morph{
  0%,100%{border-radius:50% 50% 50% 50% / 50% 50% 50% 50%}
  25%{border-radius:60% 40% 60% 40% / 40% 60% 40% 60%}
  50%{border-radius:40% 60% 40% 60% / 60% 40% 60% 40%}
  75%{border-radius:50% 30% 50% 70% / 60% 40% 60% 40%}
}
@keyframes wave{
  0%,100%{transform:rotate(-3deg)}
  25%{transform:rotate(3deg)}
  50%{transform:rotate(-2deg)}
  75%{transform:rotate(2deg)}
}
@keyframes spinPulse{
  0%{transform:rotate(0deg) scale(1)}
  50%{transform:rotate(180deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}
@keyframes ringBreathe{
  0%,100%{
    transform:scale(1);
    opacity:0.15;
  }
  50%{
    transform:scale(1.08);
    opacity:0.3;
  }
}

/* 动画类 */
.anim-pulse{animation:pulseSoft 2s ease-in-out infinite}
.anim-pulse-ultra{animation:pulseUltra 1.5s ease-in-out infinite}
.anim-glow{animation:glow 2.5s ease-in-out infinite}
.anim-glow-strong{animation:glowStrong 2s ease-in-out infinite}
.anim-glow-pulse{animation:glowPulse 3s ease-in-out infinite}
.anim-heartbeat{animation:heartBeat 1.3s ease-in-out infinite}
.anim-wiggle{animation:wiggle .5s ease-in-out infinite}
.anim-pop{animation:popIn .4s cubic-bezier(.68,-.55,.265,1.55) both}
.anim-fade-scale{animation:fadeInScale .5s ease-out both}
.anim-rainbow{animation:rainbow 3s linear infinite}
.anim-float-around{animation:floatAround 6s ease-in-out infinite}
.anim-orbit{animation:orbit 4s linear infinite}
.anim-orbit-reverse{animation:orbitReverse 6s linear infinite}
.anim-breathe{animation:breathe 3s ease-in-out infinite}
.anim-float-3d{animation:float3d 5s ease-in-out infinite}
.anim-glow-rotate{animation:glowRotate 4s linear infinite}
.anim-bounce-ultra{animation:bounceUltra 1s ease-in-out}
.anim-slide-bounce{animation:slideInBounce 0.6s cubic-bezier(.68,-.55,.265,1.55) both}
.anim-glow-border{animation:glowBorder 2s ease-in-out infinite}
.anim-morph{animation:morph 8s ease-in-out infinite}
.anim-wave{animation:wave 2s ease-in-out infinite}
.anim-spin-pulse{animation:spinPulse 2s ease-in-out infinite}

/* 逐个进入动画延迟类 */
.stagger-1{animation-delay:.05s}
.stagger-2{animation-delay:.1s}
.stagger-3{animation-delay:.15s}
.stagger-4{animation-delay:.2s}
.stagger-5{animation-delay:.25s}
.stagger-6{animation-delay:.3s}
.stagger-7{animation-delay:.35s}
.stagger-8{animation-delay:.4s}
.stagger-9{animation-delay:.45s}
.stagger-10{animation-delay:.5s}
.stagger-11{animation-delay:.55s}
.stagger-12{animation-delay:.6s}
.stagger-13{animation-delay:.65s}
.stagger-14{animation-delay:.7s}
.stagger-15{animation-delay:.75s}
.stagger-16{animation-delay:.8s}
.stagger-17{animation-delay:.85s}
.stagger-18{animation-delay:.9s}
.stagger-19{animation-delay:.95s}
.stagger-20{animation-delay:1s}
.stagger-21{animation-delay:1.05s}
.stagger-22{animation-delay:1.1s}
.stagger-23{animation-delay:1.15s}
.stagger-24{animation-delay:1.2s}
.stagger-25{animation-delay:1.25s}
.stagger-26{animation-delay:1.3s}
.stagger-27{animation-delay:1.35s}
.stagger-28{animation-delay:1.4s}
.stagger-29{animation-delay:1.45s}
.stagger-30{animation-delay:1.5s}

/* ============================================
   菜品卡片 - 专业炫酷版
   ============================================ */
.dish-card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(25px);
  -webkit-backdrop-filter:blur(25px);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:
    0 8px 32px rgba(255,107,157,0.1),
    0 2px 8px rgba(0,0,0,0.03),
    inset 0 1px 0 rgba(255,255,255,0.7);
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.dish-card::before{
  content:'';
  position:absolute;
  inset:-2px;
  background:linear-gradient(135deg, rgba(255,107,157,0.12), rgba(255,143,179,0.06), rgba(255,182,193,0.08));
  border-radius:26px;
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
  z-index:0;
}
.dish-card::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:50%;
  background:linear-gradient(180deg, rgba(255,255,255,0.4), transparent);
  border-radius:24px 24px 0 0;
  pointer-events:none;
  opacity:0.6;
}
.dish-card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:
    0 20px 60px rgba(255,107,157,0.18),
    0 8px 24px rgba(0,0,0,0.06),
    inset 0 1px 0 rgba(255,255,255,0.8);
}
.dish-card:hover::before{opacity:1}
.dish-card:active{transform:translateY(-2px) scale(.98)}
.dish-card.sel{
  background:linear-gradient(135deg, rgba(255,240,245,0.9), rgba(255,250,240,0.85));
  border:2px solid rgba(255,107,157,0.6);
  box-shadow:
    0 16px 48px rgba(255,107,157,0.25),
    0 0 0 6px rgba(255,107,157,0.1),
    inset 0 1px 0 rgba(255,255,255,0.85);
  transform:translateY(-4px) scale(1.03);
}
.dish-card.sel::before{
  opacity:1;
  background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.12), rgba(255,182,193,0.15));
}
.dish-card.sel::after{
  opacity:0.8;
}

/* ============================================
   图标容器 - 专业炫酷版
   ============================================ */
.emoji-container{
  position:relative;
  z-index:1;
}
.emoji-container::before{
  content:'';
  position:absolute;
  inset:-4px;
  background:linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,143,179,0.1));
  border-radius:inherit;
  filter:blur(8px);
  opacity:0;
  transition:opacity .35s ease;
  z-index:-1;
}
.emoji-container:hover::before{opacity:1}
.sel .emoji-container::before{opacity:1}

/* ============================================
   渐变按钮 - 专业发光版
   ============================================ */
.btn-primary{
  background:linear-gradient(135deg, #FF6B9D 0%, #FF8FB8 30%, #FFB3D1 70%, #FF6B9D 100%);
  background-size:300% 300%;
  color:white;
  box-shadow:
    0 8px 32px rgba(255,107,157,0.4),
    0 0 0 1px rgba(255,255,255,0.25) inset;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.btn-primary::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.3), transparent 50%, rgba(255,255,255,0.15));
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.btn-primary:hover{
  background-position:100% 100%;
  transform:translateY(-2px);
  box-shadow:
    0 16px 48px rgba(255,107,157,0.5),
    0 0 0 1px rgba(255,255,255,0.3) inset;
}
.btn-primary:hover::before{opacity:1}
.btn-primary:active{
  transform:translateY(0) scale(.97);
  box-shadow:
    0 6px 20px rgba(255,107,157,0.3),
    0 0 0 1px rgba(255,255,255,0.2) inset;
}

/* ============================================
   分类标签按钮 - 专业版
   ============================================ */
.cat-btn{
  border-radius:100px;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  border:1.5px solid transparent;
  position:relative;
  overflow:hidden;
}
.cat-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,107,157,0.08), transparent);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
}
.cat-btn:hover::before{opacity:1}
.cat-btn.active{
  background:linear-gradient(135deg, #FF6B9D, #FF8FB8, #FFB3D1);
  background-size:200% 200%;
  color:white;
  border-color:transparent;
  box-shadow:
    0 8px 28px rgba(255,107,157,0.35),
    0 0 0 1px rgba(255,255,255,0.25) inset;
  transform:translateY(-2px) scale(1.03);
}
.cat-btn:not(.active){
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  border-color:rgba(255,107,157,0.18);
  color:#444;
}
.cat-btn:not(.active):hover{
  background:rgba(255,255,255,0.8);
  border-color:rgba(255,107,157,0.3);
  transform:translateY(-1px);
  box-shadow:0 6px 20px rgba(255,107,157,0.12);
}

/* ============================================
   Tab 按钮 - 专业版
   ============================================ */
.tab-btn{
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  min-height:56px;
}
.tab-btn.active{
  color:#FF6B9D;
  font-weight:600;
}
.tab-btn.active::after{
  content:'';
  position:absolute;
  bottom:-3px;
  left:50%;
  transform:translateX(-50%);
  width:32px;
  height:4px;
  background:linear-gradient(90deg, #FF6B9D, #FF8FB8, #FFB3D1);
  border-radius:4px;
  box-shadow:0 4px 12px rgba(255,107,157,0.4);
}

/* 确保图标不干扰点击事件 */
.tab-btn i, .tab-btn .fa-solid {
  pointer-events: none;
}

/* 底部导航按钮确保填满区域 */
nav.fixed button {
  position: relative;
  z-index: 1;
}
nav.fixed button > * {
  pointer-events: none;
}

   ============================================ */

}

  0%,100%{transform:perspective(1000px) rotateX(0deg) rotateY(0deg)}

}

  40%{transform:perspective(400px) rotateY(-10deg)}
  70%{transform:perspective(400px) rotateY(10deg)}
  100%{transform:perspective(400px) rotateY(0deg);opacity:1}
}

    const milestones=[

      {days:200,name:'双百日纪念',icon:'🌟'},
      {days:300,name:'三百日纪念',icon:'🎊'},
      {days:365,name:'一周年',icon:'🎂'},
      {days:500,name:'五百日纪念',icon:'✨'},

      {days:1095,name:'三周年',icon:'🎂'},
      {days:1460,name:'四周年',icon:'🎂'},
      {days:1825,name:'五周年',icon:'🎂'}
    ];
    return milestones.map(m=>{
      const daysFromStart=m.days;
      const daysToMilestone=daysFromStart-anniInfo.daysTogether;
      return {...m,daysToMilestone,isToday:daysToMilestone===0,isPast:daysToMilestone<0,isUpcoming:daysToMilestone>0&&daysToMilestone<=30};
    });

  getUpcomingSpecialDates(days=7){
    const today=new Date();
    const todayStr=this.today();
    return this._specialDates.map(sd=>{
      let targetDate,diff;
      if(sd.repeat_yearly){
        const sdDate=new Date(sd.date);
        targetDate=new Date(today.getFullYear(),sdDate.getMonth(),sdDate.getDate());
        if(targetDate<today)targetDate.setFullYear(today.getFullYear()+1);
        diff=Math.ceil((targetDate-today)/864e5);
      }else{
        targetDate=new Date(sd.date);
        diff=Math.ceil((targetDate-today)/864e5);
      }
      return {...sd,targetDate,daysLeft:diff};
    }).filter(sd=>sd.daysLeft>=0&&sd.daysLeft<=days);
  },

  getAnniInfo(){
    const anni=this.setting('anni','');
    if(!anni)return null;
    const today=new Date();
    const startDate=new Date(anni);
    
    const daysTogether=Math.floor((today-startDate)/864e5);
    
    let nextAnni=new Date(today.getFullYear(),startDate.getMonth(),startDate.getDate());
    if(nextAnni<today)nextAnni.setFullYear(today.getFullYear()+1);
    const daysToNext=Math.ceil((nextAnni-today)/864e5);
    
    const yearsTogether=Math.floor(daysTogether/365);
    const monthsTogether=Math.floor((daysTogether%365)/30);
    
    const isAnniToday=today.getMonth()===startDate.getMonth()&&today.getDate()===startDate.getDate();
    
    return {
      date:anni,
      daysTogether,
      daysToNext,
      yearsTogether,
      monthsTogether,
      isAnniToday,
      nextAnni
    };
  },

  // 给菜品打分（针对某个场景）
  _scoreDishForScenario(d,scenario){
    let score=0;
    
    // 辣度检查
    const spicyLevel=d.spicy_level||0;
    if(spicyLevel>(scenario.maxSpicy||3))return -100; // 直接排除
    
    // 标签匹配
    const tags=this._getDishTags(d);
    scenario.includeTags.forEach(tag=>{
      if(tags.includes(tag))score+=10;
    });
    scenario.excludeTags.forEach(tag=>{
      if(tags.includes(tag))score-=20;
    });
    
    // 分类偏好
    if(scenario.preferredCategories.includes(d.category))score+=5;
    
    // 收藏加分
    if(d.is_favorite)score+=15;
    
    // 难度加分（简单优先）
    if(d.difficulty==='简单')score+=3;
    else if(d.difficulty==='中等')score+=1;
    
    return score;
  },

  // 根据场景推荐菜品
  recommendForScenario(scenarioId){
    const scenario=this.getScenario(scenarioId);
    if(!scenario)return [];
    
    const dishes=this.dishes();
    
    // 打分并过滤
    const scored=dishes.map(d=>({
      dish:d,
      score:this._scoreDishForScenario(d,scenario)
    })).filter(item=>item.score>=-50); // 排除完全不合适的
    
    // 排序
    scored.sort((a,b)=>b.score-a.score);
    
    return scored.map(item=>item.dish);
  },

  // 根据场景生成推荐套餐
  generateComboForScenario(scenarioId){
    const scenario=this.getScenario(scenarioId);
    if(!scenario)return null;
    
    const recommended=this.recommendForScenario(scenarioId);
    const counts=scenario.recommendCount||{main:2,soup:1,staple:1};
    
    // 按分类分组
    const soups=recommended.filter(d=>d.category==='汤');
    const staples=recommended.filter(d=>d.category==='主食');
    const mains=recommended.filter(d=>d.category!=='汤'&&d.category!=='主食');
    
    const combo={
      scenario:scenario,
      soups:soups.slice(0,counts.soup),
      staples:staples.slice(0,counts.staple),
      mains:mains.slice(0,counts.main)
    };
    
    combo.all=[...combo.mains,...combo.soups,...combo.staples];
    
    return combo;
  },

  getCookingStats(){
    const orders=this._orders.filter(o=>!o.cancelled);
    const dishes=new Set();
    const goodRatings=orders.filter(o=>o.rating==='good').length;
    let totalCookTime=0;
    let quickDishes=0;
    let lowFatDishes=0;
    let spicyDishes=0;

    orders.forEach(o=>{
      const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
      (items||[]).forEach(i=>{
        const d=this.getDish(i.did);
        if(d){
          dishes.add(d.id);
          totalCookTime+=d.cook_time||0;
          if(d.cook_time&&d.cook_time<=15)quickDishes++;
          const tags=d.tags||[];
          if(Array.isArray(tags)&&tags.some(t=>t==='减脂'||t==='低脂'||t==='健康'))lowFatDishes++;
          if(d.spicy_level&&d.spicy_level>=1)spicyDishes++;
        }
      });
    });

    return {
      totalOrders:orders.length,
      totalDishes:dishes.size,
      goodRatings,
      totalCookTime,
      quickDishes,
      lowFatDishes,
      spicyDishes,
      hardDishes:Array.from(dishes).filter(id=>{const d=this.getDish(id);return d&&d.difficulty==='困难'}).length
    };
  },

  checkAchievements(){
    const stats=this.getCookingStats();
    const unlocked=this.getUnlockedAchievements().map(a=>a.id);
    const toCheck=[
      {id:'a1',check:()=>stats.totalOrders>=1},
      {id:'a3',check:()=>stats.totalDishes>=10},
      {id:'a4',check:()=>stats.goodRatings>=10},
      {id:'a6',check:()=>stats.quickDishes>=10},
      {id:'a8',check:()=>stats.totalOrders>=100},
      {id:'a9',check:()=>stats.lowFatDishes>=20},
      {id:'a10',check:()=>stats.spicyDishes>=10}
    ];
    toCheck.forEach(async({id,check})=>{
      if(!unlocked.includes(id)&&check()){
        await this.unlockAchievement(id);
      }
    });
  }
};

/* ============================================================

   ============================================================ */
let currentPage='',currentTab='';
function go(page,tab=''){
  // 支持两种调用方式：go('wife', 'home') 或 go('wife/home')
  if(page.includes('/')){
    const parts=page.split('/');
    currentPage=parts[0];
    currentTab=parts[1]||'';
  }else{
    currentPage=page;
    currentTab=tab;
  }
  window.location.hash=currentPage+(currentTab?'/'+currentTab:'');
  renderCurrentPage();
}
async function renderCurrentPage(){
  if(!DB._ready){$('#app').innerHTML=loadingHTML();await DB.init()}
  renderPage(currentPage,currentTab);
}
function renderPage(page,tab){
  const app=$('#app');
  if(page==='role-select'){app.innerHTML=pgRoleSelect();return}
  if(page==='wife'){
    if(tab==='waiting'){app.innerHTML=pgWifeWaiting();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('wife');return}
    app.innerHTML=pgWifeHome();
  }else if(page==='hubby'){
    if(tab==='manage'){app.innerHTML=pgHubbyManage();return}
    if(tab==='shopping'){app.innerHTML=pgHubbyShopping();return}
    if(tab==='achievements'){app.innerHTML=pgHubbyAchievements();return}
    if(tab==='stats'){app.innerHTML=pgHubbyStats();return}
    if(tab==='calendar'){app.innerHTML=pgCalendar('hubby');return}
    if(tab==='settings'){app.innerHTML=pgSettings();return}
    app.innerHTML=pgHubbyHome();
  }else{app.innerHTML=pgRoleSelect()}
}
function initRouter(){
  const hash=window.location.hash.slice(1)||'';
  const[page,...rest]=hash.split('/');
  const role=localStorage.getItem('pp_role');
  if(page==='wife'||page==='hubby')go(page,rest[0]||'home');
  else if(role)go(role==='wife'?'wife/home':'hubby/home');
  else go('role-select');
  window.addEventListener('hashchange',()=>{const h=window.location.hash.slice(1)||'';const[p,...r]=h.split('/');if(p!==currentPage||r[0]!==currentTab){currentPage=p;currentTab=r[0]||'';renderCurrentPage()}});
}

function renderDishGrid(dishes){
  const filtered=_selCats==='全部'?dishes:dishes.filter(d=>d.category===_selCats);
  const favs=filtered.filter(d=>d.is_favorite);const others=filtered.filter(d=>!d.is_favorite);
  let html='';
  if(favs.length&&_selCats==='全部'){
    html+=`<div class="text-sm text-primary-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade">
      <span class="text-2xl">⭐</span> 常吃（小跟班最拿手的）
    </div>
    <div class="grid grid-cols-3 gap-3 mb-5">
      ${favs.map((d,i)=>dishCard(d,true,i+1)).join('')}
    </div>`;
    if(others.length)html+=`<div class="text-sm text-gray-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade stagger-4">
      <span class="text-2xl">🍽️</span> 全部菜品
    </div>`;
  }
  const favOffset=favs.length&&_selCats==='全部'?favs.length:0;
  html+=`<div class="grid grid-cols-3 gap-3 mb-4">
    ${others.map((d,i)=>dishCard(d,false,i+1+favOffset)).join('')}
  </div>`;
  if(!filtered.length)html=`<div class="text-center text-gray-400 py-24 anim-fade">
    <div class="text-6xl mb-5 opacity-30">🍚</div>
    <p class="text-lg">暂无菜品</p>
    <p class="text-sm mt-2 opacity-60">让小跟班去添加几个吧～</p>
  </div>`;
  return html;
}

/* ============================================================

function pgHubbyStats(){
  const orders=DB.orders().filter(o=>!o.cancelled);
  const stats=DB.getCookingStats();
  const unlocked=DB.getUnlockedAchievements();
  const locked=DB.getLockedAchievements();
  
  // 本月统计
  const thisMonth=new Date();thisMonth.setDate(1);thisMonth.setHours(0,0,0,0);
  const mo=orders.filter(o=>o.created_at&&new Date(o.created_at).getTime()>=thisMonth.getTime());
  const monthDays=new Set(mo.map(o=>o.order_date)).size;
  const monthDishes=mo.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
  const monthCost=mo.reduce((s,o)=>s+DB.orderCost(o),0);
  const monthAvgCost=monthDays?Math.round(monthCost/monthDays):0;
  
  // 总统计
  const totalDays=new Set(orders.map(o=>o.order_date)).size;
  const totalDishesAll=orders.reduce((s,o)=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;return s+(items||[]).length},0);
  const totalCostAll=orders.reduce((s,o)=>s+DB.orderCost(o),0);
  const avgCostAll=totalDays?Math.round(totalCostAll/totalDays):0;
  
  // 菜品统计
  const dishCount={};orders.forEach(o=>{const items=typeof o.items==='string'?JSON.parse(o.items):o.items;(items||[]).forEach(i=>{dishCount[i.did]=(dishCount[i.did]||0)+1})});
  const top5=Object.entries(dishCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  
  // 荤素比（总）
  let meatCnt=0,vegCnt=0,soupCnt=0,stapleCnt=0;
  orders.forEach(o=>{
    const items=typeof o.items==='string'?JSON.parse(o.items):o.items;
    (items||[]).forEach(i=>{
      const d=DB.getDish(i.did);
      if(d){
        if(d.category==='荤菜')meatCnt++;
        else if(d.category==='素菜')vegCnt++;
        else if(d.category==='汤')soupCnt++;
        else if(d.category==='主食')stapleCnt++;
      }
    });
  });
  const dishTotal=meatCnt+vegCnt+soupCnt+stapleCnt;
  const meatPct=dishTotal?Math.round(meatCnt/dishTotal*100):0;
  const vegPct=dishTotal?Math.round(vegCnt/dishTotal*100):0;
  const soupPct=dishTotal?Math.round(soupCnt/dishTotal*100):0;
  const staplePct=dishTotal?Math.round(stapleCnt/dishTotal*100):0;
  
  // 好评率（总）

    a6:Math.min(stats.quickDishes,10),
    a8:Math.min(stats.totalOrders,100),
    a9:Math.min(stats.lowFatDishes,20),
    a10:Math.min(stats.spicyDishes,10)

function pgCalendar(role){
  const now=new Date();const year=now.getFullYear(),month=now.getMonth();
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
  const orders=DB.orders();const today=DB.today();
  let cells='';for(let i=0;i<firstDay;i++)cells+=`<div class="aspect-square"></div>`;
  for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const o=orders.find(x=>x.order_date===ds);const isToday=ds===today;const hasOrder=o&&!o.cancelled;const cancelled=o&&o.cancelled;let dot='';if(hasOrder){const items=typeof o.items==='string'?JSON.parse(o.items):o.items;dot=`<div class="flex gap-0.5 justify-center mt-0.5">${(items||[]).slice(0,3).map(()=>'<div class="w-1 h-1 rounded-full bg-primary-400"></div>').join('')}</div>`}if(cancelled)dot=`<div class="text-[10px] text-gray-300 mt-0.5">休</div>`;cells+=`<button data-action="cal-day" data-date="${ds}" class="aspect-square flex flex-col items-center justify-center rounded-xl text-sm transition ${isToday?'bg-primary-400 text-white font-bold':'hover:bg-primary-50'} ${!isToday&&hasOrder?'text-gray-800':''} ${!isToday&&!hasOrder&&!cancelled?'text-gray-400':''}">${d}${dot}</button>`}
  return `<div class="min-h-screen pb-24"><header class="sticky top-0 z-30 bg-primary-50/90 backdrop-blur-lg px-4 pt-4 pb-3"><h1 class="font-display text-xl">${year}年${month+1}月</h1></header><div class="px-4"><div class="grid grid-cols-7 gap-1 mb-2">${['日','一','二','三','四','五','六'].map(w=>`<div class="text-center text-xs text-gray-400 py-1">${w}</div>`).join('')}</div><div class="grid grid-cols-7 gap-1">${cells}</div><div id="cal-detail" class="mt-4"></div></div>${role==='wife'?wifeNav('calendar'):hubbyNav('calendar')}</div>`;
}

document.addEventListener('click', async e => {
  console.log('✅ 点击事件触发！', e.target);
  const btn = e.target.closest('[data-action]');
  console.log('✅ 找到按钮：', btn);
  if (!btn) return;
  const a = btn.dataset.action;
  const d = btn.dataset;
  console.log('✅ 执行 action：', a);
  
  switch (a) {
    case 'select-role':
      localStorage.setItem('pp_role', d.role);
      go(d.role === 'wife' ? 'wife/home' : 'hubby/home');
      break;
      
    case 'switch-role':
      localStorage.removeItem('pp_role');
      go('role-select');
      break;
      
    case 'cat-filter': {
      _selCats = d.cat;
      const list = $('#dish-list');
      if (list) list.innerHTML = renderDishGrid(DB.dishes());
      $$('#cat-tabs .tab-btn').forEach(b => {
        if (b.dataset.cat === _selCats) {
          b.className = b.className.replace(/border-primary-200 text-gray-600/g, 'bg-primary-400 text-white border-primary-400');
        } else {
          b.className = b.className.replace(/bg-primary-400 text-white border-primary-400/g, 'border-primary-200 text-gray-600');
        }
      });
      break;
    }
    
    case 'open-sidebar': {
      const sidebar = $('#sidebar');
      const overlay = $('#sidebar-overlay');
      if (sidebar) sidebar.classList.add('show');
      if (overlay) overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      break;
    }
    
    case 'close-sidebar': {
      const sidebar = $('#sidebar');
      const overlay = $('#sidebar-overlay');
      if (sidebar) sidebar.classList.remove('show');
      if (overlay) overlay.classList.remove('show');
      document.body.style.overflow = '';
      break;
    }
    
    case 'cat-filter-sidebar': {
      _selCats = d.cat;
      const list = $('#dish-list');
      if (list) list.innerHTML = renderDishGrid(DB.dishes());
      
      // 更新当前分类显示
      const currentCat = $('#current-cat');
      if (currentCat) currentCat.textContent = _selCats;
      
      // 更新侧边栏菜单项的 active 状态
      $$('.sidebar-menu-item[data-action="cat-filter-sidebar"]').forEach(item => {
        if (item.dataset.cat === _selCats) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
      
      // 关闭侧边栏
      const sidebar = $('#sidebar');
      const overlay = $('#sidebar-overlay');
      if (sidebar) sidebar.classList.remove('show');
      if (overlay) overlay.classList.remove('show');
      document.body.style.overflow = '';
      
      break;
    }
    
    // 小跟班侧边栏事件处理
    case 'open-hubby-sidebar': {
      const hubbySidebar = $('#hubby-sidebar');
      const hubbyOverlay = $('#hubby-sidebar-overlay');
      if (hubbySidebar) hubbySidebar.classList.add('show');
      if (hubbyOverlay) hubbyOverlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      break;
    }
    
    case 'close-hubby-sidebar': {
      const hubbySidebar = $('#hubby-sidebar');
      const hubbyOverlay = $('#hubby-sidebar-overlay');
      if (hubbySidebar) hubbySidebar.classList.remove('show');
      if (hubbyOverlay) hubbyOverlay.classList.remove('show');
      document.body.style.overflow = '';
      break;
    }
    
    case 'hubby-sidebar-nav': {
      const tab = d.tab;
      
      // 关闭侧边栏
      const hubbySidebar = $('#hubby-sidebar');
      const hubbyOverlay = $('#hubby-sidebar-overlay');
      if (hubbySidebar) hubbySidebar.classList.remove('show');
      if (hubbyOverlay) hubbyOverlay.classList.remove('show');
      document.body.style.overflow = '';
      
      // 导航到对应页面
      go(`hubby/${tab}`);
      break;
    }
      
    case 'toggle-dish':
      if (_selDishes.has(d.did)) {
        _selDishes.delete(d.did);
      } else {
        _selDishes.add(d.did);
        celebrateSelect();
      }
      refreshSelBar();
      $$('.dish-card').forEach(c => {
        if (c.dataset.did === d.did) {
          c.classList.toggle('sel', _selDishes.has(d.did));
        }
      });
      break;
      
    case 'clear-all-dishes':
      _selDishes.clear();
      refreshSelBar();
      $$('.dish-card').forEach(c => c.classList.remove('sel'));
      toast('已清空全部选择', 'info');
      break;
      
    case 'show-selected-dishes':
      showSelectedDishesModal();
      break;
      
    case 'remove-selected-dish':
      _selDishes.delete(d.did);
      refreshSelBar();
      $$('.dish-card').forEach(c => {
        if (c.dataset.did === d.did) {
          c.classList.remove('sel');
        }
      });
      // 如果模态框还开着，更新它
      const modalList = $('#selected-dishes-list');
      if (modalList) {
        if (_selDishes.size === 0) {
          closeModal();
        } else {
          modalList.innerHTML = renderSelectedDishesList();
        }
      }
      break;
      
    case 'show-scenario-recommend':
      showRecommendationModal(d.scenario);
      break;
      
    case 'clear-status':
      DB.clearCurrentStatus();
      toast('状态已清除', 'success');
      // 刷新页面
      const role = localStorage.getItem('pp_role') || 'wife';
      go(role + '/home');
      break;
      
    case 'go-confirm':
      showConfirmModal();
      break;
      
    case 'submit-order': {
      const remark = $('#order-remark')?.value || '';
      closeModal();
      const result = await DB.addOrder([..._selDishes], remark);
      if (result) {
        _selDishes.clear();
        setTimeout(() => go('wife/waiting'), 600);
      }
      break;
    }
      
    case 'reorder': {
      const o = DB.orders().find(x => x.id === d.oid);
      if (o) {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        _selDishes = new Set((items || []).map(i => i.did));
        refreshSelBar();
        toast('已选好，可修改后提交', 'info');
      }
      break;
    }
      
    case 'select-template':
    case 'apply-tpl': {
      const t = DB.templates().find(x => x.id === d.tid);
      
      // 关闭侧边栏
      const sidebar = $('#sidebar');
      const overlay = $('#sidebar-overlay');
      if (sidebar) sidebar.classList.remove('show');
      if (overlay) overlay.classList.remove('show');
      document.body.style.overflow = '';
      
      if (t) {
        // 检查模板名称是否匹配场景名称
        const scenarios = DB.getScenarios();
        const matchedScenario = scenarios.find(s => t.name.includes(s.name.split('/')[0]));
        
        if (matchedScenario) {
          // 匹配到场景，显示智能推荐结果
          showRecommendationModal(matchedScenario.id);
        } else {
          // 普通模板，直接应用
          const items = typeof t.items === 'string' ? JSON.parse(t.items) : t.items;
          _selDishes = new Set(items);
          refreshSelBar();
          toast('已选好，可修改后提交', 'info');
        }
      }
      
      break;
    }
      
    case 'random-meal': {
      const dishes = DB.dishes();
      const w3 = Date.now() - 3 * 864e5;
      const recent = new Set();
      DB.orders().filter(o => o.created_at && new Date(o.created_at).getTime() > w3 && !o.cancelled).forEach(o => {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        (items || []).forEach(i => recent.add(i.did));
      });
      const cats = {'荤菜': 2, '素菜': 1, '汤': 1};
      const picked = [];
      for (const [cat, n] of Object.entries(cats)) {
        const pool = dishes.filter(dd => dd.category === cat && !recent.has(dd.id) && !picked.includes(dd.id));
        const src = pool.length >= n ? pool : dishes.filter(dd => dd.category === cat && !picked.includes(dd.id));
        for (let i = 0; i < n && src.length; i++) {
          const idx = Math.floor(Math.random() * src.length);
          picked.push(src[idx].id);
          src.splice(idx, 1);
        }
      }
      _selDishes = new Set(picked);
      refreshSelBar();
      toast('随机选好了，不满意可以换', 'success');
      break;
    }
      
    case 'mark-no-cook':
      showNoCookModal();
      break;
      
    case 'save-no-cook':
      await DB.setNoCook(DB.today(), decodeURIComponent(d.reason));
      closeModal();
      renderCurrentPage();
      break;
      
    case 'save-no-cook-custom': {
      const v = $('#no-cook-custom')?.value || '不做饭';
      await DB.setNoCook(DB.today(), v);
      closeModal();
      renderCurrentPage();
      break;
    }
      
    case 'rate': {
      const o = DB.todayOrder();
      if (o) {
        await DB.updateOrder(o.id, {rating: d.r});
        toast(d.r === 'good' ? '谢谢老婆!' : d.r === 'ok' ? '下次改进!' : '好吧...', d.r === 'good' ? 'success' : 'info');
        if (d.r === 'good') showConfetti();
        setTimeout(() => go('wife/home'), 1500);
      }
      break;
    }
      
    case 'wife-modify': {
      const o = DB.todayOrder();
      if (o && (o.status === 'ordered' || o.status === 'seen')) {
        await DB.updateOrder(o.id, {status: 'ordered'});
        go('wife/home');
      }
      break;
    }
      
    case 'update-status': {
      const o = DB.todayOrder();
      if (o) {
        await DB.updateOrder(o.id, {status: d.st});
        toast(STATUS_LABELS[d.st], 'success');
        renderCurrentPage();
      }
      break;
    }
      
    case 'cancel-order':
      showCancelModal(d.oid);
      break;
      
    case 'do-cancel': {
      await DB.updateOrder(d.oid, {cancelled: true, cancel_reason: decodeURIComponent(d.reason), status: 'cancelled'});
      closeModal();
      toast('已取消', 'info');
      renderCurrentPage();
      break;
    }
      
    case 'do-cancel-custom': {
      const v = $('#cancel-custom')?.value || '';
      if (!v.trim()) {
        toast('请填写原因', 'warn');
        return;
      }
      await DB.updateOrder(d.oid, {cancelled: true, cancel_reason: v, status: 'cancelled'});
      closeModal();
      toast('已取消', 'info');
      renderCurrentPage();
      break;
    }
      
    case 'toggle-inv': {
      const name = decodeURIComponent(d.name);
      await DB.setInv(name, !DB.hasInv(name));
      renderCurrentPage();
      break;
    }
      
    case 'cancel-no-cook':
      await DB.cancelNoCook(DB.today());
      renderCurrentPage();
      break;
      
    case 'wife-tab':
      go('wife/' + d.tab);
      break;
      
    case 'hubby-tab':
      go('hubby/' + d.tab);
      break;
      
    case 'manage-tab':
      _manageTab = d.mt;
      renderCurrentPage();
      break;
      
    case 'add-dish':
      showDishModal(null);
      break;
      
    case 'edit-dish':
      showDishModal(d.did);
      break;
      
    case 'save-dish': {
      const name = $('#dm-name')?.value?.trim();
      if (!name) {
        toast('请输入菜名', 'warn');
        return;
      }
      const cat = $('#dm-cat')?.value;
      const time = parseInt($('#dm-time')?.value) || 15;
      const cost = parseInt($('#dm-cost')?.value) || 10;
      const ing = ($('#dm-ing')?.value || '').split('\n').map(s => s.trim()).filter(Boolean);
      const recipe = ($('#dm-recipe')?.value || '').trim();
      const fav = $('#dm-fav')?.checked || false;
      const existing = d.did ? DB.getDish(d.did) : null;
      const dishObj = {
        id: d.did || uid(),
        name,
        category: cat,
        ingredients: ing,
        cook_time: time,
        cost_estimate: cost,
        is_favorite: fav,
        recipe
      };
      if (existing) dishObj._exists = true;
      await DB.saveDish(dishObj);
      closeModal();
      toast(d.did ? '已保存' : '已添加', 'success');
      renderCurrentPage();
      break;
    }
      
    case 'del-dish':
      await DB.deleteDish(d.did);
      toast('已删除', 'info');
      renderCurrentPage();
      break;
      
    case 'add-tpl':
      showTplModal(null);
      break;
      
    case 'edit-tpl':
      showTplModal(d.tid);
      break;
      
    case 'tm-toggle': {
      if (!window._tmSel) window._tmSel = new Set();
      if (window._tmSel.has(d.did)) {
        window._tmSel.delete(d.did);
      } else {
        window._tmSel.add(d.did);
      }
      $$('#tm-dishes button').forEach(b => {
        if (b.dataset.did === d.did) {
          if (window._tmSel.has(d.did)) {
            b.className = b.className.replace('border-primary-200 text-gray-600', 'bg-primary-50 border-primary-400 text-primary-500');
          } else {
            b.className = b.className.replace('bg-primary-50 border-primary-400 text-primary-500', 'border-primary-200 text-gray-600');
          }
        }
      });
      break;
    }
      
    case 'save-tpl': {
      const name = $('#tm-name')?.value?.trim();
      if (!name) {
        toast('请输入模板名称', 'warn');
        return;
      }
      const desc = $('#tm-desc')?.value?.trim();
      const items = [...(window._tmSel || [])];
      const existing = d.tid ? DB.templates().find(x => x.id === d.tid) : null;
      const tplObj = {
        id: d.tid || uid(),
        name,
        description: desc,
        icon: 'fa-utensils',
        items
      };
      if (existing) tplObj._exists = true;
      await DB.saveTpl(tplObj);
      window._tmSel = null;
      closeModal();
      toast(d.tid ? '已保存' : '已添加', 'success');
      renderCurrentPage();
      break;
    }
      
    case 'del-tpl':
      await DB.deleteTpl(d.tid);
      toast('已删除', 'info');
      renderCurrentPage();
      break;
      
    case 'cal-day':
      showDayDetail(d.date);
      break;
      
    case 'save-anni': {
      const v = $('#anni-input')?.value || '';
      await DB.saveSetting('anni', v);
      toast('已保存', 'success');
      break;
    }
      
    case 'export-data': {
      const orders = DB.orders();
      let csv = '\uFEFF日期,状态,菜品,备注,评价\n';
      orders.forEach(o => {
        const items = typeof o.items === 'string' ? JSON.parse(o.items) : o.items;
        const names = DB.getDishesByIds((items || []).map(i => i.did)).map(d => d.name).join('+');
        const rating = o.rating === 'good' ? '好吃' : o.rating === 'ok' ? '一般' : o.rating === 'bad' ? '别做了' : '';
        csv += `${o.order_date},${o.cancelled ? '取消' : STATUS_LABELS[o.status]},"${names}","${o.remark || ''}","${rating}"\n`;
      });
      const blob = new Blob([csv], {type: 'text/csv'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `小跟班点菜记录_${DB.today()}.csv`;
      a.click();
      toast('已导出', 'success');
      break;
    }
      
    case 'show-recipe':
      showRecipeModal(d.did);
      break;
      
    case 'check-achievements':
      DB.checkAchievements();
      toast('已检查成就', 'success');
      break;
      
    case 'add-shopping-list':
      showShoppingListModal(null);
      break;
      
    case 'save-shopping-list': {
      const name = $('#sl-name')?.value?.trim();
      if (!name) {
        toast('请输入清单名称', 'warn');
        return;
      }
      const itemsText = $('#sl-items')?.value || '';
      const items = itemsText.split('\n').map(s => s.trim()).filter(Boolean).map(s => {
        const parts = s.split(/\s+/);
        if (parts.length > 1) {
          const lastPart = parts[parts.length - 1];
          if (/^\d/.test(lastPart) || /[gml斤个包瓶份]$/.test(lastPart)) {
            return { name: parts.slice(0, -1).join(' '), quantity: lastPart, checked: false };
          }
        }
        return { name: s, quantity: '', checked: false };
      });
      
      if (d.slid) {
        await DB.updateShoppingList(d.slid, { name, items });
        toast('已保存', 'success');
      } else {
        await DB.addShoppingList(name, items);
        toast('已创建', 'success');
      }
      closeModal();
      renderCurrentPage();
      break;
    }
      
    case 'toggle-shopping-item': {
      const list = DB.shoppingLists().find(l => l.id === d.slid);
      if (list) {
        const items = [...(list.items || [])];
        const idx = parseInt(d.idx);
        if (items[idx]) {
          items[idx] = { ...items[idx], checked: !items[idx].checked };
          await DB.updateShoppingList(d.slid, { items });
          renderCurrentPage();
        }
      }
      break;
    }
      
    case 'complete-shopping-list':
      await DB.updateShoppingList(d.slid, { is_completed: true, completed_at: new Date().toISOString() });
      toast('已完成！', 'success');
      renderCurrentPage();
      break;
      
    case 'delete-shopping-list':
      await DB.deleteShoppingList(d.slid);
      toast('已删除', 'info');
      renderCurrentPage();
      break;
      
    case 'create-shopping-list-from-order': {
      const order = DB.orders().find(o => o.id === d.oid);
      if (order) {
        const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
        const dishes = DB.getDishesByIds((items || []).map(i => i.did));
        const allIng = new Map();
        dishes.forEach(dish => {
          (dish.ingredients || []).forEach(name => {
            if (!allIng.has(name)) allIng.set(name, dish.name);
          });
        });
        const shoppingItems = [...allIng.keys()].map(name => ({ name, quantity: '', checked: false }));
        const today = new Date();
        const listName = `${today.getMonth() + 1}月${today.getDate()}日 购物清单`;
        await DB.addShoppingList(listName, shoppingItems, d.oid);
        toast('已保存购物清单！', 'success');
        go('hubby/shopping');
      }
      break;
    }
      
    case 'show-dish-rating':
      showDishRatingModal(d.oid);
      break;
      
    case 'rate-dish': {
      const did = d.did;
      const score = parseInt(d.score);
      _dishRatings[did] = score;
      updateDishStars(did, score);
      break;
    }
      
    case 'skip-dish-rating':
    case 'submit-dish-rating': {
      // 保存菜品评分
      for (const [did, score] of Object.entries(_dishRatings)) {
        await DB.addReview({
          order_id: d.oid,
          dish_id: did,
          score: score,
          comment: ''
        });
      }
      closeModal();
      _dishRatings = {};
      toast('已保存菜品评分', 'success');
      break;
    }
      
    // 特殊日期相关事件处理
    case 'add-special-date':
      showSpecialDateModal(null);
      break;
      
    case 'edit-special-date':
      showSpecialDateModal(d.sdid);
      break;
      
    case 'delete-special-date': {
      if (confirm('确定要删除这个特殊日期吗？')) {
        await DB.deleteSpecialDate(d.sdid);
        toast('已删除', 'info');
        renderCurrentPage();
      }
      break;
    }
      
    case 'select-sd-icon': {
      const icon = d.icon;
      // 更新隐藏输入框
      const iconInput = $('#sd-icon');
      if (iconInput) iconInput.value = icon;
      // 更新按钮样式
      $$('.sd-icon-btn').forEach(btn => {
        if (btn.dataset.icon === icon) {
          btn.className = 'sd-icon-btn w-12 h-12 rounded-xl flex items-center justify-center text-2xl transition-all bg-gradient-to-br from-rose-100 to-pink-100 ring-2 ring-rose-400 scale-110';
        } else {
          btn.className = 'sd-icon-btn w-12 h-12 rounded-xl flex items-center justify-center text-2xl transition-all bg-white/60 hover:bg-white/80';
        }
      });
      break;
    }
      
    case 'toggle-sd-repeat': {
      const toggle = $('#sd-repeat-toggle');
      const repeatInput = $('#sd-repeat');
      if (toggle && repeatInput) {
        const isActive = toggle.classList.contains('active');
        if (isActive) {
          toggle.classList.remove('active');
          repeatInput.value = 'false';
        } else {
          toggle.classList.add('active');
          repeatInput.value = 'true';
        }
      }
      break;
    }
      
    case 'save-special-date': {
      const name = $('#sd-name')?.value?.trim();
      if (!name) {
        toast('请输入日期名称', 'warn');
        return;
      }
      const date = $('#sd-date')?.value;
      if (!date) {
        toast('请选择日期', 'warn');
        return;
      }
      const icon = $('#sd-icon')?.value || '🎉';
      const repeat_yearly = $('#sd-repeat')?.value === 'true';
      
      const sdObj = { name, date, icon, repeat_yearly };
      
      if (d.sdid) {
        await DB.updateSpecialDate(d.sdid, sdObj);
        toast('已保存', 'success');
      } else {
        const newSd = await DB.addSpecialDate(sdObj);
        if (newSd) toast('已添加', 'success');
      }
      closeModal();
      renderCurrentPage();
      break;
    }
    
    // 智能推荐相关事件处理
    case 'show-scenario-select':
      closeModal();
      showScenarioSelectModal();
      break;
      
    case 'select-scenario': {
      const scenarioId = d.scenarioId;
      closeModal();
      showRecommendationModal(scenarioId);
      break;
    }
    
    case 'set-status-days': {
      const scenarioId = d.scenarioId;
      const days = parseInt(d.days) || 3;
      const status = DB.setCurrentStatus(scenarioId, days);
      if (status) {
        toast(`已设置「${status.name}」提醒，持续 ${days} 天`, 'success');
        closeModal();
        // 刷新页面
        const role = localStorage.getItem('pp_role') || 'wife';
        go(role + '/home');
      }
      break;
    }
    
    case 'quick-add-dish': {
      const did = d.did;
      if (_selDishes.has(did)) {
        toast('已经选过这道菜啦', 'info');
      } else {
        _selDishes.add(did);
        celebrateSelect();
        toast('已加入菜单！', 'success');
      }
      refreshSelBar();
      break;
    }
    
    case 'add-all-recommended': {
      const scenarioId = d.scenarioId;
      const combo = DB.generateComboForScenario(scenarioId);
      if (combo && combo.all.length > 0) {
        let addedCount = 0;
        combo.all.forEach(dish => {
          if (!_selDishes.has(dish.id)) {
            _selDishes.add(dish.id);
            addedCount++;
          }
        });
        if (addedCount > 0) {
          celebrateSelect();
          toast(`已添加 ${addedCount} 道菜！`, 'success');
        } else {
          toast('这些菜都已经选过啦', 'info');
        }
        refreshSelBar();
      }
      closeModal();
      break;
    }
    
    case 'show-favorites': {
      // 关闭侧边栏
      const sidebar = $('#sidebar');
      const overlay = $('#sidebar-overlay');
      if (sidebar) sidebar.classList.remove('show');
      if (overlay) overlay.classList.remove('show');
      document.body.style.overflow = '';
      
      // 只显示收藏的菜品
      const favDishes = DB.dishes().filter(dish => dish.is_favorite);
      const list = $('#dish-list');
      if (list) {
        if (favDishes.length > 0) {
          list.innerHTML = `<div class="text-sm text-primary-400 font-bold mb-4 mt-2 flex items-center gap-2 anim-fade">
            <span class="text-2xl">⭐</span> 我的收藏
          </div>
          <div class="grid grid-cols-3 gap-3">
            ${favDishes.map((dish, i) => dishCard(dish, true, i + 1)).join('')}
          </div>`;
        } else {
          list.innerHTML = `<div class="text-center text-gray-400 py-24 anim-fade">
            <div class="text-6xl mb-5 opacity-30">⭐</div>
            <p class="text-lg">还没有收藏</p>
            <p class="text-sm mt-2 opacity-60">长按菜品卡片可以收藏哦～</p>
          </div>`;
        }
      }
      
      // 更新当前分类显示
      const currentCat = $('#current-cat');
      if (currentCat) currentCat.textContent = '我的收藏';
      
      break;
    }
      
    case 'close-modal':
      closeModal();
      break;
  }
});

function refreshSelBar(){const bar=$('#sel-bar');if(!bar)return;const count=_selDishes.size;bar.style.display=count>0?'block':'none';const ce=$('#sel-count');if(ce)ce.textContent=count;const co=$('#sel-cost');if(co){const dishes=DB.getDishesByIds([..._selDishes]);const total=dishes.reduce((s,d)=>s+(d.cost_estimate||0),0);co.textContent=`~${total}元`}}

/* 自动刷新等待页文案 */
setInterval(()=>{const m=$('#status-msg');if(m&&currentPage==='wife/waiting'){const o=DB.todayOrder();if(o){const msgs=STATUS_MSGS[o.status];if(msgs)m.textContent=pick(msgs.wife||msgs)}}},4000);

/* Service Worker 注册 */
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

/* 检查并触发特殊日期庆祝 */
function checkAndCelebrateSpecialDay() {
  const anniInfo = DB.getAnniInfo();
  const milestones = DB.getAnniMilestones();
  const todayMilestone = milestones.find(m => m.isToday);
  const hasTodaySpecial = DB.isTodaySpecialDate();
  const isAnniToday = anniInfo && anniInfo.isAnniToday;
  
  if (hasTodaySpecial || isAnniToday || todayMilestone) {
    setTimeout(() => {
      showSpecialDayCelebration();
      
      // 显示 toast 提示
      let msg = '🎉 今天是个特殊的日子！';
      if (isAnniToday && anniInfo) {
        msg = `💕 在一起纪念日快乐！我们已经在一起 ${anniInfo.daysTogether} 天啦！`;
      } else if (todayMilestone) {
        msg = `🏆 恭喜达成 ${todayMilestone.name}！`;
      } else {
        const todaySd = DB.getTodaySpecialDate();
        if (todaySd) {
          msg = `${todaySd.icon} 今天是 ${todaySd.name}！`;
        }
      }
      toast(msg, 'success');
    }, 1500);
  }
}

/* 启动 */
initRouter();
createParticles();

/* 数据准备好后检查特殊日期 */
setTimeout(() => {
  if (DB._ready) {
    checkAndCelebrateSpecialDay();
  } else {
    const checkReady = setInterval(() => {
      if (DB._ready) {
        clearInterval(checkReady);
        checkAndCelebrateSpecialDay();
      }
    }, 500);
  }
}, 100);
</script>
